<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PACMUSH ODYSSEY</title>
<style>
:root{--bg:#0b0a0e;--card:#16131b;--line:#ffffff22;--text:#fff7ea;--p1:#4a90d9;--p2:#d94a4a}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center}
#wrap{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px;width:100%}

/* HUD */
#hud{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;width:1100px;max-width:95vw;align-items:start;user-select:none}
.pbox{background:var(--card);border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;gap:5px}
.pbox.p1{border:1.5px solid #4a90d966}
.pbox.p2{border:1.5px solid #d94a4a66}
.ptop{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800}
.score-big{font-size:18px;font-weight:800;margin-left:auto}
.p1 .score-big{color:#88bbff}
.p2 .score-big{color:#ff9999}
.lives{display:flex;gap:3px}
.lv{width:10px;height:10px;border-radius:50%;background:#ff5c6c;box-shadow:0 0 5px #ff5c6c88}
.lv.dead{background:#ffffff18;box-shadow:none}
.bar-row{display:flex;flex-direction:column;gap:2px}
.bar-label{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-bg{height:5px;background:#ffffff10;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .15s}
.bar-fill.power{background:linear-gradient(90deg,#4a90d9,#88ccff)}
.bar-fill.power.active{background:linear-gradient(90deg,#00cc44,#88ffaa)}
.bar-fill.super{background:linear-gradient(90deg,#cc6600,#ffd700)}
.bar-fill.super.ready{background:linear-gradient(90deg,#ffd700,#ffee88);animation:pulse .8s ease-in-out infinite}
.p2 .bar-fill.power{background:linear-gradient(90deg,#d94a4a,#ff9999)}
.p2 .bar-fill.power.active{background:linear-gradient(90deg,#00cc44,#88ffaa)}

#hud-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 12px;background:var(--card);border-radius:12px;border:1px solid var(--line);min-width:140px}
#event-banner{min-height:18px;font-size:12px;font-weight:800;text-align:center;transition:opacity .3s}

#game-wrap{position:relative;width:1100px;max-width:95vw}
canvas{display:block;width:100%;height:auto;background:#0f0c14;border-radius:14px;border:2px solid #00000055;box-shadow:0 18px 60px #000000aa}

#kb{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;font-size:11px;opacity:.6;width:1100px;max-width:95vw}
.k{background:#ffffff0d;border:1px solid #ffffff18;border-radius:5px;padding:2px 7px}
.k b{color:#88ccff}

/* Modal overlay */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}
.modal{max-width:1100px;width:94vw;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 80px #0009;padding:20px;max-height:90vh;overflow-y:auto}
.modal h1{font-size:26px;font-weight:800;margin-bottom:4px}
.modal .sub{opacity:.85;font-size:14px;line-height:1.5;margin-bottom:12px}
.section-title{font-weight:800;font-size:14px;margin:14px 0 8px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{background:#ffffff10;border:1px solid var(--line);border-radius:999px;padding:2px 8px;font-size:12px;cursor:pointer}
.badge input{margin-right:4px}
.grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.choice{background:#0e0b13;border:1px solid #ffffff1f;border-radius:12px;padding:12px;cursor:pointer;display:flex;gap:12px;align-items:center;transition:all .15s}
.choice:hover{border-color:#ffffff44;background:#12101a}
.choice.selected{outline:2px solid #4a90d9;box-shadow:0 0 0 4px #4a90d933}
.choice.disabled{opacity:.35;pointer-events:none;filter:grayscale(80%)}
.choice img{width:72px;height:72px;object-fit:contain;flex:0 0 auto}
.choice .name{font-weight:800;font-size:14px}
.choice .desc{font-size:11px;opacity:.8;line-height:1.5;margin-top:4px}
.choice .powers{font-size:11px;margin-top:4px;line-height:1.6}
.btn{background:linear-gradient(135deg,#2a3a5c,#1a1f2e);border:1px solid #4a90d9aa;border-radius:12px;padding:14px 28px;font-weight:700;cursor:pointer;color:var(--text);font-size:16px;transition:all .15s}
.btn:hover:not([disabled]){background:linear-gradient(135deg,#3a4a6c,#2a2f3e);border-color:#4a90d9}
.btn[disabled]{opacity:.45;cursor:not-allowed}
select{background:#0e0b13;border:1px solid #ffffff22;border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="pbox p1" id="pbox1">
      <div class="ptop">
        <img id="sp-icon1" style="width:26px;height:26px;object-fit:contain" src="" alt="">
        <span id="sp-name1" style="color:#88bbff">—</span>
        <div class="lives" id="lives1"></div>
        <span class="score-big" id="score1">0</span>
      </div>
      <div class="bar-row">
        <span class="bar-label" id="pow-label1">⚡ Pouvoir</span>
        <div class="bar-bg"><div class="bar-fill power" id="pow-bar1" style="width:0%"></div></div>
      </div>
      <div class="bar-row">
        <span class="bar-label" id="sup-label1">★ Super — 0/20</span>
        <div class="bar-bg"><div class="bar-fill super" id="sup-bar1" style="width:0%"></div></div>
      </div>
    </div>
    <div id="hud-center">
      <span style="font-size:11px;opacity:.5" id="diff-label">—</span>
      <span style="font-size:14px;font-weight:800" id="mode-label">Solo</span>
      <span style="font-size:11px;opacity:.6" id="leader-text">—</span>
      <span id="event-banner"></span>
    </div>
    <div class="pbox p2" id="pbox2" style="display:none">
      <div class="ptop">
        <img id="sp-icon2" style="width:26px;height:26px;object-fit:contain" src="" alt="">
        <span id="sp-name2" style="color:#ff9999">—</span>
        <div class="lives" id="lives2"></div>
        <span class="score-big" id="score2">0</span>
      </div>
      <div class="bar-row">
        <span class="bar-label" id="pow-label2">⚡ Pouvoir</span>
        <div class="bar-bg"><div class="bar-fill power" id="pow-bar2" style="width:0%"></div></div>
      </div>
      <div class="bar-row">
        <span class="bar-label" id="sup-label2">★ Super — 0/20</span>
        <div class="bar-bg"><div class="bar-fill super" id="sup-bar2" style="width:0%"></div></div>
      </div>
    </div>
  </div>
  <div id="kb">
    <span class="k">J1: <b>Flèches</b> déplacer</span>
    <span class="k">J1: <b>Entrée</b> pouvoir</span>
    <span class="k">J1: <b>Maj.Dr</b> SUPER★</span>
    <span class="k">J2: <b>ZQSD</b> déplacer</span>
    <span class="k">J2: <b>F</b> pouvoir</span>
    <span class="k">J2: <b>Espace</b> SUPER★</span>
    <span class="k"><b>P</b> pause</span>
  </div>
  <div id="game-wrap">
    <canvas id="game" width="1100" height="880"></canvas>
  </div>
</div>

<script>
"use strict";

// ═══════════════════════════════════════════════════
//  PACMUSH ODYSSEY — Complete Rewrite
// ═══════════════════════════════════════════════════

const CVS = document.getElementById('game');
const CTX = CVS.getContext('2d');
const W = CVS.width, H = CVS.height;
const TILE = 28;
const COLS = (W / TILE) | 0;   // 39
const ROWS = (H / TILE) | 0;   // 31
const SUPER_COST = 20;

// ═══════════════════════════════════════════════════
//  IMAGE LOADING
// ═══════════════════════════════════════════════════
const IMG = new Map();
function img(src) {
  if (IMG.has(src)) return IMG.get(src);
  const i = new Image(); i.src = src; IMG.set(src, i); return i;
}

const SPRITES = {
  cornucopioides: 'champignon_6_bordered.png',
  muscaria:       'champignon_3.png',
  cibarius:       'champignon_1.png',
  edulis:         'champignon_4.png',
  morchella:      'champignon_5_bordered.png',
  phalloides:     'champignon_2.png',
  stropharia:     'champignon_7.png',
  anthurus:       'champignon_8.png',
};
const PARASITE_SPRITES = [null,'Parasite_1.png','Parasite_2.png','Parasite_3.png','Parasite_4.png','Parasite_5.png','Parasite_6.png','Parasite_7.png'];
const TREE_IMGS = ['chene.png', 'pin.png'];

// Preload
Object.values(SPRITES).forEach(s => img(s));
PARASITE_SPRITES.slice(1).forEach(s => img(s));
TREE_IMGS.forEach(s => img(s));
img('sol_foret.png');

function drawImg(src, x, y, s, alpha = 1) {
  const i = img(src);
  if (!i.complete) return;
  CTX.save();
  if (alpha < 1) CTX.globalAlpha = alpha;
  CTX.drawImage(i, x - s/2, y - s/2, s, s);
  CTX.restore();
}

// ═══════════════════════════════════════════════════
//  AUDIO (simple synthesizer)
// ═══════════════════════════════════════════════════
let actx = null, masterGain = null;
function ensureAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = actx.createGain();
  masterGain.gain.value = 0.15;
  masterGain.connect(actx.destination);
}
function tone(freq, dur, type = 'sine', vol = 0.2) {
  if (!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  g.gain.value = 0; g.gain.linearRampToValueAtTime(vol, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + dur);
}
function sfxEat()   { tone(740, .05, 'triangle', .2); }
function sfxPower() { tone(520, .1, 'sawtooth', .18); tone(880, .1, 'square', .14); }
function sfxHit()   { tone(160, .08, 'sawtooth', .25); }
function sfxWin()   { [660,880,990,1320].forEach((f,i) => setTimeout(() => tone(f,.1,'triangle',.2), i*100)); }
function sfxLife()  { [660,990,1320].forEach((f,i) => setTimeout(() => tone(f,.08,'sine',.2), i*80)); }
document.addEventListener('click', ensureAudio, { once: true });
document.addEventListener('keydown', ensureAudio, { once: true });

// ═══════════════════════════════════════════════════
//  SPECIES DEFINITIONS
// ═══════════════════════════════════════════════════
const SPECIES = [
  {
    id: 'cornucopioides', name: 'Trompette de la mort', color: '#3d3630',
    power: 'Voile d\'ombre',
    powerDesc: 'Invisible 5s — les parasites ne vous voient plus.',
    superDesc: 'Nuit totale 12s — tous les parasites sont aveugles.',
    cooldown: 8 * 60,
    usePower(pl) {
      pl.invisible = true;
      pl.powerTimer = 5 * 60;
    },
    useSuper(pl) {
      G.parasites.forEach(p => { p.blind = 12 * 60; p.scared = 0; p.path = []; });
      pl.invisible = true;
      pl.powerTimer = 12 * 60;
      pl.speedMul = 1.2;
      showEvent('⭐ NUIT TOTALE ! Parasites aveugles 12s', '#aacfff');
    },
    onPowerEnd(pl) { pl.invisible = false; pl.speedMul = 1; }
  },
  {
    id: 'muscaria', name: 'Amanite tue-mouches', color: '#c81d1d',
    power: 'Piège toxique',
    powerDesc: 'Pose un piège au sol — téléporte le parasite qui marche dessus.',
    superDesc: 'Cercle toxique — zone 5×5 de pièges + gèle tous les parasites 4s.',
    cooldown: 3 * 60,
    usePower(pl) {
      const tx = Math.floor(pl.x), ty = Math.floor(pl.y);
      if (isWalk(tx, ty) && !G.grid[ty][tx].trap) {
        G.grid[ty][tx].trap = { owner: pl.pid };
        pl.powerTimer = 1; // instant
      }
    },
    useSuper(pl) {
      const cx = Math.floor(pl.x), cy = Math.floor(pl.y);
      for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
        const x = cx+dx, y = cy+dy;
        if (inBounds(x,y) && isWalk(x,y)) G.grid[y][x].trap = { owner: pl.pid };
      }
      G.parasites.forEach(p => { p.frozen = Math.max(p.frozen, 4*60); });
      pl.powerTimer = 1;
      showEvent('⭐ CERCLE TOXIQUE ! Parasites gelés 4s', '#ff8888');
    },
    onPowerEnd() {}
  },
  {
    id: 'cibarius', name: 'Girolle', color: '#e6a100',
    power: 'Charme',
    powerDesc: 'Le parasite le plus proche devient allié collecteur 10s.',
    superDesc: 'Légion — les 3 parasites les plus proches deviennent alliés 15s.',
    cooldown: 12 * 60,
    usePower(pl) {
      const target = nearestParasite(pl, p => !p.servant);
      if (target) { convertServant(target, pl.pid, 10*60); }
      pl.powerTimer = 1;
    },
    useSuper(pl) {
      const sorted = [...G.parasites].filter(p => !p.servant)
        .sort((a,b) => dist(a.x,a.y,pl.x,pl.y) - dist(b.x,b.y,pl.x,pl.y));
      sorted.slice(0, 3).forEach(p => convertServant(p, pl.pid, 15*60));
      pl.powerTimer = 1;
      showEvent('⭐ LÉGION ! 3 parasites convertis 15s', '#88ffcc');
    },
    onPowerEnd() {}
  },
  {
    id: 'edulis', name: 'Cèpe', color: '#7a4f2a',
    power: 'Bouclier',
    powerDesc: 'Encaisse le prochain coup sans perdre de vie (8s).',
    superDesc: 'Forteresse — bouclier 12s + onde de choc qui repousse et gèle tous les parasites.',
    cooldown: 10 * 60,
    usePower(pl) {
      pl.shield = true;
      pl.powerTimer = 8 * 60;
    },
    useSuper(pl) {
      pl.shield = true;
      pl.powerTimer = 12 * 60;
      G.parasites.forEach(p => {
        const d = dist(p.x, p.y, pl.x, pl.y);
        if (d < 8) {
          const dx = p.x - pl.x, dy = p.y - pl.y;
          const len = Math.hypot(dx,dy) || 1;
          p.x += (dx/len) * 3; p.y += (dy/len) * 3;
          p.frozen = Math.max(p.frozen, 3*60);
          p.path = [];
        }
      });
      showEvent('⭐ FORTERESSE ! Onde de choc + bouclier 12s', '#88ccff');
    },
    onPowerEnd(pl) { pl.shield = false; }
  },
  {
    id: 'morchella', name: 'Morille', color: '#6a4f2f',
    power: 'Spores du chaos',
    powerDesc: 'Désoriente les parasites proches 6s — ils errent au hasard.',
    superDesc: 'Apocalypse — tous les parasites deviennent fous 10s. En duo, inverse les contrôles de l\'adversaire 6s.',
    cooldown: 8 * 60,
    usePower(pl) {
      G.parasites.forEach(p => {
        if (dist(p.x, p.y, pl.x, pl.y) < 6) {
          p.confused = Math.max(p.confused || 0, 6*60);
          p.path = [];
        }
      });
      pl.powerTimer = 1;
      spawnParticle(pl.x * TILE, pl.y * TILE, 'spore');
    },
    useSuper(pl) {
      G.parasites.forEach(p => { p.confused = Math.max(p.confused || 0, 10*60); p.path = []; });
      if (G.mode === 'duo') {
        const foe = pl.pid === 1 ? G.p2 : G.p1;
        if (foe) foe.madness = Math.max(foe.madness || 0, 6*60);
      }
      pl.powerTimer = 1;
      showEvent('⭐ APOCALYPSE DES SPORES ! Chaos total', '#cc88ff');
    },
    onPowerEnd() {}
  },
  {
    id: 'phalloides', name: 'Amanite phalloïde', color: '#7a8b4b',
    power: 'Phase mycélienne',
    powerDesc: 'Traverse les murs pendant 4s.',
    superDesc: 'Transcendance — traverse les murs 10s + vitesse ×1.5.',
    cooldown: 5 * 60,
    usePower(pl) {
      pl.phase = true;
      pl.powerTimer = 4 * 60;
    },
    useSuper(pl) {
      pl.phase = true;
      pl.speedMul = 1.5;
      pl.powerTimer = 10 * 60;
      showEvent('⭐ TRANSCENDANCE ! Phase 10s + vitesse max', '#aaffaa');
    },
    onPowerEnd(pl) { pl.phase = false; pl.speedMul = 1; clampToWalkable(pl); }
  },
  {
    id: 'stropharia', name: 'Strophaire Vert-de-gris', color: '#6bb08f',
    power: 'Mur mycélien',
    powerDesc: 'Plante un arbre (mur) derrière vous pour bloquer le passage.',
    superDesc: 'Fortification — plante 4 murs autour + boost de vitesse 8s + regagne 1 vie.',
    cooldown: 4 * 60,
    usePower(pl) {
      const dir = pl.lastDir || [0, -1];
      const bx = Math.floor(pl.x) - dir[0], by = Math.floor(pl.y) - dir[1];
      if (inBounds(bx, by) && isWalk(bx, by) && !isEdge(bx, by)) {
        setWall(bx, by);
      }
      pl.powerTimer = 1;
    },
    useSuper(pl) {
      const cx = Math.floor(pl.x), cy = Math.floor(pl.y);
      // Place walls 2 tiles away (ring pattern) to not seal the player
      const spots = [[cx-2,cy],[cx+2,cy],[cx,cy-2],[cx,cy+2],[cx-1,cy-1],[cx+1,cy-1],[cx-1,cy+1],[cx+1,cy+1]];
      let placed = 0;
      spots.forEach(([x,y]) => {
        if (placed >= 4) return;
        if (inBounds(x,y) && isWalk(x,y) && !isEdge(x,y)) { setWall(x,y); placed++; }
      });
      pl.speedMul = 1.3;
      pl.powerTimer = 8 * 60;
      if (pl.pid === 1) { G.lives1 = Math.min(G.lives1 + 1, 5); updateLives(1); }
      else { G.lives2 = Math.min(G.lives2 + 1, 5); updateLives(2); }
      sfxLife();
      showEvent('⭐ FORTIFICATION ! +1 vie + vitesse 8s', '#88ffaa');
    },
    onPowerEnd(pl) { pl.speedMul = 1; }
  },
  {
    id: 'anthurus', name: 'Anthurus d\'archer', color: '#b04a6b',
    power: 'Sprint fongique',
    powerDesc: 'Vitesse ×2 pendant 3s — fonce à travers le labyrinthe !',
    superDesc: 'Téléportation — se déplace vers la plus grande zone de spores + invincible 5s.',
    cooldown: 5 * 60,
    usePower(pl) {
      pl.speedMul = 2;
      pl.powerTimer = 3 * 60;
    },
    useSuper(pl) {
      // teleport to biggest spore cluster
      const best = findBestSporeCluster(pl);
      if (best) { pl.x = best.x + 0.5; pl.y = best.y + 0.5; }
      pl.invuln = 5 * 60;
      pl.speedMul = 1.4;
      pl.powerTimer = 5 * 60;
      spawnParticle(pl.x * TILE, pl.y * TILE, 'warp');
      showEvent('⭐ TÉLÉPORTATION ! Invincible 5s', '#ff88cc');
    },
    onPowerEnd(pl) { pl.speedMul = 1; }
  }
];

// ═══════════════════════════════════════════════════
//  DIFFICULTIES
// ═══════════════════════════════════════════════════
const DIFFS = [
  { id: 'easy',   name: 'Cueillette du dimanche', enemyCount: 4, enemySpeed: 0.06, label: 'Facile' },
  { id: 'medium', name: 'Chiens Truffiers',       enemyCount: 6, enemySpeed: 0.08, label: 'Moyen' },
  { id: 'hard',   name: 'Guerre des Spores',      enemyCount: 8, enemySpeed: 0.10, label: 'Difficile' }
];

// ═══════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════
const G = {
  mode: 'solo',
  diff: DIFFS[1],
  started: false,
  paused: true,
  countdown: 0,
  grid: null,       // 2D array of cell objects
  p1: null, p2: null,
  score1: 0, score2: 0,
  lives1: 3, lives2: 3,
  parasites: [],
  particles: [],
  floats: [],
  remaining: 0,
  // Events
  nightMode: false, nightTimer: 0, nightCooldown: 30*60,
  stormActive: false, stormTimer: 0, stormCooldown: 40*60,
  goldenActive: false, goldenTimer: 0, goldenCooldown: 50*60,
  // Layers
  wallLayer: null, pelletLayer: null, floorLayer: null,
};

let sel1 = SPECIES[0], sel2 = SPECIES[1];

// ═══════════════════════════════════════════════════
//  UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════
function dist(ax,ay,bx,by) { return Math.hypot(ax-bx,ay-by); }
function inBounds(x,y) { return x >= 0 && y >= 0 && x < COLS && y < ROWS; }
function isEdge(x,y) { return x === 0 || y === 0 || x === COLS-1 || y === ROWS-1; }
function isWalk(x,y) { return inBounds(x,y) && !G.grid[y][x].wall; }
function isWalkForParasite(x,y) { return isWalk(x,y); }
function canMoveTo(x, y, phase) {
  if (!inBounds(x,y)) return false;
  if (phase && !isEdge(x,y)) return true;
  return !G.grid[y][x].wall;
}

function treeAt(x, y) {
  return ((x * 73856093) ^ (y * 19349663)) & 1;
}

function setWall(x, y) {
  if (!inBounds(x,y) || isEdge(x,y)) return;
  const cell = G.grid[y][x];
  if (cell.wall) return;
  // Don't wall off a player's current tile
  if (G.p1 && Math.floor(G.p1.x) === x && Math.floor(G.p1.y) === y) return;
  if (G.p2 && Math.floor(G.p2.x) === x && Math.floor(G.p2.y) === y) return;
  cell.wall = true;
  if (cell.pellet) { cell.pellet = false; G.remaining--; }
  cell.trap = null;
  cell.bonus = null;
  rebuildWallLayer();
  rebuildPelletLayer();
}

function clampToWalkable(pl) {
  const gx = Math.floor(pl.x), gy = Math.floor(pl.y);
  if (inBounds(gx,gy) && !G.grid[gy][gx].wall) return;
  const spot = findOpen();
  pl.x = spot.x + 0.5; pl.y = spot.y + 0.5;
}

function findOpen() {
  for (let t = 0; t < 4000; t++) {
    const x = (Math.random() * COLS) | 0, y = (Math.random() * ROWS) | 0;
    if (inBounds(x,y) && !G.grid[y][x].wall) return { x, y };
  }
  return { x: 1, y: 1 };
}

function findOpenFar(ref, minDist) {
  for (let t = 0; t < 4000; t++) {
    const x = (Math.random() * COLS) | 0, y = (Math.random() * ROWS) | 0;
    if (inBounds(x,y) && !G.grid[y][x].wall && Math.abs(x-ref.x)+Math.abs(y-ref.y) >= minDist) return { x, y };
  }
  return findOpen();
}

function nearestParasite(pl, filter) {
  let best = null, bestD = Infinity;
  G.parasites.forEach(p => {
    if (filter && !filter(p)) return;
    const d = dist(p.x, p.y, pl.x, pl.y);
    if (d < bestD) { bestD = d; best = p; }
  });
  return best;
}

function findBestSporeCluster(pl) {
  // Find tile with most pellets nearby
  let best = null, bestCount = 0;
  for (let y = 2; y < ROWS-2; y += 3) {
    for (let x = 2; x < COLS-2; x += 3) {
      let count = 0;
      for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
        const nx = x+dx, ny = y+dy;
        if (inBounds(nx,ny) && G.grid[ny][nx].pellet) count++;
      }
      if (count > bestCount) { bestCount = count; best = { x, y }; }
    }
  }
  return best || findOpen();
}

function convertServant(p, ownerPid, duration) {
  p.servant = true;
  p.servantOwner = ownerPid;
  p.servantTimer = duration;
  p.scared = 0; p.confused = 0; p.blind = 0; p.frozen = 0;
  p.path = [];
}

function spawnParticle(x, y, type) {
  G.particles.push({ x, y, life: 120, maxLife: 120, type });
}

function spawnFloat(x, y, text, color) {
  G.floats.push({ x, y, text, color, life: 70 });
}

// ═══════════════════════════════════════════════════
//  MAZE GENERATION (Randomized DFS / Recursive Backtracker)
// ═══════════════════════════════════════════════════
function generateMaze() {
  // Create grid of cell objects
  const grid = [];
  for (let y = 0; y < ROWS; y++) {
    grid[y] = [];
    for (let x = 0; x < COLS; x++) {
      grid[y][x] = { wall: true, pellet: false, trap: null, bonus: null };
    }
  }

  // Carve maze using DFS on a 2-step grid
  const visited = new Set();
  const stack = [];
  const key = (x,y) => `${x},${y}`;

  // Start from (1,1)
  const sx = 1, sy = 1;
  visited.add(key(sx, sy));
  grid[sy][sx].wall = false;
  stack.push([sx, sy]);

  const dirs = [[0,-2],[0,2],[-2,0],[2,0]];

  while (stack.length) {
    const [cx, cy] = stack[stack.length - 1];
    // Shuffle neighbors
    const shuffled = dirs.slice().sort(() => Math.random() - 0.5);
    let found = false;

    for (const [dx, dy] of shuffled) {
      const nx = cx + dx, ny = cy + dy;
      if (nx >= 1 && ny >= 1 && nx < COLS-1 && ny < ROWS-1 && !visited.has(key(nx, ny))) {
        visited.add(key(nx, ny));
        // Carve cell and wall between
        grid[ny][nx].wall = false;
        grid[cy + dy/2][cx + dx/2].wall = false;
        stack.push([nx, ny]);
        found = true;
        break;
      }
    }

    if (!found) stack.pop();
  }

  // Open extra passages for wider corridors and rooms (makes it more playable)
  const openRate = 0.35;
  for (let y = 2; y < ROWS-2; y++) {
    for (let x = 2; x < COLS-2; x++) {
      if (grid[y][x].wall && Math.random() < openRate) {
        // Check if opening this wall connects two open areas
        const adjOpen = [[0,1],[0,-1],[1,0],[-1,0]].filter(([dx,dy]) =>
          inBounds(x+dx,y+dy) && !grid[y+dy][x+dx].wall
        ).length;
        if (adjOpen >= 2) grid[y][x].wall = false;
      }
    }
  }

  // Carve random open rooms (placettes)
  const numRooms = 3 + (Math.random() * 4) | 0;
  for (let r = 0; r < numRooms; r++) {
    const rx = 3 + ((Math.random() * (COLS - 6)) | 0);
    const ry = 3 + ((Math.random() * (ROWS - 6)) | 0);
    const rw = 2 + ((Math.random() * 3) | 0);
    const rh = 2 + ((Math.random() * 3) | 0);
    for (let dy = -rh; dy <= rh; dy++) {
      for (let dx = -rw; dx <= rw; dx++) {
        const nx = rx+dx, ny = ry+dy;
        if (nx >= 1 && ny >= 1 && nx < COLS-1 && ny < ROWS-1) {
          grid[ny][nx].wall = false;
        }
      }
    }
  }

  // Place pellets on all open cells
  let remaining = 0;
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (!grid[y][x].wall) {
        grid[y][x].pellet = true;
        remaining++;
      }
    }
  }

  // Place bonuses (replace some pellets)
  const bonusTypes = ['life', 'speed', 'freeze', 'score'];
  const numBonuses = 8 + ((Math.random() * 6) | 0);
  for (let i = 0; i < numBonuses; i++) {
    const pos = findOpenInGrid(grid);
    if (pos) {
      grid[pos.y][pos.x].bonus = bonusTypes[(Math.random() * bonusTypes.length) | 0];
      grid[pos.y][pos.x].pellet = false;
      remaining--;
    }
  }

  return { grid, remaining };
}

function findOpenInGrid(grid) {
  for (let t = 0; t < 500; t++) {
    const x = 1 + ((Math.random() * (COLS-2)) | 0);
    const y = 1 + ((Math.random() * (ROWS-2)) | 0);
    if (!grid[y][x].wall && grid[y][x].pellet && !grid[y][x].bonus) return { x, y };
  }
  return null;
}

// ═══════════════════════════════════════════════════
//  BFS PATHFINDING
// ═══════════════════════════════════════════════════
function bfs(sx, sy, gx, gy) {
  if (!isWalk(gx, gy)) return [];
  const came = new Map();
  const k = (x,y) => (x << 16) | y;
  const q = [[sx, sy]];
  came.set(k(sx,sy), null);

  while (q.length) {
    const [cx, cy] = q.shift();
    if (cx === gx && cy === gy) break;
    for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const nx = cx+dx, ny = cy+dy;
      const nk = k(nx, ny);
      if (isWalkForParasite(nx, ny) && !came.has(nk)) {
        came.set(nk, [cx, cy]);
        q.push([nx, ny]);
      }
    }
  }

  const path = [];
  let cur = [gx, gy];
  const sk = k(sx, sy);
  while (cur && k(cur[0], cur[1]) !== sk) {
    const prev = came.get(k(cur[0], cur[1]));
    if (!prev) return [];
    path.push(cur);
    cur = prev;
  }
  path.reverse();
  return path;
}

function findNearestPellet(fx, fy) {
  let best = null, bestD = Infinity;
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    if (G.grid[y][x].pellet) {
      const d = Math.abs(x-fx) + Math.abs(y-fy);
      if (d < bestD) { bestD = d; best = [x, y]; }
    }
  }
  return best;
}

// ═══════════════════════════════════════════════════
//  RENDERING LAYERS
// ═══════════════════════════════════════════════════
function makeCanvas(w, h) { const c = document.createElement('canvas'); c.width = w; c.height = h; return c; }

function buildFloorLayer() {
  const c = makeCanvas(W, H);
  const ctx = c.getContext('2d');
  const i = img('sol_foret.png');
  const draw = () => {
    if (i.complete) {
      const pat = ctx.createPattern(i, 'repeat');
      ctx.fillStyle = pat;
      ctx.fillRect(0, 0, W, H);
    }
    G.floorLayer = c;
  };
  if (i.complete) draw();
  else i.addEventListener('load', draw, { once: true });
}

function rebuildWallLayer() {
  const c = makeCanvas(W, H);
  const ctx = c.getContext('2d');
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    if (G.grid[y][x].wall) {
      const src = TREE_IMGS[treeAt(x,y)];
      const ti = img(src);
      const px = x * TILE, py = y * TILE;
      if (ti.complete) ctx.drawImage(ti, px-1, py-1, TILE+2, TILE+2);
      else ti.addEventListener('load', () => ctx.drawImage(ti, px-1, py-1, TILE+2, TILE+2), { once: true });
    }
  }
  G.wallLayer = c;
}

let _pelletDirty = true;
function rebuildPelletLayer() { _pelletDirty = true; }
function _doPelletRebuild() {
  if (!_pelletDirty || !G.grid) return;
  _pelletDirty = false;
  const c = makeCanvas(W, H);
  const ctx = c.getContext('2d');
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    if (G.grid[y][x].pellet) {
      ctx.fillStyle = G.goldenActive ? '#ffd700' : '#ffffff';
      ctx.beginPath();
      ctx.arc(x*TILE + TILE/2, y*TILE + TILE/2, 3, 0, Math.PI*2);
      ctx.fill();
    }
  }
  G.pelletLayer = c;
}

const $ = id => document.getElementById(id);

function updateLives(pid) {
  const el = $(pid === 1 ? 'lives1' : 'lives2');
  const lives = pid === 1 ? G.lives1 : G.lives2;
  el.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'lv' + (i < lives ? '' : ' dead');
    el.appendChild(d);
  }
}

function updateHUD(pl) {
  const pid = pl.pid;
  const sp = pl.species;
  const powBar = $(`pow-bar${pid}`);
  const powLabel = $(`pow-label${pid}`);
  const supBar = $(`sup-bar${pid}`);
  const supLabel = $(`sup-label${pid}`);
  const scoreEl = $(`score${pid}`);

  scoreEl.textContent = pid === 1 ? G.score1 : G.score2;

  // Power bar
  if (pl.powerTimer > 0) {
    const pct = (pl.powerTimer / (pl._powerMax || 1)) * 100;
    powBar.style.width = pct + '%';
    powBar.className = 'bar-fill power active';
    powLabel.textContent = `⚡ ${sp.power} (${Math.ceil(pl.powerTimer/60)}s)`;
  } else if (pl.cooldownTimer > 0) {
    const pct = (1 - pl.cooldownTimer / sp.cooldown) * 100;
    powBar.style.width = pct + '%';
    powBar.className = 'bar-fill power';
    powLabel.textContent = `⏳ Recharge (${Math.ceil(pl.cooldownTimer/60)}s)`;
  } else {
    powBar.style.width = '100%';
    powBar.className = 'bar-fill power';
    powLabel.textContent = `⚡ ${sp.power} — PRÊT`;
  }

  // Super bar
  if (pl.superReady) {
    supBar.style.width = '100%';
    supBar.className = 'bar-fill super ready';
    const key = pid === 1 ? 'Maj.Dr' : 'Espace';
    supLabel.textContent = `★ SUPER PRÊT ! (${key})`;
  } else {
    const prog = pl.spores % SUPER_COST;
    const pct = (prog / SUPER_COST) * 100;
    supBar.style.width = pct + '%';
    supBar.className = 'bar-fill super';
    supLabel.textContent = `★ Super — ${prog}/${SUPER_COST}`;
  }
}

function updateLeader() {
  const el = $('leader-text');
  if (G.mode !== 'duo') { el.textContent = `Spores: ${G.remaining}`; return; }
  if (G.score1 > G.score2) el.textContent = '🔵 J1 mène';
  else if (G.score2 > G.score1) el.textContent = '🔴 J2 mène';
  else el.textContent = '🟰 Égalité';
}

let _eventTimer = null;
function showEvent(msg, color = '#ff8844', ms = 3000) {
  const el = $('event-banner');
  el.textContent = msg; el.style.color = color; el.style.opacity = '1';
  clearTimeout(_eventTimer);
  if (ms > 0) _eventTimer = setTimeout(() => { el.style.opacity = '0'; }, ms);
}

function makePlayer(x, y, pid, species) {
  return {
    pid, species,
    x: x + 0.5, y: y + 0.5,
    dir: [0, 0], nextDir: [0, 0], lastDir: [0, -1],
    speed: 0.12, speedMul: 1,
    powerTimer: 0, _powerMax: 1,
    cooldownTimer: 0,
    invisible: false, shield: false, phase: false,
    invuln: 0, respawnFlash: 0, madness: 0,
    spores: 0, superReady: false,
    _speedBonus: 0,
  };
}

// ═══════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════
const Keys = Object.create(null);
addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  Keys[k] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();

  if (k === 'enter') { triggerPower(1); e.preventDefault(); }
  if (e.code === 'ShiftRight') { triggerSuper(1); e.preventDefault(); }
  if (k === 'f') triggerPower(2);
  if (e.code === 'Space') { triggerSuper(2); e.preventDefault(); }

  if (k === 'p') {
    if (!G.started) return;
    if (G.countdown > 0) return;
    if (G.paused) startCountdown();
    else G.paused = true;
    e.preventDefault();
  }
});
addEventListener('keyup', e => { Keys[e.key.toLowerCase()] = false; });

function getInputDir(pid) {
  const inv = (pid === 1 ? G.p1 : G.p2)?.madness > 0;
  if (pid === 1) {
    if (Keys['arrowup'])    return inv ? [0,1]  : [0,-1];
    if (Keys['arrowdown'])  return inv ? [0,-1] : [0,1];
    if (Keys['arrowleft'])  return inv ? [1,0]  : [-1,0];
    if (Keys['arrowright']) return inv ? [-1,0] : [1,0];
  } else {
    if (Keys['z']) return inv ? [0,1]  : [0,-1];
    if (Keys['s']) return inv ? [0,-1] : [0,1];
    if (Keys['q']) return inv ? [1,0]  : [-1,0];
    if (Keys['d']) return inv ? [-1,0] : [1,0];
  }
  return null;
}

function triggerPower(pid) {
  if (!G.started || G.paused || G.countdown > 0) return;
  const pl = pid === 1 ? G.p1 : G.p2;
  if (!pl) return;
  if (pl.powerTimer > 0 || pl.cooldownTimer > 0) return;

  pl.species.usePower(pl);
  pl._powerMax = pl.powerTimer || 1;
  if (pl.powerTimer <= 1) pl.cooldownTimer = pl.species.cooldown;
  sfxPower();
}

function triggerSuper(pid) {
  if (!G.started || G.paused || G.countdown > 0) return;
  const pl = pid === 1 ? G.p1 : G.p2;
  if (!pl || !pl.superReady) return;

  pl.superReady = false;
  pl.species.useSuper(pl);
  pl._powerMax = pl.powerTimer || 1;
  sfxPower();
}

let overlay = null;

function openMenu() {
  if (overlay) overlay.remove();

  G.paused = true;

  const ov = document.createElement('div');
  ov.className = 'ov';
  const modal = document.createElement('div');
  modal.className = 'modal';
  ov.appendChild(modal);

  modal.innerHTML = `
    <h1>🍄 PACMUSH ODYSSEY 🍄</h1>
    <div class="sub">Choisis le mode, la difficulté et ta variété de champignon.</div>

    <div class="section-title">Mode de jeu</div>
    <div class="row">
      <label class="badge"><input type="radio" name="mode" value="solo" ${G.mode==='solo'?'checked':''}> Solo</label>
      <label class="badge"><input type="radio" name="mode" value="duo" ${G.mode==='duo'?'checked':''}> 2 Joueurs</label>
    </div>

    <div class="section-title">Difficulté</div>
    <div class="row">
      <select id="diffSel">
        ${DIFFS.map(d => `<option value="${d.id}" ${d.id===G.diff.id?'selected':''}>${d.name} — ${d.label}</option>`).join('')}
      </select>
    </div>

    <div class="section-title">Joueur 1 — Variété</div>
    <div class="grid" id="grid1"></div>

    <div class="section-title" id="sec2" style="display:${G.mode==='duo'?'':'none'}">Joueur 2 — Variété</div>
    <div class="grid" id="grid2" style="display:${G.mode==='duo'?'':'none'}"></div>

    <div style="display:flex;justify-content:flex-end;margin-top:16px">
      <button class="btn" id="playBtn">Jouer</button>
    </div>
  `;

  document.body.appendChild(ov);
  overlay = ov;

  const grid1 = modal.querySelector('#grid1');
  const grid2 = modal.querySelector('#grid2');
  const sec2 = modal.querySelector('#sec2');
  const playBtn = modal.querySelector('#playBtn');
  const diffSel = modal.querySelector('#diffSel');

  function isDuo() { return modal.querySelector('input[name=mode]:checked')?.value === 'duo'; }

  function renderCards() {
    const duo = isDuo();
    grid1.innerHTML = '';
    grid2.innerHTML = '';
    sec2.style.display = duo ? '' : 'none';
    grid2.style.display = duo ? '' : 'none';

    SPECIES.forEach(sp => {
      grid1.appendChild(makeCard(sp, 1, duo));
      if (duo) grid2.appendChild(makeCard(sp, 2, duo));
    });

    // Update play button
    if (duo && sel1.id === sel2.id) {
      playBtn.disabled = true;
      playBtn.textContent = 'Choisissez 2 espèces différentes';
    } else {
      playBtn.disabled = false;
      playBtn.textContent = 'Jouer';
    }
  }

  function makeCard(sp, forPid, duo) {
    const sel = forPid === 1 ? sel1 : sel2;
    const other = forPid === 1 ? sel2 : sel1;
    const disabled = duo && sp.id === other.id;

    const div = document.createElement('div');
    div.className = 'choice' + (sel.id === sp.id ? ' selected' : '') + (disabled ? ' disabled' : '');

    div.innerHTML = `
      <img src="${SPRITES[sp.id]}" alt="${sp.name}">
      <div>
        <div class="name">${sp.name}</div>
        <div class="desc">${sp.powerDesc}</div>
        <div class="powers">
          <div style="color:#88ccff"><b>⚡</b> ${sp.power} (recharge ${(sp.cooldown/60)|0}s)</div>
          <div style="color:#ffd700"><b>★</b> ${sp.superDesc}</div>
        </div>
      </div>
    `;

    if (!disabled) {
      div.addEventListener('click', () => {
        if (forPid === 1) sel1 = sp; else sel2 = sp;
        renderCards();
      });
    }
    return div;
  }

  // Mode change
  modal.addEventListener('change', e => {
    if (e.target.name === 'mode') renderCards();
  });

  playBtn.addEventListener('click', () => {
    if (playBtn.disabled) return;
    const d = DIFFS.find(d => d.id === diffSel.value);
    if (d) G.diff = d;
    G.mode = isDuo() ? 'duo' : 'solo';
    overlay.remove();
    overlay = null;
    startGame();
  });

  renderCards();
}

// ═══════════════════════════════════════════════════
//  GAME START / RESET
// ═══════════════════════════════════════════════════
function startGame() {
  // Generate fresh maze
  const { grid, remaining } = generateMaze();
  G.grid = grid;
  G.remaining = remaining;

  G.score1 = 0; G.score2 = 0;
  G.lives1 = 3; G.lives2 = 3;
  G.parasites = [];
  G.particles = [];
  G.floats = [];
  G.nightMode = false; G.nightTimer = 0; G.nightCooldown = 30*60;
  G.stormActive = false; G.stormTimer = 0; G.stormCooldown = 40*60;
  G.goldenActive = false; G.goldenTimer = 0; G.goldenCooldown = 50*60;

  // Place players
  const p1pos = findOpen();
  G.p1 = makePlayer(p1pos.x, p1pos.y, 1, sel1);
  G.grid[p1pos.y][p1pos.x].pellet = false; G.remaining--;

  if (G.mode === 'duo') {
    const p2pos = findOpenFar(p1pos, 10);
    G.p2 = makePlayer(p2pos.x, p2pos.y, 2, sel2);
    G.grid[p2pos.y][p2pos.x].pellet = false; G.remaining--;
  } else {
    G.p2 = null;
  }

  // Spawn parasites
  const count = G.diff.enemyCount;
  for (let i = 0; i < count; i++) spawnParasite();

  // Build rendering layers
  buildFloorLayer();
  rebuildWallLayer();
  rebuildPelletLayer();

  // Update HUD
  $('pbox2').style.display = G.mode === 'duo' ? 'flex' : 'none';
  $('mode-label').textContent = G.mode === 'duo' ? '2 Joueurs' : 'Solo';
  $('diff-label').textContent = G.diff.name;

  const setSpeciesHUD = (pid, sp) => {
    $(`sp-icon${pid}`).src = SPRITES[sp.id];
    $(`sp-name${pid}`).textContent = sp.name;
  };
  setSpeciesHUD(1, sel1);
  if (G.mode === 'duo') setSpeciesHUD(2, sel2);

  updateLives(1); updateLives(2);
  updateHUD(G.p1);
  if (G.p2) updateHUD(G.p2);
  updateLeader();

  G.started = true;
  G.paused = false;
  startCountdown();
}

function spawnParasite() {
  const pos = findOpen();
  G.parasites.push({
    x: pos.x + 0.5, y: pos.y + 0.5,
    dir: [1, 0], path: [],
    speed: G.diff.enemySpeed,
    kind: 1 + ((Math.random() * 7) | 0),
    scared: 0, blind: 0, confused: 0, frozen: 0,
    servant: false, servantOwner: 0, servantTimer: 0,
    state: 'wander', target: null,
  });
}

function startCountdown() {
  G.countdown = 180; // 3 seconds
  G.paused = false;
}

// ═══════════════════════════════════════════════════
//  UPDATE LOOP
// ═══════════════════════════════════════════════════
function updatePlayer(pl, dt) {
  if (!pl) return;

  // Timers
  if (pl.invuln > 0) pl.invuln -= dt;
  if (pl.respawnFlash > 0) pl.respawnFlash -= dt;
  if (pl.madness > 0) pl.madness -= dt;
  if (pl._speedBonus > 0) {
    pl._speedBonus -= dt;
    if (pl._speedBonus <= 0 && pl.powerTimer <= 0) pl.speedMul = 1;
  }

  // Power timer
  if (pl.powerTimer > 0) {
    pl.powerTimer -= dt;
    if (pl.powerTimer <= 0) {
      pl.powerTimer = 0;
      pl.species.onPowerEnd(pl);
      pl.cooldownTimer = pl.species.cooldown;
    }
  }

  // Cooldown timer
  if (pl.cooldownTimer > 0) {
    pl.cooldownTimer -= dt;
    if (pl.cooldownTimer < 0) pl.cooldownTimer = 0;
  }

  // Movement
  const input = getInputDir(pl.pid);
  if (input) pl.nextDir = input;

  const spd = pl.speed * (pl.speedMul || 1) * dt;
  const gx = Math.floor(pl.x), gy = Math.floor(pl.y);
  const cx = gx + 0.5, cy = gy + 0.5;

  // Try next direction
  if (pl.nextDir[0] !== 0 || pl.nextDir[1] !== 0) {
    const ntx = gx + pl.nextDir[0], nty = gy + pl.nextDir[1];
    if (canMoveTo(ntx, nty, pl.phase)) {
      // Snap to center of tile on the perpendicular axis before turning
      if (pl.nextDir[0] !== 0 && Math.abs(pl.y - cy) < 0.15) {
        pl.y = cy;
        pl.dir = pl.nextDir.slice();
        pl.lastDir = pl.dir.slice();
      } else if (pl.nextDir[1] !== 0 && Math.abs(pl.x - cx) < 0.15) {
        pl.x = cx;
        pl.dir = pl.nextDir.slice();
        pl.lastDir = pl.dir.slice();
      }
    }
  }

  // Move in current direction
  if (pl.dir[0] !== 0 || pl.dir[1] !== 0) {
    const nx = pl.x + pl.dir[0] * spd;
    const ny = pl.y + pl.dir[1] * spd;
    const ntx = Math.floor(nx + pl.dir[0] * 0.4);
    const nty = Math.floor(ny + pl.dir[1] * 0.4);

    if (canMoveTo(ntx, nty, pl.phase)) {
      pl.x = nx;
      pl.y = ny;
    } else {
      // Stop at edge of current tile
      if (pl.dir[0] > 0) pl.x = Math.floor(pl.x) + 0.5;
      if (pl.dir[0] < 0) pl.x = Math.floor(pl.x) + 0.5;
      if (pl.dir[1] > 0) pl.y = Math.floor(pl.y) + 0.5;
      if (pl.dir[1] < 0) pl.y = Math.floor(pl.y) + 0.5;
    }
  }

  // Collect pellets
  const px = Math.floor(pl.x), py = Math.floor(pl.y);
  if (inBounds(px, py)) {
    const cell = G.grid[py][px];
    if (cell.pellet) {
      cell.pellet = false;
      G.remaining--;
      rebuildPelletLayer();

      let pts = 10;
      if (G.goldenActive) pts = 50;
      if (pl.pid === 1) G.score1 += pts; else G.score2 += pts;
      pl.spores++;

      if (pts > 10) spawnFloat(pl.x * TILE, pl.y * TILE, `+${pts}`, '#ffd700');

      // Super charge
      if (pl.spores > 0 && pl.spores % SUPER_COST === 0 && !pl.superReady) {
        pl.superReady = true;
        const key = pl.pid === 1 ? 'Maj.Dr' : 'Espace';
        showEvent(`★ SUPER CHARGÉ J${pl.pid} ! (${key})`, '#ffd700', 2500);
      }
      sfxEat();
      updateLeader();
    }

    // Collect bonus
    if (cell.bonus) {
      collectBonus(pl, cell);
    }

    // Step on trap
    if (cell.trap && cell.trap.owner !== pl.pid) {
      cell.trap = null;
      // Teleport player to random spot
      const spot = findOpen();
      pl.x = spot.x + 0.5; pl.y = spot.y + 0.5;
      pl.dir = [0, 0];
      sfxHit();
      spawnFloat(pl.x * TILE, pl.y * TILE, 'PIÈGE!', '#ff4444');
    }
  }
}

function collectBonus(pl, cell) {
  const kind = cell.bonus;
  cell.bonus = null;
  rebuildPelletLayer();

  switch (kind) {
    case 'life':
      if (pl.pid === 1) G.lives1 = Math.min(G.lives1+1, 5);
      else G.lives2 = Math.min(G.lives2+1, 5);
      updateLives(pl.pid);
      sfxLife();
      spawnFloat(pl.x*TILE, pl.y*TILE, '+1 ❤️', '#ff5c6c');
      break;
    case 'speed':
      pl.speedMul = Math.max(pl.speedMul, 1.5);
      pl._speedBonus = 5 * 60; // 5 seconds in frames
      sfxPower();
      spawnFloat(pl.x*TILE, pl.y*TILE, 'SPEED!', '#88ccff');
      break;
    case 'freeze':
      G.parasites.forEach(p => { p.frozen = Math.max(p.frozen, 3*60); });
      sfxPower();
      spawnFloat(pl.x*TILE, pl.y*TILE, 'FREEZE!', '#88eeff');
      break;
    case 'score':
      const pts = 200;
      if (pl.pid === 1) G.score1 += pts; else G.score2 += pts;
      sfxPower();
      spawnFloat(pl.x*TILE, pl.y*TILE, `+${pts}`, '#ffdd00');
      updateLeader();
      break;
  }
}

function updateParasites(dt) {
  G.parasites.forEach(p => {
    // Timers
    if (p.frozen > 0) { p.frozen -= dt; return; }
    if (p.confused > 0) {
      p.confused -= dt;
      // Wander randomly
      const spd = p.speed * dt * 0.4;
      if (!p.path || p.path.length === 0 || Math.random() < 0.1) {
        const gx = Math.floor(p.x), gy = Math.floor(p.y);
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]].filter(([dx,dy]) => isWalkForParasite(gx+dx,gy+dy));
        if (dirs.length) {
          const [dx,dy] = dirs[(Math.random()*dirs.length)|0];
          p.path = [[gx+dx, gy+dy]];
        }
      }
      moveAlongPath(p, spd);
      checkParasiteHit(p);
      return;
    }

    // Servant mode
    if (p.servant) {
      p.servantTimer -= dt;
      if (p.servantTimer <= 0) { p.servant = false; p.servantOwner = 0; p.path = []; return; }
      // Collect pellets for owner
      const gx = Math.floor(p.x), gy = Math.floor(p.y);
      const target = findNearestPellet(gx, gy);
      if (target) {
        if (!p.path || p.path.length === 0) p.path = bfs(gx, gy, target[0], target[1]);
        moveAlongPath(p, p.speed * dt * 1.1);
        // Collect
        const px2 = Math.floor(p.x), py2 = Math.floor(p.y);
        if (inBounds(px2,py2) && G.grid[py2][px2].pellet) {
          G.grid[py2][px2].pellet = false;
          G.remaining--;
          rebuildPelletLayer();
          if (p.servantOwner === 1) G.score1 += 10; else G.score2 += 10;
          sfxEat();
          updateLeader();
        }
      }
      return;
    }

    // Scared mode
    if (p.scared > 0) {
      p.scared -= dt;
      // Flee from nearest player
      const pl = nearestPlayer(p);
      if (pl) {
        const gx = Math.floor(p.x), gy = Math.floor(p.y);
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]].filter(([dx,dy]) => isWalkForParasite(gx+dx,gy+dy));
        if (dirs.length) {
          // Pick direction that maximizes distance from player
          dirs.sort((a,b) => {
            const dA = dist(gx+a[0]+0.5, gy+a[1]+0.5, pl.x, pl.y);
            const dB = dist(gx+b[0]+0.5, gy+b[1]+0.5, pl.x, pl.y);
            return dB - dA;
          });
          const [dx,dy] = dirs[0];
          p.path = [[gx+dx, gy+dy]];
        }
      }
      moveAlongPath(p, p.speed * dt * 0.7);
      return;
    }

    // Blind mode
    if (p.blind > 0) {
      p.blind -= dt;
      const spd = p.speed * dt * 0.3;
      if (!p.path || p.path.length === 0 || Math.random() < 0.15) {
        const gx = Math.floor(p.x), gy = Math.floor(p.y);
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]].filter(([dx,dy]) => isWalkForParasite(gx+dx,gy+dy));
        if (dirs.length) {
          const [dx,dy] = dirs[(Math.random()*dirs.length)|0];
          p.path = [[gx+dx, gy+dy]];
        }
      }
      moveAlongPath(p, spd);
      return;
    }

    // Normal AI: chase or wander
    const gx = Math.floor(p.x), gy = Math.floor(p.y);
    const target = nearestVisiblePlayer(p);

    if (target) {
      const tgx = Math.floor(target.x), tgy = Math.floor(target.y);
      if (!p.path || p.path.length === 0 || Math.random() < 0.05) {
        p.path = bfs(gx, gy, tgx, tgy);
      }
      const stormMul = G.stormActive ? 1.5 : 1;
      moveAlongPath(p, p.speed * dt * stormMul);
    } else {
      // Wander
      if (!p.path || p.path.length === 0) {
        const wt = findOpen();
        p.path = bfs(gx, gy, wt.x, wt.y);
      }
      moveAlongPath(p, p.speed * dt * 0.8);
    }

    checkParasiteHit(p);
  });
}

function nearestPlayer(p) {
  let best = null, bestD = Infinity;
  [G.p1, G.p2].forEach(pl => {
    if (!pl) return;
    const d = dist(p.x, p.y, pl.x, pl.y);
    if (d < bestD) { bestD = d; best = pl; }
  });
  return best;
}

function nearestVisiblePlayer(p) {
  let best = null, bestD = Infinity;
  [G.p1, G.p2].forEach(pl => {
    if (!pl) return;
    if (pl.invisible) return;
    const d = dist(p.x, p.y, pl.x, pl.y);
    if (d < 12 && d < bestD) { bestD = d; best = pl; }
  });
  return best;
}

function moveAlongPath(p, spd) {
  if (!p.path || p.path.length === 0) return;
  const [tx, ty] = p.path[0];
  const targetX = tx + 0.5, targetY = ty + 0.5;
  const dx = targetX - p.x, dy = targetY - p.y;
  const len = Math.hypot(dx, dy) || 1;
  p.x += (dx/len) * Math.min(spd, len);
  p.y += (dy/len) * Math.min(spd, len);
  p.dir = [Math.sign(dx), Math.sign(dy)];
  if (Math.abs(p.x - targetX) < 0.08 && Math.abs(p.y - targetY) < 0.08) {
    p.x = targetX; p.y = targetY;
    p.path.shift();
  }

  // Clamp to walkable
  const gx2 = Math.floor(p.x), gy2 = Math.floor(p.y);
  if (!inBounds(gx2,gy2) || G.grid[gy2][gx2].wall) {
    const spot = findOpen();
    p.x = spot.x + 0.5; p.y = spot.y + 0.5;
    p.path = [];
  }

  // Step on trap
  if (inBounds(gx2,gy2) && G.grid[gy2][gx2].trap) {
    G.grid[gy2][gx2].trap = null;
    const spot = findOpen();
    p.x = spot.x + 0.5; p.y = spot.y + 0.5;
    p.path = [];
    sfxHit();
  }
}

function checkParasiteHit(p) {
  if (p.servant) return;
  [G.p1, G.p2].forEach(pl => {
    if (!pl) return;
    if (dist(p.x, p.y, pl.x, pl.y) < 0.55) {
      playerHit(pl, p);
    }
  });
}

function playerHit(pl, hitter) {
  if (pl.invuln > 0 || pl.invisible || pl.respawnFlash > 0) return;

  // Shield absorb
  if (pl.shield) {
    pl.shield = false;
    if (hitter) {
      hitter.scared = Math.max(hitter.scared, 3*60);
      hitter.path = [];
      // Push hitter away
      const dx = hitter.x - pl.x, dy = hitter.y - pl.y;
      const len = Math.hypot(dx,dy) || 1;
      hitter.x += (dx/len)*2; hitter.y += (dy/len)*2;
    }
    sfxPower();
    spawnFloat(pl.x*TILE, pl.y*TILE, 'BOUCLIER!', '#ffdd88');
    return;
  }

  // Lose life
  sfxHit();
  if (pl.pid === 1) { G.lives1--; updateLives(1); }
  else { G.lives2--; updateLives(2); }

  const lives = pl.pid === 1 ? G.lives1 : G.lives2;

  if (lives < 0) {
    // Game over check
    if (G.mode === 'solo') {
      endMatch('Défaite !');
    } else {
      if (G.lives1 < 0 && G.lives2 < 0) endMatch('Match nul — tous éliminés !');
      else if (G.lives1 < 0) endMatch('J2 gagne — J1 éliminé !');
      else endMatch('J1 gagne — J2 éliminé !');
    }
    return;
  }

  // Respawn
  const spot = findOpen();
  pl.x = spot.x + 0.5; pl.y = spot.y + 0.5;
  pl.dir = [0,0]; pl.nextDir = [0,0];
  pl.respawnFlash = 3*60;
  pl.invuln = 2*60;
  pl.invisible = false; pl.phase = false; pl.shield = false;
  pl.speedMul = 1; pl.powerTimer = 0;
  pl.species.onPowerEnd(pl);
}

function endMatch(message) {
  G.paused = true;
  G.started = false;

  const ov = document.createElement('div');
  ov.className = 'ov';
  const modal = document.createElement('div');
  modal.className = 'modal';
  modal.style.textAlign = 'center';
  modal.style.maxWidth = '500px';
  ov.appendChild(modal);

  modal.innerHTML = `
    <h1 style="margin-bottom:12px">${message}</h1>
    <div class="sub">${G.mode === 'duo'
      ? `Scores — J1: ${G.score1} · J2: ${G.score2}`
      : `Score : ${G.score1}`
    }</div>
    <button class="btn" style="margin-top:16px" id="replayBtn">Rejouer</button>
  `;

  document.body.appendChild(ov);
  modal.querySelector('#replayBtn').addEventListener('click', () => {
    ov.remove();
    openMenu();
  });
}

// ═══════════════════════════════════════════════════
//  RANDOM EVENTS
// ═══════════════════════════════════════════════════
function updateEvents(dt) {
  // Night mode
  if (G.nightCooldown > 0) G.nightCooldown -= dt;
  else if (!G.nightMode && Math.random() < 0.0003 * dt) {
    G.nightMode = true; G.nightTimer = 8*60;
    showEvent('🌑 NUIT NOIRE ! Visibilité réduite 8s', '#aacfff', 0);
  }
  if (G.nightMode) {
    G.nightTimer -= dt;
    if (G.nightTimer <= 0) { G.nightMode = false; G.nightCooldown = 35*60; showEvent(''); }
  }

  // Storm
  if (G.stormCooldown > 0) G.stormCooldown -= dt;
  else if (!G.stormActive && Math.random() < 0.00025 * dt) {
    G.stormActive = true; G.stormTimer = 6*60;
    showEvent('⚡ TEMPÊTE ! Parasites enragés 6s', '#ffdd00', 0);
  }
  if (G.stormActive) {
    G.stormTimer -= dt;
    if (G.stormTimer <= 0) { G.stormActive = false; G.stormCooldown = 40*60; showEvent(''); }
  }

  // Golden spore
  if (G.goldenCooldown > 0) G.goldenCooldown -= dt;
  else if (!G.goldenActive && Math.random() < 0.0002 * dt) {
    G.goldenActive = true; G.goldenTimer = 8*60;
    rebuildPelletLayer();
    showEvent('✨ SPORE DORÉE ! ×5 points 8s', '#ffd700', 0);
  }
  if (G.goldenActive) {
    G.goldenTimer -= dt;
    if (G.goldenTimer <= 0) { G.goldenActive = false; G.goldenCooldown = 55*60; rebuildPelletLayer(); showEvent(''); }
  }
}

// ═══════════════════════════════════════════════════
//  MAIN UPDATE
// ═══════════════════════════════════════════════════
function update(dt) {
  if (!G.grid) return;

  updateEvents(dt);
  updatePlayer(G.p1, dt);
  if (G.mode === 'duo' && G.p2) updatePlayer(G.p2, dt);
  updateParasites(dt);

  // Update HUDs
  if (G.p1) updateHUD(G.p1);
  if (G.p2) updateHUD(G.p2);

  // Particles
  for (let i = G.particles.length - 1; i >= 0; i--) {
    G.particles[i].life -= dt;
    if (G.particles[i].life <= 0) G.particles.splice(i, 1);
  }
  // Floats
  for (let i = G.floats.length - 1; i >= 0; i--) {
    G.floats[i].life -= dt;
    G.floats[i].y -= 0.5 * dt;
    if (G.floats[i].life <= 0) G.floats.splice(i, 1);
  }

  // Win check
  if (G.remaining <= 0) {
    sfxWin();
    if (G.mode === 'duo') {
      if (G.score1 > G.score2) endMatch('🎉 J1 gagne au score !');
      else if (G.score2 > G.score1) endMatch('🎉 J2 gagne au score !');
      else endMatch('🎉 Égalité parfaite !');
    } else {
      endMatch('🎉 Victoire !');
    }
  }
}

// ═══════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════
function draw() {
  CTX.clearRect(0, 0, W, H);

  // Floor
  if (G.floorLayer) CTX.drawImage(G.floorLayer, 0, 0);
  else { CTX.fillStyle = '#1a1520'; CTX.fillRect(0, 0, W, H); }

  if (!G.grid) {
    // Title screen
    CTX.fillStyle = '#ffffff';
    CTX.font = 'bold 28px system-ui';
    CTX.textAlign = 'center';
    CTX.fillText('🍄 PACMUSH ODYSSEY 🍄', W/2, H/2 - 20);
    CTX.font = '16px system-ui';
    CTX.fillStyle = '#ffffff88';
    CTX.fillText('Appuyez sur un bouton pour commencer', W/2, H/2 + 20);
    return;
  }

  // Pellets (rebuild if dirty)
  _doPelletRebuild();
  if (G.pelletLayer) CTX.drawImage(G.pelletLayer, 0, 0);

  // Bonuses
  const t = performance.now();
  for (let y = 0; y < ROWS; y++) for (let x = 0; x < COLS; x++) {
    const cell = G.grid[y][x];
    if (cell.bonus) {
      const px = x*TILE + TILE/2, py = y*TILE + TILE/2;
      const bob = Math.sin(t/300 + x + y) * 2;
      const colors = { life: '#ff5c6c', speed: '#88ccff', freeze: '#88eeff', score: '#ffdd00' };
      const icons = { life: '❤', speed: '⚡', freeze: '❄', score: '💰' };
      CTX.save();
      CTX.font = '14px system-ui';
      CTX.textAlign = 'center';
      CTX.textBaseline = 'middle';
      CTX.fillStyle = colors[cell.bonus] || '#fff';
      CTX.fillText(icons[cell.bonus] || '?', px, py + bob);
      CTX.restore();
    }
    // Traps
    if (cell.trap) {
      const px = x*TILE + TILE/2, py = y*TILE + TILE/2;
      CTX.save();
      CTX.globalAlpha = 0.3 + 0.1 * Math.sin(t/200 + x*3);
      CTX.fillStyle = '#44ff44';
      CTX.beginPath();
      CTX.ellipse(px, py, 8, 5, 0, 0, Math.PI*2);
      CTX.fill();
      CTX.restore();
    }
  }

  // Walls
  if (G.wallLayer) CTX.drawImage(G.wallLayer, 0, 0);

  // Particles
  G.particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    const r = (1 - alpha) * 40;
    CTX.save();
    CTX.globalAlpha = alpha * 0.4;
    CTX.fillStyle = p.type === 'spore' ? '#cc88ff' : '#88ccff';
    CTX.beginPath();
    CTX.arc(p.x, p.y, r, 0, Math.PI*2);
    CTX.fill();
    CTX.restore();
  });

  // Parasites
  G.parasites.forEach(p => {
    const px = p.x * TILE, py = p.y * TILE;
    const size = TILE * 1.1;

    CTX.save();
    if (p.frozen > 0) CTX.globalAlpha = 0.5;
    if (p.confused > 0) {
      const wobble = Math.sin(t/100) * 3;
      CTX.translate(wobble, 0);
    }
    if (p.servant) {
      // Draw glow for servant
      const color = p.servantOwner === 1 ? '#4a90d9' : '#d94a4a';
      CTX.shadowColor = color;
      CTX.shadowBlur = 10;
    }
    if (p.scared > 0) CTX.globalAlpha = 0.6;

    const sprite = PARASITE_SPRITES[p.kind];
    if (sprite) drawImg(sprite, px, py, size);

    if (p.frozen > 0) {
      CTX.globalAlpha = 0.4;
      CTX.fillStyle = '#aaddff';
      CTX.beginPath();
      CTX.arc(px, py, 12, 0, Math.PI*2);
      CTX.fill();
    }
    CTX.restore();
  });

  // Players
  if (G.p1) drawPlayer(G.p1);
  if (G.p2) drawPlayer(G.p2);

  // Floating texts
  G.floats.forEach(f => {
    const alpha = Math.min(1, f.life / 20);
    CTX.save();
    CTX.globalAlpha = alpha;
    CTX.font = 'bold 13px system-ui';
    CTX.textAlign = 'center';
    CTX.lineWidth = 3;
    CTX.strokeStyle = 'rgba(0,0,0,0.7)';
    CTX.strokeText(f.text, f.x, f.y);
    CTX.fillStyle = f.color;
    CTX.fillText(f.text, f.x, f.y);
    CTX.restore();
  });

  // Night mode overlay
  if (G.nightMode) drawNight();

  // Storm indicator
  if (G.stormActive) {
    CTX.save();
    CTX.font = 'bold 13px system-ui';
    CTX.textAlign = 'right';
    CTX.fillStyle = '#ffdd00';
    CTX.fillText(`⚡ Tempête: ${Math.ceil(G.stormTimer/60)}s`, W-8, 20);
    CTX.restore();
  }

  // Golden indicator
  if (G.goldenActive) {
    CTX.save();
    CTX.font = 'bold 13px system-ui';
    CTX.textAlign = 'right';
    CTX.fillStyle = '#ffd700';
    CTX.fillText(`✨ ×5: ${Math.ceil(G.goldenTimer/60)}s`, W-8, G.stormActive ? 38 : 20);
    CTX.restore();
  }

  // Countdown
  if (G.countdown > 0) {
    const sec = Math.ceil(G.countdown / 60);
    CTX.save();
    CTX.fillStyle = 'rgba(0,0,0,0.5)';
    CTX.fillRect(0, 0, W, H);
    CTX.font = 'bold 64px system-ui';
    CTX.textAlign = 'center';
    CTX.textBaseline = 'middle';
    CTX.fillStyle = '#ffffff';
    CTX.fillText(sec, W/2, H/2);
    CTX.restore();
  }

  // Pause
  if (G.paused && G.started && G.countdown <= 0) {
    CTX.save();
    CTX.fillStyle = 'rgba(0,0,0,0.5)';
    CTX.fillRect(0, 0, W, H);
    CTX.font = 'bold 32px system-ui';
    CTX.textAlign = 'center';
    CTX.textBaseline = 'middle';
    CTX.fillStyle = '#ffffff';
    CTX.fillText('⏸ PAUSE', W/2, H/2 - 15);
    CTX.font = '16px system-ui';
    CTX.fillStyle = '#ffffff88';
    CTX.fillText('Appuyez sur P pour reprendre', W/2, H/2 + 20);
    CTX.restore();
  }
}

function drawPlayer(pl) {
  const px = pl.x * TILE, py = pl.y * TILE;
  const size = TILE * 1.15;
  const t = performance.now();

  // Respawn flash
  if (pl.respawnFlash > 0 && ((t / 120) | 0) % 2 === 0) return;

  CTX.save();

  // Invisibility effect
  if (pl.invisible) CTX.globalAlpha = 0.3;

  // Invulnerability glow
  if (pl.invuln > 0) {
    const color = pl.pid === 1 ? '#4a90d9' : '#d94a4a';
    CTX.shadowColor = color;
    CTX.shadowBlur = 15 + 5 * Math.sin(t/150);
  }

  // Draw mushroom sprite
  const sprite = SPRITES[pl.species.id];
  if (sprite) drawImg(sprite, px, py, size);

  // Shield indicator
  if (pl.shield) {
    CTX.beginPath();
    CTX.arc(px, py, 14 + 3*Math.sin(t/200), 0, Math.PI*2);
    CTX.lineWidth = 2;
    CTX.strokeStyle = 'rgba(255,230,160,0.6)';
    CTX.stroke();
  }

  // Phase effect
  if (pl.phase) {
    CTX.beginPath();
    CTX.arc(px, py, 12, 0, Math.PI*2);
    CTX.lineWidth = 1.5;
    CTX.strokeStyle = `rgba(170,255,170,${0.3 + 0.2*Math.sin(t/150)})`;
    CTX.stroke();
  }

  // Madness indicator
  if (pl.madness > 0) {
    CTX.font = '12px system-ui';
    CTX.textAlign = 'center';
    CTX.fillStyle = '#cc88ff';
    CTX.fillText('😵', px, py - 18);
  }

  // Power timer countdown
  if (pl.powerTimer > 1) {
    const sec = Math.ceil(pl.powerTimer / 60);
    CTX.font = 'bold 10px system-ui';
    CTX.textAlign = 'center';
    CTX.textBaseline = 'middle';
    CTX.lineWidth = 2;
    CTX.strokeStyle = 'rgba(0,0,0,0.8)';
    CTX.strokeText(sec, px, py);
    CTX.fillStyle = '#ffffff';
    CTX.fillText(sec, px, py);
  }

  CTX.restore();
}

function drawNight() {
  CTX.save();
  CTX.fillStyle = 'rgba(0,0,15,0.82)';
  CTX.fillRect(0, 0, W, H);

  // Light around players
  const drawLight = (pl) => {
    if (!pl) return;
    const px = pl.x * TILE, py = pl.y * TILE;
    const r = 80 + 8 * Math.sin(performance.now()/300);
    CTX.globalCompositeOperation = 'destination-out';
    const grad = CTX.createRadialGradient(px, py, 0, px, py, r);
    grad.addColorStop(0, 'rgba(255,240,180,0.9)');
    grad.addColorStop(0.7, 'rgba(255,240,180,0.3)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    CTX.fillStyle = grad;
    CTX.beginPath();
    CTX.arc(px, py, r, 0, Math.PI*2);
    CTX.fill();
  };
  drawLight(G.p1);
  if (G.mode === 'duo') drawLight(G.p2);

  CTX.globalCompositeOperation = 'source-over';
  CTX.font = 'bold 13px system-ui';
  CTX.textAlign = 'right';
  CTX.fillStyle = '#aacfff';
  CTX.fillText(`🌑 Nuit: ${Math.ceil(G.nightTimer/60)}s`, W-8, 8);
  CTX.restore();
}

// ═══════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════
let lastTime = performance.now();

function loop() {
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 16.666, 3); // cap at 3x speed
  lastTime = now;

  if (G.countdown > 0) {
    G.countdown -= dt;
    if (G.countdown < 0) G.countdown = 0;
  } else if (!G.paused && G.started) {
    update(dt);
  }

  draw();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
openMenu();
loop();
</script>
