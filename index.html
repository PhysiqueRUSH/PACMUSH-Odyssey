<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PACMUSH ODYSSEY</title>
<style>
:root{--bg:#0b0a0e;--card:#16131b;--line:#ffffff22;--text:#fff7ea;--p1:#4a90d9;--p2:#d94a4a}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center}
#wrap{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px;width:100%}
#hud{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;width:1100px;max-width:95vw;align-items:stretch;user-select:none}
.pbox{background:var(--card);border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;gap:5px;min-height:128px}
.pbox.p1{border:1.5px solid #4a90d966}
.pbox.p2{border:1.5px solid #d94a4a66}
.ptop{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800}
.score-big{font-size:18px;font-weight:800;margin-left:auto}
.p1 .score-big{color:#88bbff}
.p2 .score-big{color:#ff9999}
.lives{display:flex;gap:3px}
.lv{width:10px;height:10px;border-radius:50%;background:#ff5c6c;box-shadow:0 0 5px #ff5c6c88}
.lv.dead{background:#ffffff18;box-shadow:none}
.bar-row{display:flex;flex-direction:column;gap:2px}
.bar-label{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-bg{height:5px;background:#ffffff10;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .1s linear}
.bar-fill.power{background:linear-gradient(90deg,#4a90d9,#88ccff)}
.bar-fill.power.active{background:linear-gradient(90deg,#00cc44,#88ffaa)}
.bar-fill.super{background:linear-gradient(90deg,#cc6600,#ffd700)}
.bar-fill.super.ready{background:linear-gradient(90deg,#ffd700,#ffee88);animation:pulse .8s ease-in-out infinite}
.bar-fill.health{background:linear-gradient(90deg,#2a7a2a,#66dd66);transition:width .25s linear}
.bar-row.placeholder{visibility:hidden}
/* Gamepad-navigable focus */
.nav-focus{outline:3px solid #ffdd44 !important;outline-offset:3px;box-shadow:0 0 0 6px #ffdd4433,0 0 22px #ffdd4488 !important;position:relative;z-index:2;transition:outline-color .1s}
.choice.nav-focus{outline:3px solid #ffdd44 !important}
.btn.nav-focus,.badge.nav-focus,select.nav-focus,.evt-opt.nav-focus{outline:3px solid #ffdd44 !important;outline-offset:2px}
.bar-fill.health.low{background:linear-gradient(90deg,#aa4444,#ff8888);animation:pulse .7s ease-in-out infinite}
.p2 .bar-fill.power{background:linear-gradient(90deg,#d94a4a,#ff9999)}
.p2 .bar-fill.power.active{background:linear-gradient(90deg,#00cc44,#88ffaa)}
#hud.duo-swap #pbox1{grid-column:3}
#hud.duo-swap #pbox2{grid-column:1}
#kb.hide-p2 .k-p2{display:none}
.mante-card{border:1px solid #4a9b4a55 !important}
.mante-card.selected{outline-color:#4a9b4a !important;box-shadow:0 0 0 4px #4a9b4a33 !important}
.combo-hud{font-size:11px;font-weight:800;color:#ffcc00;min-height:14px}
#hud-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 12px;background:var(--card);border-radius:12px;border:1px solid var(--line);min-width:160px}
#event-banner{min-height:22px;font-size:15px;font-weight:900;text-align:center;transition:opacity .3s;text-shadow:0 0 8px currentColor,0 0 2px #000;letter-spacing:.5px;white-space:pre-line;line-height:1.2}
#event-banner.flash{animation:evtflash .9s ease-in-out}
@keyframes evtflash{0%{transform:scale(1.25);filter:brightness(1.6)}60%{transform:scale(1);filter:brightness(1)}100%{transform:scale(1);filter:brightness(1)}}
#game-wrap{position:relative;width:1100px;max-width:95vw}
canvas{display:block;width:100%;height:auto;background:#0f0c14;border-radius:14px;border:2px solid #00000055;box-shadow:0 18px 60px #000000aa}
#kb{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;font-size:11px;opacity:.6;width:1100px;max-width:95vw}
.k{background:#ffffff0d;border:1px solid #ffffff18;border-radius:5px;padding:2px 7px}
.k b{color:#88ccff}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px)}
.modal{max-width:1100px;width:94vw;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 80px #0009;padding:20px;max-height:90vh;overflow-y:auto}
.modal h1{font-size:26px;font-weight:800;margin-bottom:4px}
.modal .sub{opacity:.85;font-size:14px;line-height:1.5;margin-bottom:12px}
.section-title{font-weight:800;font-size:14px;margin:14px 0 8px}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{background:#ffffff10;border:1px solid var(--line);border-radius:999px;padding:2px 8px;font-size:12px;cursor:pointer}
.badge input{margin-right:4px}
.grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
.choice{background:#0e0b13;border:1px solid #ffffff1f;border-radius:12px;padding:12px;cursor:pointer;display:flex;gap:12px;align-items:center}
.choice:hover{border-color:#ffffff44;background:#12101a}
.choice.selected{outline:2px solid #4a90d9;box-shadow:0 0 0 4px #4a90d933}
.choice.disabled{opacity:.35;pointer-events:none;filter:grayscale(80%)}
.choice img{width:72px;height:72px;object-fit:contain;flex:0 0 auto}
.choice .name{font-weight:800;font-size:14px}
.choice .desc{font-size:11px;opacity:.8;line-height:1.5;margin-top:4px}
.choice .powers{font-size:11px;margin-top:4px;line-height:1.6}
.btn{background:linear-gradient(135deg,#2a3a5c,#1a1f2e);border:1px solid #4a90d9aa;border-radius:12px;padding:14px 28px;font-weight:700;cursor:pointer;color:var(--text);font-size:16px}
.btn:hover:not([disabled]){background:linear-gradient(135deg,#3a4a6c,#2a2f3e)}
.btn[disabled]{opacity:.45;cursor:not-allowed}
.btn-sm{padding:10px 20px;font-size:14px;border-radius:10px}
.btn-danger{background:linear-gradient(135deg,#5c2a2a,#2e1a1a);border-color:#d94a4aaa}
select{background:#0e0b13;border:1px solid #ffffff22;border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px}
.evt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:6px;margin-top:6px}
.evt-opt{background:#ffffff08;border:1px solid #ffffff12;border-radius:8px;padding:6px 10px;font-size:12px;display:flex;align-items:center;gap:6px;cursor:pointer}
.evt-opt input[type=checkbox]{accent-color:#4a90d9}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;text-align:left}
.stat-item{background:#ffffff08;border-radius:8px;padding:8px 12px}
.stat-item .val{font-size:18px;font-weight:800;color:#ffd700}
.stat-item .lbl{font-size:11px;opacity:.7}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="pbox p1" id="pbox1">
      <div class="ptop">
        <img id="sp-icon1" style="width:26px;height:26px;object-fit:contain" src="" alt="">
        <span id="sp-name1" style="color:#88bbff">—</span>
        <div class="lives" id="lives1"></div>
        <span class="score-big" id="score1">0</span>
      </div>
      <div class="bar-row" id="health-row1" style="display:none"><span class="bar-label" id="health-label1">❤ Vitalité</span><div class="bar-bg"><div class="bar-fill health" id="health-bar1" style="width:100%"></div></div></div>
      <div class="bar-row"><span class="bar-label" id="pow-label1">⚡ Pouvoir</span><div class="bar-bg"><div class="bar-fill power" id="pow-bar1" style="width:0%"></div></div></div>
      <div class="bar-row"><span class="bar-label" id="sup-label1">★ Super — 0/20</span><div class="bar-bg"><div class="bar-fill super" id="sup-bar1" style="width:0%"></div></div></div>
      <div class="combo-hud" id="combo1"></div>
    </div>
    <div id="hud-center">
      <span style="font-size:11px;opacity:.5" id="diff-label">—</span>
      <span style="font-size:14px;font-weight:800" id="mode-label">Solo</span>
      <span style="font-size:11px;opacity:.6" id="leader-text">—</span>
      <span id="event-banner"></span>
    </div>
    <div class="pbox p2" id="pbox2" style="display:none">
      <div class="ptop">
        <img id="sp-icon2" style="width:26px;height:26px;object-fit:contain" src="" alt="">
        <span id="sp-name2" style="color:#ff9999">—</span>
        <div class="lives" id="lives2"></div>
        <span class="score-big" id="score2">0</span>
      </div>
      <div class="bar-row" id="health-row2" style="display:none"><span class="bar-label" id="health-label2">❤ Vitalité</span><div class="bar-bg"><div class="bar-fill health" id="health-bar2" style="width:100%"></div></div></div>
      <div class="bar-row"><span class="bar-label" id="pow-label2">⚡ Pouvoir</span><div class="bar-bg"><div class="bar-fill power" id="pow-bar2" style="width:0%"></div></div></div>
      <div class="bar-row"><span class="bar-label" id="sup-label2">★ Super — 0/20</span><div class="bar-bg"><div class="bar-fill super" id="sup-bar2" style="width:0%"></div></div></div>
      <div class="combo-hud" id="combo2"></div>
    </div>
  </div>
  <div id="kb">
    <span class="k k-p1">J1 ⌨ <b>Flèches</b> / 🎮 <b>Stick+D-Pad</b></span>
    <span class="k k-p1">J1 ⌨ <b>Entrée</b> / 🎮 <b>✕</b> pouvoir</span>
    <span class="k k-p1">J1 ⌨ <b>Maj.Dr</b> / 🎮 <b>◯</b> SUPER★</span>
    <span class="k k-p2">J2 ⌨ <b>ZQSD</b> / 🎮 <b>Stick+D-Pad</b></span>
    <span class="k k-p2">J2 ⌨ <b>F</b> / 🎮 <b>✕</b> pouvoir</span>
    <span class="k k-p2">J2 ⌨ <b>Espace</b> / 🎮 <b>◯</b> SUPER★</span>
    <span class="k"><b>P</b> / 🎮 <b>Options</b> pause</span>
  </div>
  <div id="game-wrap"><canvas id="game" width="1100" height="880"></canvas></div>
</div>

<script>
"use strict";
const CVS=document.getElementById('game'),CTX=CVS.getContext('2d');
const W=CVS.width,H=CVS.height,TILE=28,COLS=(W/TILE)|0,ROWS=(H/TILE)|0,SUPER_COST=20;

// ══════ FULLSCREEN ══════
function goFullscreen(){try{const el=document.documentElement;if(el.requestFullscreen)el.requestFullscreen();else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();}catch(e){}}

// ══════ IMAGES ══════
const IMG=new Map();
function img(s){if(IMG.has(s))return IMG.get(s);const i=new Image();i.src=s;IMG.set(s,i);return i;}
function drawImg(s,x,y,sz,a=1){const i=img(s);if(!i.complete)return;CTX.save();if(a<1)CTX.globalAlpha=a;CTX.drawImage(i,x-sz/2,y-sz/2,sz,sz);CTX.restore();}
function drawImgRotated(s,x,y,sz,angle,a=1){const i=img(s);if(!i.complete)return;CTX.save();if(a<1)CTX.globalAlpha=a;CTX.translate(x,y);CTX.rotate(angle);CTX.drawImage(i,-sz/2,-sz/2,sz,sz);CTX.restore();}
const SPRITES={cornucopioides:'champignon_6_bordered.png',muscaria:'champignon_3.png',cibarius:'champignon_1.png',edulis:'champignon_4.png',morchella:'champignon_5_bordered.png',phalloides:'champignon_2.png',stropharia:'champignon_7.png',anthurus:'champignon_8.png',mante:'mante.png'};
const PARASITE_SPRITES=[null,'Parasite_1.png','Parasite_2.png','Parasite_3.png','Parasite_4.png','Parasite_5.png','Parasite_6.png','Parasite_7.png'];
const TREE_IMGS=['chene.png','pin.png'];
Object.values(SPRITES).forEach(s=>img(s));PARASITE_SPRITES.slice(1).forEach(s=>img(s));TREE_IMGS.forEach(s=>img(s));img('sol_foret.png');img('feu.png');img('cueilleur.png');img('nuit.png');img('cachette.png');img('mante.png');img('mante0.png');

// ══════ AUDIO ══════
let actx=null,mGain=null;
function ensureAudio(){if(actx)return;actx=new(window.AudioContext||window.webkitAudioContext)();mGain=actx.createGain();mGain.gain.value=0.15;mGain.connect(actx.destination);}
function tone(f,d,t='sine',v=.2){if(!actx)return;const n=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.setValueAtTime(f,n);g.gain.value=0;g.gain.linearRampToValueAtTime(v,n+.01);g.gain.exponentialRampToValueAtTime(.0001,n+d);o.connect(g);g.connect(mGain);o.start(n);o.stop(n+d);}
function sfxEat(){tone(640,.04,'triangle',.15);}
function sfxCombo(n){tone(500+n*40,.06,'sine',.18);tone(700+n*30,.05,'triangle',.12);}
function sfxPower(){tone(440,.08,'sawtooth',.15);tone(660,.12,'triangle',.12);}
function sfxShield(){tone(330,.15,'sine',.18);tone(550,.1,'triangle',.1);}
function sfxHit(){tone(140,.12,'sawtooth',.2);tone(90,.15,'square',.1);}
function sfxWin(){[660,880,990,1320].forEach((f,i)=>setTimeout(()=>tone(f,.12,'triangle',.18),i*120));}
function sfxLife(){[660,990,1320].forEach((f,i)=>setTimeout(()=>tone(f,.08,'sine',.15),i*80));}
function sfxFire(){tone(180,.2,'sawtooth',.12);tone(100,.25,'square',.08);}
function sfxQuake(){tone(60,.3,'square',.2);tone(80,.25,'sawtooth',.15);}
function sfxFreeze(){tone(1200,.1,'sine',.12);tone(900,.15,'triangle',.1);}
function sfxStorm(){tone(200,.2,'sawtooth',.15);tone(300,.15,'square',.1);}
function sfxGolden(){tone(880,.1,'triangle',.15);tone(1100,.1,'sine',.12);}
function sfxTrap(){tone(300,.08,'square',.15);tone(150,.1,'sawtooth',.1);}
function sfxCueilleur(){tone(120,.3,'sine',.12);tone(80,.4,'square',.08);}
function sfxBounce(){tone(220,.08,'square',.2);tone(120,.1,'sawtooth',.15);tone(420,.05,'triangle',.1);}
function sfxTreeCrash(){tone(90,.25,'sawtooth',.25);tone(60,.3,'square',.15);tone(180,.15,'triangle',.1);}
function sfxStick(){tone(280,.15,'sine',.15);tone(200,.2,'triangle',.1);}
function sfxLaunch(){tone(900,.05,'sawtooth',.15);tone(600,.1,'square',.15);tone(300,.15,'triangle',.1);}
function sfxPheromones(){tone(350,.3,'sine',.1);tone(500,.25,'triangle',.08);tone(260,.35,'sawtooth',.06);}

// ══════ MUSIC / AMBIANCE SYSTEM ══════
const MUS={};
function mus(name,src,loop=true,vol=0.25){const a=new Audio(src);a.loop=loop;a.volume=vol;MUS[name]=a;return a;}
function musPlay(name){const a=MUS[name];if(!a)return;a.currentTime=0;a.play().catch(()=>{});}
function musStop(name){const a=MUS[name];if(!a)return;a.pause();a.currentTime=0;}
function musStopAll(){Object.values(MUS).forEach(a=>{a.pause();a.currentTime=0;});}
// Preload all ambiance tracks
mus('jour','jour.wav',true,0.18);
mus('nuit','nuit.mp3',true,0.22);
mus('owl','owl.mp3',true,0.15);
mus('feu','feu.mp3',true,0.2);
mus('cueillette','cueillette.wav',true,0.2);
mus('panique','panique.mp3',true,0.22);
mus('seisme','seisme.mp3',false,0.35);

function startDayMusic(){musStop('nuit');musStop('owl');musPlay('jour');}
function startNightMusic(){musStop('jour');musPlay('nuit');musPlay('owl');}
function stopNightMusic(){musStop('nuit');musStop('owl');musPlay('jour');}
function startFireMusic(){musPlay('feu');}
function stopFireMusic(){musStop('feu');}
function startCueilletteMusic(){musPlay('cueillette');}
function stopCueilletteMusic(){musStop('cueillette');}
function startPanicMusic(){musPlay('panique');}
function stopPanicMusic(){musStop('panique');}
function playSeismeSound(){musPlay('seisme');}
function stopAllGameMusic(){musStopAll();}

document.addEventListener('click',()=>{ensureAudio();goFullscreen();},{once:true});
document.addEventListener('keydown',ensureAudio,{once:true});
// Activate audio on first gamepad button press too
let _gpAudioInit=false;
function _checkGpInit(){if(_gpAudioInit)return;const list=gamepadList?gamepadList():[];for(const gp of list){for(const b of gp.buttons){if(b&&b.pressed){_gpAudioInit=true;ensureAudio();return;}}}}

// ══════ UTILS ══════
const $=id=>document.getElementById(id);
function dist(ax,ay,bx,by){return Math.hypot(ax-bx,ay-by);}
function inBounds(x,y){return x>=0&&y>=0&&x<COLS&&y<ROWS;}
function isEdge(x,y){return x===0||y===0||x===COLS-1||y===ROWS-1;}
function isWalk(x,y){return inBounds(x,y)&&!G.grid[y][x].wall;}
function canMoveTo(x,y,phase){if(!inBounds(x,y))return false;if(phase&&!isEdge(x,y))return true;return!G.grid[y][x].wall;}
function treeAt(x,y){return((x*73856093)^(y*19349663))&1;}
function findOpen(){for(let t=0;t<4000;t++){const x=(Math.random()*COLS)|0,y=(Math.random()*ROWS)|0;if(inBounds(x,y)&&!G.grid[y][x].wall&&!G.grid[y][x].fire)return{x,y};}return{x:1,y:1};}
function findOpenFar(ref,md){for(let t=0;t<4000;t++){const x=(Math.random()*COLS)|0,y=(Math.random()*ROWS)|0;if(inBounds(x,y)&&!G.grid[y][x].wall&&!G.grid[y][x].fire&&Math.abs(x-ref.x)+Math.abs(y-ref.y)>=md)return{x,y};}return findOpen();}
function nearestParasite(pl,fn){let b=null,bd=1e9;G.parasites.forEach(p=>{if(fn&&!fn(p))return;const d=dist(p.x,p.y,pl.x,pl.y);if(d<bd){bd=d;b=p;}});return b;}
function findBestSporeCluster(){let b=null,bc=0;for(let y=2;y<ROWS-2;y+=3)for(let x=2;x<COLS-2;x+=3){let c=0;for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){const nx=x+dx,ny=y+dy;if(inBounds(nx,ny)&&G.grid[ny][nx].pellet)c++;}if(c>bc){bc=c;b={x,y};}}return b||findOpen();}
function convertServant(p,pid,dur){p.servant=true;p.servantOwner=pid;p.servantTimer=dur;p.scared=0;p.confused=0;p.blind=0;p.frozen=0;p.path=[];}
function spawnFloat(x,y,text,color){G.floats.push({x,y,text,color,life:50});}

function canReachOpen(px,py,wx,wy){const visited=new Set(),q=[[Math.floor(px),Math.floor(py)]],k=(x,y)=>`${x},${y}`;visited.add(k(q[0][0],q[0][1]));while(q.length){const[cx,cy]=q.shift();for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){const nx=cx+dx,ny=cy+dy;if(!inBounds(nx,ny)||(nx===wx&&ny===wy)||G.grid[ny][nx].wall)continue;const nk=k(nx,ny);if(!visited.has(nk)){visited.add(nk);if(visited.size>5)return true;q.push([nx,ny]);}}}return visited.size>3;}

function setWall(x,y){if(!inBounds(x,y)||isEdge(x,y))return false;const c=G.grid[y][x];if(c.wall)return false;
  if(c.hideout||c.hideoutBorder)return false;
  if(G.p1&&Math.floor(G.p1.x)===x&&Math.floor(G.p1.y)===y)return false;
  if(G.p2&&Math.floor(G.p2.x)===x&&Math.floor(G.p2.y)===y)return false;
  if(G.p1&&!canReachOpen(G.p1.x,G.p1.y,x,y))return false;
  if(G.p2&&!canReachOpen(G.p2.x,G.p2.y,x,y))return false;
  c.wall=true;if(c.pellet){c.pellet=false;G.remaining--;}c.trap=null;c.bonus=null;c.fire=false;rebuildWallLayer();rebuildPelletLayer();return true;}

function removeWall(x,y){if(!inBounds(x,y)||isEdge(x,y))return;const c=G.grid[y][x];if(!c.wall)return;if(c.hideoutBorder)return;c.wall=false;c.pellet=true;G.remaining++;rebuildWallLayer();rebuildPelletLayer();}
function clampToWalkable(pl){const gx=Math.floor(pl.x),gy=Math.floor(pl.y);if(inBounds(gx,gy)&&!G.grid[gy][gx].wall)return;const s=findOpen();pl.x=s.x+.5;pl.y=s.y+.5;}

// ══════ SPECIES ══════
const MORILLE_EFFECTS=['attack','spin','flee','blue_trail','bonus_drop','speed_boost','spawn','tree_destroy','pace','fast_wander'];
const MORILLE_ICONS=['⚔','🌀','🏃','💙','🎁','💨','🥚','🪓','↔','💫'];

const SPECIES=[
{id:'cornucopioides',name:'Trompette de la mort',color:'#3d3630',type:'mushroom',
  power:'Voile d\'ombre',powerDesc:'Se fond dans le sous-bois 5s. Invisible, les parasites perdent votre trace.',
  superDesc:'NUIT TOTALE — Aveugle tous les parasites 12s. Invisible + vitesse accrue.',cooldown:8*60,
  usePower(pl){pl.invisible=true;pl.powerTimer=5*60;},

function applyMorilleEffect(p){

  p.morilleMadness={type:eff,timer:20*60,icon:MORILLE_ICONS[idx]};
  p.path=[];p.confused=0;p.scared=0;p.frozen=0;p.blind=0;
  // Setup specific to each effect
  if(eff==='pace'){
    const gx=Math.floor(p.x),gy=Math.floor(p.y);
    const dirs=[[3,0],[-3,0],[0,3],[0,-3]].filter(([dx,dy])=>isWalk(gx+dx,gy+dy));
    const d=dirs.length?dirs[(Math.random()*dirs.length)|0]:[2,0];
    p.morilleMadness.paceA={x:gx,y:gy};p.morilleMadness.paceB={x:gx+d[0],y:gy+d[1]};p.morilleMadness.paceTarget='B';
  }

// ══════ HIDEOUT SYSTEM (Strophaire) ══════
// Hideout is carved INTO the outer wall (edge row/column): it sits OUTSIDE
// the maze body, with one opening back to the corridor. Shape is rounded (3 tiles
// curved), bordered by unbreakable hideoutBorder trees everywhere except the opening.
function createHideout(gx,gy,edgeDir,pid){
  const horizontal=edgeDir[1]!==0;// true = top/bottom edge, false = left/right
  const isTop=edgeDir[1]<0,isLeft=edgeDir[0]<0;
  // The opening is one tile at (gx, gy) — the player's current position.
  // The alcove extends INTO the outer wall (into the edge row/column).
  // We use 2 rows × 3 cols for top/bottom, and 3 rows × 2 cols for left/right.
  let alcoveTiles=[];// tiles we make walkable (inside the wall)
  let openingTile=null;// tile that connects the alcove back to the maze
  let borderTiles=[];// new hideoutBorder trees to surround the alcove
  if(horizontal){
    // Alcove rows: the outer edge row (y=0 or y=ROWS-1) and one row into the wall direction
    // But the outer edge is only 1 row wide. We need to push INTO it — since the outer wall
    // is edge row(s), we will make the entire alcove within the edge row itself, 3 tiles wide.
    const row=isTop?0:ROWS-1;// the outermost row
    // Opening back to maze is (gx, gy) — the player is 1 step inside from edge
    // Alcove: 3 tiles in the edge row, centered on gx, plus the opening cell (gy)
    for(let dx=-1;dx<=1;dx++){
      const nx=gx+dx;
      if(!inBounds(nx,row))return false;
      alcoveTiles.push([nx,row]);
    }
    // Opening tile: the cell at (gx, gy) that is NOT on the edge (player's current maze-adjacent cell)
    // Actually, the maze corridor adjacent to edge-row cell (gx,row) is (gx, row±1)
    const innerY=isTop?1:ROWS-2;
    openingTile=[gx,innerY];
    // Border: wrap the 3 alcove tiles on sides + the corridor-side (except opening)
    const wrap=[];
    wrap.push([gx-2,row]);wrap.push([gx+2,row]);// side extensions
    for(let dx=-1;dx<=1;dx++){
      // corridor-adjacent tiles (innerY) except opening
      if(dx===0)continue;// skip opening
      wrap.push([gx+dx,innerY]);
    }
    borderTiles=wrap;
  }else{
    const col=isLeft?0:COLS-1;
    for(let dy=-1;dy<=1;dy++){
      const ny=gy+dy;
      if(!inBounds(col,ny))return false;
      alcoveTiles.push([col,ny]);
    }
    const innerX=isLeft?1:COLS-2;
    openingTile=[innerX,gy];
    const wrap=[];
    wrap.push([col,gy-2]);wrap.push([col,gy+2]);
    for(let dy=-1;dy<=1;dy++){
      if(dy===0)continue;
      wrap.push([innerX,gy+dy]);
    }
    borderTiles=wrap;
  }
  // Safety: opening tile must be walkable path inside the maze
  if(!openingTile||!inBounds(openingTile[0],openingTile[1]))return false;
  // Reject if any alcove tile is already a hideout
  for(const[tx,ty]of alcoveTiles){if(G.grid[ty][tx].hideout)return false;}
  // Check no adjacent other hideouts (2-tile spacing)
  for(const[tx,ty]of alcoveTiles){
    for(let dx=-2;dx<=2;dx++)for(let dy=-2;dy<=2;dy++){
      const nx=tx+dx,ny=ty+dy;if(inBounds(nx,ny)&&G.grid[ny][nx].hideout&&G.grid[ny][nx].hideout.owner!==pid)return false;
    }
  }
  // Apply alcove
  alcoveTiles.forEach(([tx,ty])=>{
    const c=G.grid[ty][tx];
    c.wall=false;c.hideout={owner:pid};c.pellet=false;c.bonus=null;c.trap=null;c.fire=false;c.hideoutBorder=false;
  });
  // Ensure opening is walkable (it should be already, inside the maze)
  {
    const[ox,oy]=openingTile;const c=G.grid[oy][ox];
    if(c.wall){c.wall=false;}// rare: if wall was placed there, punch it open
    c.hideoutBorder=false;c.hideoutOpening={owner:pid};
  }
  // Border trees (unbreakable)
  borderTiles.forEach(([tx,ty])=>{
    if(!inBounds(tx,ty))return;
    const c=G.grid[ty][tx];
    // If it's already the opening, skip
    if(c.hideoutOpening)return;
    // If it's on the outer edge, leave it as the existing wall but mark as border
    c.wall=true;c.pellet=false;c.bonus=null;c.trap=null;c.fire=false;c.hideoutBorder=true;
  });
  // 20% chance of a life bonus inside
  if(Math.random()<0.2){
    const bt=alcoveTiles[(Math.random()*alcoveTiles.length)|0];
    G.grid[bt[1]][bt[0]].bonus='life';
  }
  rebuildWallLayer();rebuildPelletLayer();
  if(!G.hideouts)G.hideouts=[];
  // Store bounding box for rendering
  const xs=alcoveTiles.map(t=>t[0]),ys=alcoveTiles.map(t=>t[1]);
  const minX=Math.min(...xs),minY=Math.min(...ys);
  const maxX=Math.max(...xs),maxY=Math.max(...ys);
  G.hideouts.push({tiles:alcoveTiles,owner:pid,ax:minX,ay:minY,bw:maxX-minX+1,bh:maxY-minY+1,horizontal,openingTile});
  return true;
}
// Prevent mutating hideout walls (earthquake, fire, etc.)
function isLockedWall(x,y){
  return inBounds(x,y)&&G.grid[y][x].hideoutBorder;
}
// True if this player is currently standing in HIS OWN hideout (and he is the strophaire owner).
// Used everywhere to grant total invulnerability.
function isSafeInHideout(pl){
  if(!pl||pl.species.id!=='stropharia')return false;
  const gx=Math.floor(pl.x),gy=Math.floor(pl.y);
  if(!inBounds(gx,gy))return false;
  const c=G.grid[gy][gx];
  return c&&c.hideout&&c.hideout.owner===pl.pid;
}

// ══════ MAZE GENERATION ══════
function generateMaze(){
  const grid=[];for(let y=0;y<ROWS;y++){grid[y]=[];for(let x=0;x<COLS;x++)grid[y][x]={wall:true,pellet:false,trap:null,bonus:null,fire:false};}
  const visited=new Set(),stack=[],key=(x,y)=>`${x},${y}`,dirs=[[0,-2],[0,2],[-2,0],[2,0]];
  visited.add(key(1,1));grid[1][1].wall=false;stack.push([1,1]);
  while(stack.length){const[cx,cy]=stack[stack.length-1];const sh=dirs.slice().sort(()=>Math.random()-.5);let found=false;
    for(const[dx,dy]of sh){const nx=cx+dx,ny=cy+dy;if(nx>=1&&ny>=1&&nx<COLS-1&&ny<ROWS-1&&!visited.has(key(nx,ny))){visited.add(key(nx,ny));grid[ny][nx].wall=false;grid[cy+dy/2][cx+dx/2].wall=false;stack.push([nx,ny]);found=true;break;}}if(!found)stack.pop();}
  for(let y=2;y<ROWS-2;y++)for(let x=2;x<COLS-2;x++)if(grid[y][x].wall&&Math.random()<.35){const adj=[[0,1],[0,-1],[1,0],[-1,0]].filter(([dx,dy])=>inBounds(x+dx,y+dy)&&!grid[y+dy][x+dx].wall).length;if(adj>=2)grid[y][x].wall=false;}
  const nr=3+((Math.random()*4)|0);for(let r=0;r<nr;r++){const rx=3+((Math.random()*(COLS-6))|0),ry=3+((Math.random()*(ROWS-6))|0),rw=2+((Math.random()*3)|0),rh=2+((Math.random()*3)|0);for(let dy=-rh;dy<=rh;dy++)for(let dx=-rw;dx<=rw;dx++){const nx=rx+dx,ny=ry+dy;if(nx>=1&&ny>=1&&nx<COLS-1&&ny<ROWS-1)grid[ny][nx].wall=false;}}
  let remaining=0;for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(!grid[y][x].wall){grid[y][x].pellet=true;remaining++;}
  const bonusTypes=['life','speed','freeze','score','magnet'];const nb=10+((Math.random()*6)|0);
  for(let i=0;i<nb;i++)for(let t=0;t<500;t++){const x=1+((Math.random()*(COLS-2))|0),y=1+((Math.random()*(ROWS-2))|0);if(!grid[y][x].wall&&grid[y][x].pellet&&!grid[y][x].bonus){grid[y][x].bonus=bonusTypes[(Math.random()*bonusTypes.length)|0];grid[y][x].pellet=false;remaining--;break;}}
  return{grid,remaining};
}

// ══════ BFS ══════
function bfs(sx,sy,gx,gy){if(!isWalk(gx,gy))return[];const came=new Map(),k=(x,y)=>(x<<16)|y,q=[[sx,sy]];came.set(k(sx,sy),null);while(q.length){const[cx,cy]=q.shift();if(cx===gx&&cy===gy)break;for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){const nx=cx+dx,ny=cy+dy,nk=k(nx,ny);if(isWalk(nx,ny)&&!came.has(nk)){came.set(nk,[cx,cy]);q.push([nx,ny]);}}}const path=[];let cur=[gx,gy];const sk=k(sx,sy);while(cur&&k(cur[0],cur[1])!==sk){const prev=came.get(k(cur[0],cur[1]));if(!prev)return[];path.push(cur);cur=prev;}path.reverse();return path;}
function bfsAvoid(sx,sy,gx,gy,avoidSet){
  if(!isWalk(gx,gy))return[];
  const came=new Map(),k=(x,y)=>(x<<16)|y,q=[[sx,sy]];came.set(k(sx,sy),null);
  while(q.length){const[cx,cy]=q.shift();if(cx===gx&&cy===gy)break;
    for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){const nx=cx+dx,ny=cy+dy,nk=k(nx,ny);
      if(isWalk(nx,ny)&&!came.has(nk)&&!avoidSet.has(nx+','+ny)){came.set(nk,[cx,cy]);q.push([nx,ny]);}}}
  const path=[];let cur=[gx,gy];const sk=k(sx,sy);
  while(cur&&k(cur[0],cur[1])!==sk){const prev=came.get(k(cur[0],cur[1]));if(!prev)return[];path.push(cur);cur=prev;}
  path.reverse();return path;
}
function findNearestPellet(fx,fy){let b=null,bd=1e9;for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)if(G.grid[y][x].pellet){const d=Math.abs(x-fx)+Math.abs(y-fy);if(d<bd){bd=d;b=[x,y];}}return b;}

// AI mushroom controller (for 1P mante vs AI mushroom)
// ════════ SMART AI MUSHROOM ════════
// Strategy: continuously evaluates threats (parasites, fire, cueilleur) and opportunities
// (mante for life-steal, best spore cluster). Switches between FLEE / HUNT_MANTE / COLLECT
// and deploys species-specific powers/supers opportunistically.

function _aiBuildAvoid(pl,radius){
  const avoid=new Set();
  // Fire tiles (and 1-tile ring)
  G.fireCells.forEach(k=>{
    const[fx,fy]=k.split(',').map(Number);
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){avoid.add((fx+dx)+','+(fy+dy));}
  });
  // Parasites that are actual threats (not servants/stuck/launched/scared/blinded)
  // AND that will attack (not morille madness of a non-hitting type)
  G.parasites.forEach(p=>{
    if(p.servant||p.stuck||p.launched)return;
    if(p.scared>0||p.blind>30||p.frozen>30)return;
    const mm=p.morilleMadness;
    if(mm&&['spin','flee','blue_trail','bonus_drop','spawn','pace','tree_destroy'].includes(mm.type))return;
    // Only add ring if parasite is within a tracking radius of the AI
    const d=Math.abs(p.x-pl.x)+Math.abs(p.y-pl.y);
    if(d<radius){
      const px=Math.floor(p.x),py=Math.floor(p.y);
      avoid.add(px+','+py);
      // Also mark predicted next cells based on its path
      if(p.path&&p.path.length){for(let i=0;i<Math.min(2,p.path.length);i++){avoid.add(p.path[i][0]+','+p.path[i][1]);}}
    }
  });
  // Cueilleurs: huge avoid area (they're one-shot-kill)
  G.cueilleurs.forEach(c=>{
    const cx=Math.floor(c.x),cy=Math.floor(c.y);
    const cRad=Math.ceil(c.size/TILE)+1;
    for(let dy=-cRad;dy<=cRad;dy++)for(let dx=-cRad;dx<=cRad;dx++){
      if(Math.abs(dx)+Math.abs(dy)>cRad+1)continue;
      avoid.add((cx+dx)+','+(cy+dy));
    }
  });
  // Hideouts: AI never pathfinds into another player's hideout
  // (its own hideout is fine, if AI is strophaire)
  if(G.hideouts&&G.hideouts.length){
    G.hideouts.forEach(ho=>{
      if(ho.owner===pl.pid&&pl.species.id==='stropharia')return;// own hideout OK
      ho.tiles.forEach(([x,y])=>avoid.add(x+','+y));
    });
  }
  return avoid;
}

function _aiSafePathTo(pl,tx,ty,avoid){
  const gx=Math.floor(pl.x),gy=Math.floor(pl.y);
  let path=bfsAvoid(gx,gy,tx,ty,avoid);
  if(!path.length){
    // Relax: drop parasite avoid (keep fire & cueilleurs)
    const lightAvoid=new Set();
    G.fireCells.forEach(k=>lightAvoid.add(k));
    G.cueilleurs.forEach(c=>{
      const cx=Math.floor(c.x),cy=Math.floor(c.y);
      const cRad=Math.ceil(c.size/TILE)+1;
      for(let dy=-cRad;dy<=cRad;dy++)for(let dx=-cRad;dx<=cRad;dx++){
        if(Math.abs(dx)+Math.abs(dy)>cRad+1)continue;
        lightAvoid.add((cx+dx)+','+(cy+dy));
      }
    });
    path=bfsAvoid(gx,gy,tx,ty,lightAvoid);
  }
  if(!path.length)path=bfs(gx,gy,tx,ty);// last-resort: direct
  return path;
}

function _aiFleeDir(pl,avoid){
  const gx=Math.floor(pl.x),gy=Math.floor(pl.y);
  // Score each walkable neighbor: further from threats = better, avoids = penalty
  const options=[[1,0],[-1,0],[0,1],[0,-1]].filter(([dx,dy])=>isWalk(gx+dx,gy+dy));
  if(!options.length)return null;
  let best=options[0],bestScore=-1e9;
  options.forEach(([dx,dy])=>{
    const nx=gx+dx,ny=gy+dy;
    let sc=0;
    // Avoid tiles are strongly penalized
    if(avoid.has(nx+','+ny))sc-=200;
    // Distance from every active parasite
    G.parasites.forEach(p=>{
      if(p.servant||p.stuck||p.launched||p.scared>0)return;
      sc+=Math.min(dist(nx+.5,ny+.5,p.x,p.y),6);
    });
    // Distance from cueilleurs (heavy weight)
    G.cueilleurs.forEach(c=>{sc+=dist(nx+.5,ny+.5,c.x,c.y)*2;});
    // Distance from fire cells
    G.fireCells.forEach(k=>{
      const[fx,fy]=k.split(',').map(Number);
      if(dist(nx+.5,ny+.5,fx+.5,fy+.5)<3)sc-=(3-dist(nx+.5,ny+.5,fx+.5,fy+.5))*15;
    });
    // Prefer continuing current direction (reduce jitter)
    if(pl.dir&&pl.dir[0]===dx&&pl.dir[1]===dy)sc+=.5;
    if(sc>bestScore){bestScore=sc;best=[dx,dy];}
  });
  return best;
}

function _aiFindBestTarget(pl,avoid){
  const gx=Math.floor(pl.x),gy=Math.floor(pl.y);
  // Priority 1: mante (free life + huge strategic value) if reachable
  const mante=getMantePlayer();
  if(mante&&!mante.camouflage&&!mante.dashing&&mante.invuln<=0&&mante.respawnFlash<=0){
    const mx=Math.floor(mante.x),my=Math.floor(mante.y);
    const d=Math.abs(mx-gx)+Math.abs(my-gy);
    // Only hunt mante if close-ish AND our HP is not critical (no HP for mushrooms, so always)
    if(d<14){
      // Check that a safe path exists
      const p=_aiSafePathTo(pl,mx,my,avoid);
      if(p.length>0&&p.length<20){return{kind:'mante',x:mx,y:my,path:p};}
    }
  }
  // Priority 2: densest reachable spore cluster within a practical radius
  let bestCluster=null,bestScore=-1,bestPath=null;
  const SCAN_RADIUS=12;
  for(let dy=-SCAN_RADIUS;dy<=SCAN_RADIUS;dy+=2)for(let dx=-SCAN_RADIUS;dx<=SCAN_RADIUS;dx+=2){
    const cx=gx+dx,cy=gy+dy;
    if(!inBounds(cx,cy)||G.grid[cy][cx].wall||avoid.has(cx+','+cy))continue;
    // Count pellets in 3x3 around this candidate
    let count=0;
    for(let yy=-1;yy<=1;yy++)for(let xx=-1;xx<=1;xx++){
      const nx=cx+xx,ny=cy+yy;
      if(inBounds(nx,ny)&&G.grid[ny][nx].pellet)count++;
      if(inBounds(nx,ny)&&G.grid[ny][nx].bonus)count+=3;// bonus worth extra
    }
    if(count<1)continue;
    // Score: more pellets = better; closer = better
    const travelDist=Math.abs(dx)+Math.abs(dy);
    const sc=count*10-travelDist*.3;
    if(sc>bestScore){bestScore=sc;bestCluster=[cx,cy];}
  }
  if(bestCluster){
    bestPath=_aiSafePathTo(pl,bestCluster[0],bestCluster[1],avoid);
    if(bestPath.length)return{kind:'pellet',x:bestCluster[0],y:bestCluster[1],path:bestPath};
  }
  // Priority 3: nearest pellet anywhere
  const np=findNearestPellet(gx,gy);
  if(np){
    const p=_aiSafePathTo(pl,np[0],np[1],avoid);
    if(p.length)return{kind:'pellet',x:np[0],y:np[1],path:p};
  }
  // Priority 4: wander safely
  const o=findOpen();
  return{kind:'wander',x:o.x,y:o.y,path:bfs(gx,gy,o.x,o.y)};
}

function _aiCountNearbyThreats(pl,r){
  let n=0;
  G.parasites.forEach(p=>{
    if(p.servant||p.stuck||p.launched||p.scared>0||p.frozen>30)return;
    if(dist(p.x,p.y,pl.x,pl.y)<r)n++;
  });
  return n;
}

function _aiEvaluatePowers(pl){
  if(pl.powerTimer>0||pl.cooldownTimer>0)pl._aiWantsPower=false;
  if(!pl.superReady)pl._aiWantsSuper=false;
  const sp=pl.species.id;
  const nearestParasite=(()=>{let best=null,bd=1e9;G.parasites.forEach(p=>{if(p.servant||p.stuck||p.launched||p.scared>0||p.frozen>30)return;const d=dist(p.x,p.y,pl.x,pl.y);if(d<bd){bd=d;best=p;}});return{p:best,d:bd};})();
  const threatCount3=_aiCountNearbyThreats(pl,3);
  const threatCount5=_aiCountNearbyThreats(pl,5);
  const cueilleurNear=G.cueilleurs.some(c=>dist(c.x,c.y,pl.x,pl.y)<c.size/TILE+2);
  const fireNear=[...G.fireCells].some(k=>{const[fx,fy]=k.split(',').map(Number);return dist(fx+.5,fy+.5,pl.x,pl.y)<3;});
  const canPow=pl.powerTimer<=0&&pl.cooldownTimer<=0;
  const canSup=pl.superReady;
  // --- Power triggers, species-specific ---
  if(canPow){
    switch(sp){
      case'cornucopioides':// Invisibility 5s: use when threat close or fire/cueilleur
        if(nearestParasite.d<2.5||cueilleurNear||fireNear)pl._aiWantsPower=true;
        break;
      case'muscaria':// Drop toxic trap
        // Use when a parasite is following within 2-4 tiles, drop trap behind
        if(nearestParasite.p&&nearestParasite.d<3.5&&nearestParasite.d>1)pl._aiWantsPower=true;
        break;
      case'cibarius':// Charm nearest parasite
        if(threatCount5>=2||nearestParasite.d<3)pl._aiWantsPower=true;
        break;
      case'edulis':// Bounce shield 5s
        if(nearestParasite.d<2||threatCount3>=1)pl._aiWantsPower=true;
        break;
      case'morchella':// Madness on nearest
        if(nearestParasite.p&&nearestParasite.d<3.5)pl._aiWantsPower=true;
        break;
      case'phalloides':// Wall pass
        // Use if blocked and a pellet is right behind a wall in direction of dir
        if(pl.dir&&(pl.dir[0]||pl.dir[1])){
          const gx=Math.floor(pl.x),gy=Math.floor(pl.y);
          const ax=gx+pl.dir[0],ay=gy+pl.dir[1];
          if(inBounds(ax,ay)&&G.grid[ay][ax].wall&&nearestParasite.d<4)pl._aiWantsPower=true;
        }
        break;
      case'stropharia':// Push-tree
        if(nearestParasite.d<2.5)pl._aiWantsPower=true;
        break;
      case'anthurus':// Speed x2 3s
        if(nearestParasite.d<3||cueilleurNear)pl._aiWantsPower=true;
        break;
    }
  }
  // --- Super triggers (more valuable, save for big moments) ---
  if(canSup){
    const superDanger=threatCount5>=3||cueilleurNear||nearestParasite.d<2;
    switch(sp){
      case'cornucopioides':// Total night
        if(threatCount5>=3||G.panicActive)pl._aiWantsSuper=true;
        break;
      case'muscaria':// Toxic trail 3s
        if(threatCount3>=2||nearestParasite.d<2.5)pl._aiWantsSuper=true;
        break;
      case'cibarius':// 3 servants
        if(threatCount5>=3||G.panicActive)pl._aiWantsSuper=true;
        break;
      case'edulis':// Sticky shield (or launch if already stuck)
        if(pl.stuckParasite)pl._aiWantsSuper=true;// release
        else if(threatCount3>=2)pl._aiWantsSuper=true;
        break;
      case'morchella':// Pandemic
        if(threatCount5>=3||G.panicActive)pl._aiWantsSuper=true;
        break;
      case'phalloides':// 3 wall passes
        if(superDanger)pl._aiWantsSuper=true;
        break;
      case'stropharia':// Create hideout - must be at outer wall
        const gx=Math.floor(pl.x),gy=Math.floor(pl.y);
        const atEdge=(gy===1||gy===ROWS-2||gx===1||gx===COLS-2);
        if(atEdge&&superDanger)pl._aiWantsSuper=true;
        break;
      case'anthurus':// Teleport to cluster + invuln + magnet
        if(superDanger||G.remaining<G.initialRemaining*.3)pl._aiWantsSuper=true;
        break;
    }
  }
}

function getAIInputDir(pl){
  if(!pl.isAI)return null;
  pl._aiTimer=(pl._aiTimer||0)-1;
  const gx=Math.floor(pl.x),gy=Math.floor(pl.y);
  // ---- Threat assessment ----
  let criticalThreat=false;
  let nearestThreatDist=1e9;
  G.parasites.forEach(p=>{
    if(p.servant||p.stuck||p.launched)return;
    if(p.scared>0||p.frozen>30||p.blind>30)return;
    const d=dist(p.x,p.y,pl.x,pl.y);
    if(d<nearestThreatDist)nearestThreatDist=d;
    if(d<2.3)criticalThreat=true;
  });
  G.cueilleurs.forEach(c=>{if(dist(c.x,c.y,pl.x,pl.y)<c.size/TILE+3)criticalThreat=true;});
  // Fire in current cell / adjacent
  const gxc=Math.floor(pl.x),gyc=Math.floor(pl.y);
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    const k=(gxc+dx)+','+(gyc+dy);
    if(G.fireCells.has(k)){criticalThreat=true;break;}
  }
  // Evaluate powers each frame (cheap enough since it's flagged & consumed in main loop)
  _aiEvaluatePowers(pl);
  // ---- State machine ----
  // Recompute plan every ~15 frames or when arrived / threat changes
  const needReplan=!pl._aiPath||!pl._aiPath.length||pl._aiTimer<=0||criticalThreat;
  if(needReplan){
    pl._aiTimer=criticalThreat?6:18;
    const avoid=_aiBuildAvoid(pl,6);
    if(criticalThreat){
      // Flee mode: pick best direction away
      const fd=_aiFleeDir(pl,avoid);
      if(fd)pl._aiPath=[[gx+fd[0],gy+fd[1]]];
    }else{
      const tgt=_aiFindBestTarget(pl,avoid);
      pl._aiPath=tgt.path||[];
      pl._aiKind=tgt.kind;
    }
  }
  // ---- Output direction ----
  if(pl._aiPath&&pl._aiPath.length){
    // Skip steps we've already passed
    while(pl._aiPath.length&&pl._aiPath[0][0]===gx&&pl._aiPath[0][1]===gy)pl._aiPath.shift();
    if(!pl._aiPath.length)return null;
    const[tx,ty]=pl._aiPath[0];
    const dx=tx-gx,dy=ty-gy;
    if(dx!==0&&dy===0)return[Math.sign(dx),0];
    if(dy!==0&&dx===0)return[0,Math.sign(dy)];
    // Diagonal tile (shouldn't happen with 4-connected BFS but be safe)
    if(dx!==0)return[Math.sign(dx),0];
    if(dy!==0)return[0,Math.sign(dy)];
  }
  return null;
}

function buildFloorLayer(){const c=makeCanvas(W,H),ctx=c.getContext('2d'),i=img('sol_foret.png');const draw=()=>{if(i.complete){ctx.fillStyle=ctx.createPattern(i,'repeat');ctx.fillRect(0,0,W,H);}G.floorLayer=c;};if(i.complete)draw();else i.addEventListener('load',draw,{once:true});}

function updateHUD(pl){const pid=pl.pid,sp=pl.species;

    else if(G.nightMode){powBar.style.width='0%';powBar.className='bar-fill power';powLabel.textContent='🌑 Camouflage impossible (nuit)';}
    else{powBar.style.width='100%';powBar.className='bar-fill power';powLabel.textContent=`⚡ ${sp.power} — PRÊT`;}
  }else{
    if(pl.powerTimer>0){powBar.style.width=(pl.powerTimer/(pl._powerMax||1))*100+'%';powBar.className='bar-fill power active';powLabel.textContent=`⚡ ${sp.power} (${Math.ceil(pl.powerTimer/60)}s)`;}
    else if(pl.cooldownTimer>0){powBar.style.width=(1-pl.cooldownTimer/sp.cooldown)*100+'%';powBar.className='bar-fill power';powLabel.textContent=`⏳ Recharge (${Math.ceil(pl.cooldownTimer/60)}s)`;}
    else{powBar.style.width='100%';powBar.className='bar-fill power';powLabel.textContent=`⚡ ${sp.power} — PRÊT`;}
  }

  else{const prog=pl.spores%SUPER_COST;supBar.style.width=(prog/SUPER_COST)*100+'%';supBar.className='bar-fill super';supLabel.textContent=`★ Super — ${prog}/${SUPER_COST}`;}
  // Combo in HUD
  if(pl.combo>=3&&!pl.isMante)comboEl.textContent=`🔥 Combo x${pl.combo} ${pl.combo>=10?'FRENZY!':pl.combo>=7?'SUPER!':''}`;
  else if(pl.isMante&&pl.killCount>0)comboEl.textContent=`🦗 ${pl.killCount} parasite${pl.killCount>1?'s':''} dévoré${pl.killCount>1?'s':''}`;
  else comboEl.textContent='';
}

// --- Event banner: supports multiple simultaneous announcements ---
const _activeEvents=new Map();// id -> {msg,color,life}
function showEvent(msg,color='#ff8844',ms=3000,id=null){
  if(!msg){// clear all
    _activeEvents.clear();renderEventBanner();return;}
  const key=id||msg;
  _activeEvents.set(key,{msg,color,life:ms>0?ms:10000,permanent:ms<=0});
  renderEventBanner();
  const el=$('event-banner');el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');
}
function renderEventBanner(){
  const el=$('event-banner');if(!el)return;
  if(!_activeEvents.size){el.innerHTML='';el.style.opacity='0';return;}
  const items=[..._activeEvents.values()];
  // Use multi-color HTML with shadow for punch
  el.innerHTML=items.map(it=>`<span style="color:${it.color};display:inline-block;padding:0 4px">${it.msg}</span>`).join('<br>');
  el.style.opacity='1';
}
function updateEventBanner(dt){// dt in frames (~1 per 16ms)
  if(!_activeEvents.size)return;
  const ms=dt*16.666;let changed=false;
  _activeEvents.forEach((v,k)=>{if(v.permanent)return;v.life-=ms;if(v.life<=0){_activeEvents.delete(k);changed=true;}});
  if(changed)renderEventBanner();
}
function clearEventById(id){if(_activeEvents.delete(id))renderEventBanner();}

function makePlayer(x,y,pid,species){
  const isMante=species.type==='mante';
  return{pid,species,x:x+.5,y:y+.5,dir:[0,0],nextDir:[0,0],lastDir:[0,-1],
    speed:isMante?G.diff.enemySpeed:G.diff.playerSpeed,speedMul:1,
    powerTimer:0,_powerMax:1,cooldownTimer:0,
    invisible:false,shield:false,shieldType:null,stuckParasite:null,phase:false,
    invuln:0,respawnFlash:0,madness:0,spores:0,superReady:false,_speedBonus:0,magnet:0,
    combo:0,comboTimer:0,locateTimer:5*60,spawnGlow:4*60,shockwave:0,
    _wallPasses:0,_muscariaTrail:false,_lastTrailPos:null,
    // Mante-specific
    isMante,health:isMante?MANTE_MAX_HP:0,killCount:0,camouflage:false,
    dashing:false,dashDir:[0,0],dashTimer:0,eatGlow:0,

// ══════ INPUT (clavier + manettes) ══════
const Keys=Object.create(null);

// --- GAMEPAD SYSTEM (DualShock 4 & compatible) ---
// Standard mapping button indices:
//   0: Cross/A   1: Circle/B   2: Square/X   3: Triangle/Y
//   4: L1        5: R1          6: L2         7: R2
//   8: Share     9: Options    10: L3        11: R3
//  12: D-Up     13: D-Down    14: D-Left   15: D-Right
//  16: PS/Guide
// Axes: 0=left-stick X, 1=left-stick Y, 2=right-stick X, 3=right-stick Y
const GP={
  // Assignment: gamepad index -> playerId (1 or 2); auto-assigned on first input.
  // In solo → first gamepad becomes J1. In duo → two first distinct gamepads become J1/J2.
  assign:{},// gamepadIndex -> pid
  // Previous-frame button states per gamepad: used for edge-triggered actions (power/super/pause)
  prev:{},// gamepadIndex -> bool[]
  // Deadzone for analog sticks
  deadzone:0.35,
  enabled:true
};
function gamepadList(){
  if(!navigator.getGamepads)return[];
  return Array.from(navigator.getGamepads()||[]).filter(g=>g&&g.connected);
}
function ensureGamepadAssignment(){
  const list=gamepadList();
  // How many pids do we need (J1 always, J2 in duo mode)?
  const needJ2=(G.mode==='duo')||(G.p2!=null);
  // If a pad was unplugged, release its assignment
  Object.keys(GP.assign).forEach(idx=>{if(!list.find(g=>g.index==idx))delete GP.assign[idx];});
  // Assign free pads to missing pid slots
  const assigned=Object.values(GP.assign);
  if(!assigned.includes(1)){
    const free=list.find(g=>!(g.index in GP.assign));
    if(free)GP.assign[free.index]=1;
  }
  if(needJ2&&!assigned.includes(2)){
    const free=list.find(g=>!(g.index in GP.assign));
    if(free)GP.assign[free.index]=2;
  }
}
function gamepadForPid(pid){
  ensureGamepadAssignment();
  const idx=Object.keys(GP.assign).find(k=>GP.assign[k]==pid);
  if(idx==null)return null;
  const list=gamepadList();
  return list.find(g=>g.index==idx)||null;
}
function gpReadDir(gp){
  if(!gp)return null;
  // Digital D-Pad first
  if(gp.buttons[12]&&gp.buttons[12].pressed)return[0,-1];
  if(gp.buttons[13]&&gp.buttons[13].pressed)return[0,1];
  if(gp.buttons[14]&&gp.buttons[14].pressed)return[-1,0];
  if(gp.buttons[15]&&gp.buttons[15].pressed)return[1,0];
  // Left stick
  const ax=gp.axes[0]||0,ay=gp.axes[1]||0;
  const dz=GP.deadzone;
  if(Math.abs(ax)<dz&&Math.abs(ay)<dz)return null;
  // Snap to cardinal: whichever axis dominates
  if(Math.abs(ax)>Math.abs(ay))return[ax>0?1:-1,0];
  return[0,ay>0?1:-1];
}
function gpPressed(gp,btn){// edge-trigger
  if(!gp)return false;
  const prev=GP.prev[gp.index]||[];
  const now=!!(gp.buttons[btn]&&gp.buttons[btn].pressed);
  const was=!!prev[btn];
  return now&&!was;
}
function gpUpdatePrev(){
  gamepadList().forEach(gp=>{
    const arr=[];for(let i=0;i<gp.buttons.length;i++)arr[i]=!!(gp.buttons[i]&&gp.buttons[i].pressed);
    GP.prev[gp.index]=arr;
  });
}
// Per-frame gamepad button polling: fires power/super/pause on rising edge
function pollGamepadActions(){
  if(!GP.enabled)return;
  if(UINav.active){gpUpdatePrev();return;}// UI nav is handling buttons
  ensureGamepadAssignment();
  const list=gamepadList();
  list.forEach(gp=>{
    const pid=GP.assign[gp.index];
    if(!pid)return;
    // Cross(0) = power, Circle(1) = super, Options(9) = pause
    // Also accept Triangle(3) = power alt, Square(2) = super alt, for flexibility
    if(gpPressed(gp,0)||gpPressed(gp,3))triggerPower(pid);
    if(gpPressed(gp,1)||gpPressed(gp,2))triggerSuper(pid);
    // R2 (7) and L2 (6) also act as super/power for convenience (mante FONCE often used)
    if(gpPressed(gp,7))triggerSuper(pid);
    if(gpPressed(gp,6))triggerPower(pid);
    if(gpPressed(gp,9)){// Options = pause toggle
      if(!G.started)return;if(G.countdown>0)return;
      if(!G.paused){G.paused=true;showPauseMenu();}
    }
  });
  gpUpdatePrev();
}
// Detect gamepads: once one connects, audio context needs a user gesture, so trigger on any press
addEventListener('gamepadconnected',e=>{ensureAudio();ensureGamepadAssignment();});
addEventListener('gamepaddisconnected',e=>{ensureGamepadAssignment();});

// ══════ UI NAVIGATION (pour menus avec manette) ══════
// Allows gamepad to navigate any visible overlay. Each menu registers an array
// of focusable elements (buttons, cards, selects, checkboxes) and UINav handles
// D-Pad / left-stick directional movement, Cross/A to activate.
const UINav={
  items:[],// [{el, onActivate, onAltChange}]
  focus:0,
  active:false,
  repeatTimer:0,
  set(items){
    this.items=items;this.focus=0;this.active=true;this.updateVisual();
  },
  clear(){this.active=false;this.items=[];this.clearVisual();},
  clearVisual(){document.querySelectorAll('.nav-focus').forEach(e=>e.classList.remove('nav-focus'));},
  updateVisual(){
    this.clearVisual();
    const el=this.items[this.focus]&&this.items[this.focus].el;
    if(el){el.classList.add('nav-focus');
      // Auto-scroll into view inside the modal
      if(el.scrollIntoView)el.scrollIntoView({block:'nearest',behavior:'smooth'});
    }
  },
  // Spatial navigation: pick the item whose center is most aligned with dir
  move(dx,dy){
    if(!this.active||!this.items.length)return;
    const cur=this.items[this.focus];if(!cur||!cur.el)return;
    const r=cur.el.getBoundingClientRect();
    const cx=r.left+r.width/2,cy=r.top+r.height/2;
    let best=-1,bestScore=Infinity;
    for(let i=0;i<this.items.length;i++){
      if(i===this.focus)continue;
      const it=this.items[i];if(!it||!it.el)continue;
      const rr=it.el.getBoundingClientRect();
      if(rr.width===0&&rr.height===0)continue;
      const ix=rr.left+rr.width/2,iy=rr.top+rr.height/2;
      const ddx=ix-cx,ddy=iy-cy;
      // Must be in the intended direction (with some tolerance)
      if(dx>0&&ddx<20)continue;
      if(dx<0&&ddx>-20)continue;
      if(dy>0&&ddy<20)continue;
      if(dy<0&&ddy>-20)continue;
      // Score: distance along axis + perpendicular penalty
      const primary=dx?Math.abs(ddx):Math.abs(ddy);
      const perpendicular=dx?Math.abs(ddy):Math.abs(ddx);
      const score=primary+perpendicular*3;
      if(score<bestScore){bestScore=score;best=i;}
    }
    if(best>=0){this.focus=best;this.updateVisual();}
  },
  activate(){
    if(!this.active||!this.items.length)return;
    const it=this.items[this.focus];if(!it)return;
    if(it.onActivate)it.onActivate();
    else if(it.el){
      // Sensible default behavior based on tag
      const el=it.el;
      if(el.tagName==='INPUT'&&(el.type==='checkbox'||el.type==='radio')){el.checked=!el.checked;el.dispatchEvent(new Event('change',{bubbles:true}));}
      else if(el.tagName==='SELECT'){/* cycle next value */const s=el;s.selectedIndex=(s.selectedIndex+1)%s.options.length;s.dispatchEvent(new Event('change',{bubbles:true}));}
      else el.click();
    }
  },
  altChange(dir){// for select cycling left/right alt
    if(!this.active||!this.items.length)return;
    const it=this.items[this.focus];if(!it||!it.el)return;
    if(it.el.tagName==='SELECT'){const s=it.el;s.selectedIndex=(s.selectedIndex+dir+s.options.length)%s.options.length;s.dispatchEvent(new Event('change',{bubbles:true}));}
  }
};

// UI-navigation gamepad polling — runs only when an overlay is open
let _uiNavHeld={up:false,down:false,left:false,right:false};
function pollGamepadUI(){
  if(!UINav.active)return;
  const list=gamepadList();if(!list.length)return;
  // Combine directions from all pads so either player can navigate
  let up=false,down=false,left=false,right=false,cross=false,circle=false;
  list.forEach(gp=>{
    if(gp.buttons[12]&&gp.buttons[12].pressed)up=true;
    if(gp.buttons[13]&&gp.buttons[13].pressed)down=true;
    if(gp.buttons[14]&&gp.buttons[14].pressed)left=true;
    if(gp.buttons[15]&&gp.buttons[15].pressed)right=true;
    const ax=gp.axes[0]||0,ay=gp.axes[1]||0,dz=GP.deadzone;
    if(ay<-dz)up=true;if(ay>dz)down=true;if(ax<-dz)left=true;if(ax>dz)right=true;
    if(gpPressed(gp,0))cross=true;
    if(gpPressed(gp,1))circle=true;
  });
  // Edge-trigger direction (with repeat delay)
  UINav.repeatTimer=(UINav.repeatTimer||0)-1;
  const canMove=UINav.repeatTimer<=0;
  if(up&&!_uiNavHeld.up&&canMove){UINav.move(0,-1);UINav.repeatTimer=18;}
  else if(down&&!_uiNavHeld.down&&canMove){UINav.move(0,1);UINav.repeatTimer=18;}
  else if(left&&!_uiNavHeld.left&&canMove){UINav.move(-1,0);UINav.repeatTimer=18;}
  else if(right&&!_uiNavHeld.right&&canMove){UINav.move(1,0);UINav.repeatTimer=18;}
  // Held repeat
  else if((up||down||left||right)&&canMove){
    if(up)UINav.move(0,-1);else if(down)UINav.move(0,1);else if(left)UINav.move(-1,0);else if(right)UINav.move(1,0);
    UINav.repeatTimer=10;
  }
  _uiNavHeld={up,down,left,right};
  if(cross)UINav.activate();
  if(circle){// Circle = back/cancel — tries to click a #menuBtn / #cancelBtn / default
    const back=document.querySelector('.ov #menuBtn, .ov #menuBtn2, .ov .btn-danger');
    if(back)back.click();
  }
  // Ensure gpUpdatePrev is called even when UI active (prevents stuck edge state)
  gpUpdatePrev();
}
// Keyboard navigation for menus: Arrow/WASD/Enter — complements the gamepad
addEventListener('keydown',e=>{
  if(!UINav.active)return;
  const k=e.key.toLowerCase();
  if(k==='arrowup'||k==='w'){UINav.move(0,-1);e.preventDefault();}
  else if(k==='arrowdown'||k==='s'){UINav.move(0,1);e.preventDefault();}
  else if(k==='arrowleft'||k==='a'||k==='q'){UINav.move(-1,0);e.preventDefault();}
  else if(k==='arrowright'||k==='d'){UINav.move(1,0);e.preventDefault();}
  else if(k==='enter'||k===' '){UINav.activate();e.preventDefault();}
},true);

addEventListener('keydown',e=>{const k=e.key.toLowerCase();Keys[k]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k))e.preventDefault();
  if(k==='enter'){triggerPower(1);e.preventDefault();}if(e.code==='ShiftRight'){triggerSuper(1);e.preventDefault();}
  if(k==='f')triggerPower(2);if(e.code==='Space'){triggerSuper(2);e.preventDefault();}
  if(k==='p'){e.preventDefault();if(!G.started)return;if(G.countdown>0)return;if(!G.paused){G.paused=true;}showPauseMenu();}
});
addEventListener('keyup',e=>{Keys[e.key.toLowerCase()]=false;});

function getInputDir(pid){
  const pl=pid===1?G.p1:G.p2;const inv=pl?.madness>0;
  // 1) Keyboard
  if(pid===1){
    if(Keys['arrowup'])return inv?[0,1]:[0,-1];
    if(Keys['arrowdown'])return inv?[0,-1]:[0,1];
    if(Keys['arrowleft'])return inv?[1,0]:[-1,0];
    if(Keys['arrowright'])return inv?[-1,0]:[1,0];
  }else{
    if(Keys['z'])return inv?[0,1]:[0,-1];
    if(Keys['s'])return inv?[0,-1]:[0,1];
    if(Keys['q'])return inv?[1,0]:[-1,0];
    if(Keys['d'])return inv?[-1,0]:[1,0];
  }
  // 2) Gamepad
  const gp=gamepadForPid(pid);
  const d=gpReadDir(gp);
  if(d){if(inv)return[-d[0],-d[1]];return d;}
  return null;
}
function triggerPower(pid){if(!G.started||G.paused||G.countdown>0)return;const pl=pid===1?G.p1:G.p2;if(!pl)return;
  // Mante: camouflage is a toggle, ignores cooldown/timer
  if(pl.isMante){pl.species.usePower(pl);return;}
  if(pl.powerTimer>0||pl.cooldownTimer>0)return;pl.species.usePower(pl);pl._powerMax=pl.powerTimer||1;if(pl.powerTimer<=1)pl.cooldownTimer=pl.species.cooldown;sfxPower();}
function triggerSuper(pid){if(!G.started||G.paused||G.countdown>0)return;const pl=pid===1?G.p1:G.p2;if(!pl)return;
  // Cèpe special: if a parasite is glued, second press launches it (doesn't need superReady)
  if(pl.species.id==='edulis'&&pl.stuckParasite){pl.species.useSuper(pl);pl._powerMax=pl.powerTimer||1;return;}
  // Mante: FONCE is free & always available (no gauge, no camouflage requirement)
  if(pl.isMante){pl.species.useSuper(pl);return;}
  if(!pl.superReady)return;pl.superReady=false;pl.species.useSuper(pl);pl._powerMax=pl.powerTimer||1;sfxPower();}

function startGame(){const{grid,remaining}=generateMaze();G.grid=grid;G.remaining=remaining;G.initialRemaining=remaining;
  G.score1=0;G.score2=0;G.lives1=3;G.lives2=3;G.parasites=[];G.particles=[];G.floats=[];
  G.nightMode=false;G.nightTimer=0;G.nightCd=20*60;G.nightRot=0;G.stormActive=false;G.stormTimer=0;G.stormCd=22*60;
  G.goldenActive=false;G.goldenTimer=0;G.goldenCd=28*60;G.earthquakeCd=25*60;G.shakeTimer=0;G.shakeIntensity=0;
  G.fireActive=false;G.fireTimer=0;G.fireCd=28*60;G.fireSpreadTimer=0;G.fireCells=new Set();
  G.cueilleurs=[];G.cueilleurCd=25*60;G.panicActive=false;G.spawnTimer=G.diff.spawnInterval;
  G.fireRegrowZone=null;G.fireRegrowTimer=0;G.fireRegrowPlan=null;G.hideouts=[];
  G.stats={spores1:0,spores2:0,maxCombo1:0,maxCombo2:0,bonuses1:0,bonuses2:0,parasitesTrapped:0,timeAlive:0};
  _activeEvents.clear();renderEventBanner();
  stopAllGameMusic();startDayMusic();
  const p1pos=findOpen();G.p1=makePlayer(p1pos.x,p1pos.y,1,sel1);G.grid[p1pos.y][p1pos.x].pellet=false;G.remaining--;
  if(G.mode==='duo'){
    const p2pos=findOpenFar(p1pos,10);G.p2=makePlayer(p2pos.x,p2pos.y,2,sel2);G.grid[p2pos.y][p2pos.x].pellet=false;G.remaining--;
  }else{
    // Solo: if P1 is mante, create AI mushroom opponent; otherwise no P2
    if(sel1.type==='mante'){
      const p2pos=findOpenFar(p1pos,10);
      // Pick a random non-mante species for AI mushroom
      const mushes=SPECIES.filter(s=>s.type==='mushroom');
      const aiSpecies=mushes[(Math.random()*mushes.length)|0];
      G.p2=makePlayer(p2pos.x,p2pos.y,2,aiSpecies);G.p2.isAI=true;
      G.grid[p2pos.y][p2pos.x].pellet=false;G.remaining--;
    }else G.p2=null;
  }
  const manteSoloMode=G.p1.isMante&&G.p2&&G.p2.isAI;
  const extraParasites=manteSoloMode?2:0;// extra parasites to challenge AI mushroom
  for(let i=0;i<G.diff.enemyCount+extraParasites;i++)spawnParasite();
  buildFloorLayer();rebuildWallLayer();rebuildPelletLayer();
  // HUD setup — swap columns in duo, hide P2 keys in solo
  const hud=$('hud'),kb=$('kb');
  const showP2=G.mode==='duo'||(G.p2!=null);
  $('pbox2').style.display=showP2?'flex':'none';
  hud.classList.toggle('duo-swap',G.mode==='duo');
  kb.classList.toggle('hide-p2',G.mode!=='duo');
  $('mode-label').textContent=G.mode==='duo'?'2 Joueurs':(sel1.type==='mante'?'Solo (vs IA)':'Solo');
  $('diff-label').textContent=G.diff.name;
  $('sp-icon1').src=sel1.type==='mante'?'mante0.png':SPRITES[sel1.id];$('sp-name1').textContent=sel1.name;
  if(G.p2){$('sp-icon2').src=G.p2.species.type==='mante'?'mante0.png':SPRITES[G.p2.species.id];$('sp-name2').textContent=G.p2.species.name+(G.p2.isAI?' (IA)':'');}
  updateLives(1);updateLives(2);updateHUD(G.p1);if(G.p2)updateHUD(G.p2);updateLeader();G.started=true;G.paused=false;startCountdown();}
function spawnParasite(){const pos=findOpen();G.parasites.push({x:pos.x+.5,y:pos.y+.5,dir:[1,0],path:[],speed:G.diff.enemySpeed,kind:1+((Math.random()*7)|0),scared:0,blind:0,confused:0,frozen:0,servant:false,servantOwner:0,servantTimer:0,trail:[],bouncing:null,stuck:false,stuckTo:null,stuckOffset:null,launched:null,morilleMadness:null});}
function startCountdown(){G.countdown=180;G.paused=false;}

// ══════ UPDATE PLAYER ══════
function updatePlayer(pl,dt){if(!pl)return;
  if(pl.invuln>0)pl.invuln-=dt;if(pl.respawnFlash>0)pl.respawnFlash-=dt;if(pl.madness>0)pl.madness-=dt;
  if(pl._speedBonus>0){pl._speedBonus-=dt;if(pl._speedBonus<=0&&pl.powerTimer<=0)pl.speedMul=1;}
  if(pl.magnet>0)pl.magnet-=dt;if(pl.locateTimer>0)pl.locateTimer-=dt;if(pl.spawnGlow>0)pl.spawnGlow-=dt;if(pl.shockwave>0)pl.shockwave-=dt*.015;
  if(pl.comboTimer>0){pl.comboTimer-=dt;if(pl.comboTimer<=0)pl.combo=0;}
  if(pl.eatGlow>0)pl.eatGlow-=dt;

  // === MANTE LOGIC ===
  if(pl.isMante){
    // Health: decays out of camouflage, regenerates in camouflage
    if(pl.camouflage){
      pl.health=Math.min(MANTE_MAX_HP,pl.health+G.diff.manteCamoRegen*dt);
    }else{
      pl.health-=G.diff.manteDecay*dt;
    }
    if(pl.health<=0){pl.health=0;manteDeath(pl);return;}
    // Force camouflage off at night
    if(pl.camouflage&&G.nightMode){pl.camouflage=false;pl.powerTimer=0;spawnFloat(pl.x*TILE,pl.y*TILE,'Nuit — camouflage perdu','#ff8888');}
    // Dash mode: move fast in straight line until wall
    if(pl.dashing){
      pl.lastDir=pl.dashDir.slice();pl.dir=pl.dashDir.slice();
      pl.dashTimer-=dt;const dashSpd=pl.speed*10*dt;
      const nx=pl.x+pl.dashDir[0]*dashSpd,ny=pl.y+pl.dashDir[1]*dashSpd;
      const lx=Math.floor(nx),ly=Math.floor(ny);
      if(!inBounds(lx,ly)||G.grid[ly][lx].wall){pl.dashing=false;pl.dashTimer=0;spawnFloat(pl.x*TILE,pl.y*TILE,'BOUM !','#ffaa44');sfxHit();}
      else{pl.x=nx;pl.y=ny;
        // Collide with parasites during dash — eat them
        for(let i=G.parasites.length-1;i>=0;i--){const p=G.parasites[i];
          if(p.stuck||p.launched)continue;
          if(dist(p.x,p.y,pl.x,pl.y)<.85){manteEatsParasite(pl,p,i);}}
        // Check fire
        const px=Math.floor(pl.x),py=Math.floor(pl.y);
        if(inBounds(px,py)&&G.grid[py][px].fire){pl.health-=G.diff.manteFireDamage;sfxFire();spawnFloat(pl.x*TILE,pl.y*TILE,'-'+G.diff.manteFireDamage+'% 🔥','#ff5522');pl.dashing=false;if(pl.health<=0){pl.health=0;manteDeath(pl);return;}respawnMante(pl);return;}
      }
      if(pl.dashTimer<=0)pl.dashing=false;
      return;
    }
    // Camouflage: can rotate (change facing) but not move position
    if(pl.camouflage){
      const input=pl.isAI?null:getInputDir(pl.pid);
      if(input){pl.lastDir=input.slice();pl.dir=input.slice();}
      // Don't advance position; allow collision eating (touching still eats)
      for(let i=G.parasites.length-1;i>=0;i--){const p=G.parasites[i];
        if(p.stuck||p.launched)continue;
        if(dist(p.x,p.y,pl.x,pl.y)<.75){manteEatsParasite(pl,p,i);}}
      return;
    }
  }

  if(pl.powerTimer>0){pl.powerTimer-=dt;if(pl.powerTimer<=0){pl.powerTimer=0;pl.species.onPowerEnd(pl);if(pl.species.cooldown>0)pl.cooldownTimer=pl.species.cooldown;}}
  if(pl.cooldownTimer>0){pl.cooldownTimer-=dt;if(pl.cooldownTimer<0)pl.cooldownTimer=0;}
  const input=pl.isAI?getAIInputDir(pl):getInputDir(pl.pid);if(input)pl.nextDir=input;
  const spd=pl.speed*(pl.speedMul||1)*dt;const gx=Math.floor(pl.x),gy=Math.floor(pl.y),cx=gx+.5,cy=gy+.5;
  if(pl.nextDir[0]!==0||pl.nextDir[1]!==0){const ntx=gx+pl.nextDir[0],nty=gy+pl.nextDir[1];
    if(canMoveTo(ntx,nty,pl.phase)||(pl._wallPasses>0&&inBounds(ntx,nty)&&G.grid[nty][ntx].wall&&!isEdge(ntx,nty))){
      if(pl.nextDir[0]!==0&&Math.abs(pl.y-cy)<.3){pl.y=cy;pl.dir=pl.nextDir.slice();pl.lastDir=pl.dir.slice();pl.nextDir=[0,0];}
      else if(pl.nextDir[1]!==0&&Math.abs(pl.x-cx)<.3){pl.x=cx;pl.dir=pl.nextDir.slice();pl.lastDir=pl.dir.slice();pl.nextDir=[0,0];}}}
  if(pl.dir[0]!==0||pl.dir[1]!==0){
    const nx=pl.x+pl.dir[0]*spd,ny=pl.y+pl.dir[1]*spd;
    const lx=Math.floor(pl.x+pl.dir[0]*.49),ly=Math.floor(pl.y+pl.dir[1]*.49);
    // Phalloïde wall-pass: if hitting a wall and has passes
    if(!canMoveTo(lx,ly,pl.phase)&&pl._wallPasses>0&&inBounds(lx,ly)&&G.grid[ly][lx].wall&&!isEdge(lx,ly)){
      let wx=lx,wy=ly;
      for(let step=0;step<8;step++){wx+=pl.dir[0];wy+=pl.dir[1];
        if(!inBounds(wx,wy)||isEdge(wx,wy))break;
        if(!G.grid[wy][wx].wall){pl.x=wx+.5;pl.y=wy+.5;pl._wallPasses--;
          sfxPower();spawnFloat(pl.x*TILE,pl.y*TILE,'PASSE-MURAILLE !','#aaffaa');break;}}
    }else if(canMoveTo(lx,ly,pl.phase)){pl.x=nx;pl.y=ny;}
    else{pl.x=gx+.5;pl.y=gy+.5;pl.dir=[0,0];}}
  // Muscaria trail — never drop inside a hideout
  if(pl._muscariaTrail){const tx=Math.floor(pl.x),ty=Math.floor(pl.y);const cc=G.grid[ty]&&G.grid[ty][tx];
    if(isWalk(tx,ty)&&cc&&!cc.trap&&!cc.hideout&&!cc.hideoutBorder){const seed=Math.random()*999;cc.trap={owner:pl.pid,seed,wide:true};}}
  // Collect
  const px=Math.floor(pl.x),py=Math.floor(pl.y);
  if(inBounds(px,py)){const cell=G.grid[py][px];
    if(cell.fire){
      if(pl.isMante){pl.health-=G.diff.manteFireDamage;sfxFire();spawnFloat(pl.x*TILE,pl.y*TILE,'-'+G.diff.manteFireDamage+'% 🔥','#ff5522');if(pl.health<=0){pl.health=0;manteDeath(pl);return;}respawnMante(pl);return;}
      else{playerHitByFire(pl);return;}
    }
    // Mante does NOT collect pellets (focuses on parasites)
    if(cell.pellet&&!pl.isMante)collectPellet(pl,px,py);
    if(cell.bonus&&!pl.isMante)collectBonus(pl,cell);
    else if(cell.bonus&&pl.isMante&&cell.bonus==='life'){
      // mante healing bonus: +20% hp (capped at max)
      cell.bonus=null;rebuildPelletLayer();pl.health=Math.min(MANTE_MAX_HP,pl.health+20);sfxLife();spawnFloat(pl.x*TILE,pl.y*TILE,'+20% ❤','#ff5c6c');
    }else if(cell.bonus&&pl.isMante){
      // mante ignores most bonuses or minor effects
      cell.bonus=null;rebuildPelletLayer();spawnFloat(pl.x*TILE,pl.y*TILE,'+','#aaaaaa');
    }
    // Hideout: STRICTEMENT réservé au strophaire propriétaire
    // Tout autre joueur (mante, autre champignon, même un autre strophaire) est repoussé
    if(cell.hideout){
      const allowed=pl.species.id==='stropharia'&&cell.hideout.owner===pl.pid;
      if(!allowed){
        // Push back: try to move 1 tile in opposite direction of last movement
        const back=pl.dir&&(pl.dir[0]||pl.dir[1])?[-pl.dir[0],-pl.dir[1]]:(pl.lastDir?[-pl.lastDir[0],-pl.lastDir[1]]:[0,1]);
        const bx=Math.floor(pl.x)+back[0],by=Math.floor(pl.y)+back[1];
        if(inBounds(bx,by)&&!G.grid[by][bx].wall&&!G.grid[by][bx].hideout){
          pl.x=bx+.5;pl.y=by+.5;
        }else{
          // Fallback: any adjacent walkable non-hideout cell
          const gxc=Math.floor(pl.x),gyc=Math.floor(pl.y);
          let pushed=false;
          for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]]){
            const nx=gxc+dx,ny=gyc+dy;
            if(inBounds(nx,ny)&&!G.grid[ny][nx].wall&&!G.grid[ny][nx].hideout){pl.x=nx+.5;pl.y=ny+.5;pushed=true;break;}
          }
          if(!pushed){const s=findOpen();pl.x=s.x+.5;pl.y=s.y+.5;}
        }
        pl.dir=[0,0];pl.nextDir=[0,0];
        spawnFloat(pl.x*TILE,pl.y*TILE,'Cachette interdite !','#ff8888');
      }
    }
    // Trap: muscaria immune to own traps, mante immune to all traps, sheltered strophaire immune
    if(cell.trap&&cell.trap.owner!==pl.pid&&!pl.isMante&&!isSafeInHideout(pl)){
      cell.trap=null;const s=findOpen();pl.x=s.x+.5;pl.y=s.y+.5;pl.dir=[0,0];pl.locateTimer=4*60;pl.spawnGlow=3*60;sfxTrap();spawnFloat(pl.x*TILE,pl.y*TILE,'PIÈGE !','#ff4444');G.stats.parasitesTrapped++;}}
  if(pl.magnet>0&&!pl.isMante){for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){const nx2=px+dx,ny2=py+dy;if(inBounds(nx2,ny2)&&G.grid[ny2][nx2].pellet&&dist(pl.x,pl.y,nx2+.5,ny2+.5)<2.8)collectPellet(pl,nx2,ny2);}}

  // Mante touches parasite (non-dash, non-camouflage path)
  if(pl.isMante){
    // Pheromone trail during storm
    if(G.stormActive){
      if(!pl.trail)pl.trail=[];
      const last=pl.trail[pl.trail.length-1];
      if(!last||dist(last.x,last.y,pl.x,pl.y)>.18){
        const perp=(Math.random()-.5)*.35;
        pl.trail.push({x:pl.x,y:pl.y,t:performance.now(),w:perp});
        if(pl.trail.length>28)pl.trail.shift();
      }
    }else if(pl.trail&&pl.trail.length){pl.trail=[];}
    for(let i=G.parasites.length-1;i>=0;i--){const p=G.parasites[i];
      if(p.stuck||p.launched)continue;
      if(dist(p.x,p.y,pl.x,pl.y)<.75){manteEatsParasite(pl,p,i);}}
  }
}

function getMantePlayer(){if(G.p1&&G.p1.isMante)return G.p1;if(G.p2&&G.p2.isMante)return G.p2;return null;}

function manteEatsParasite(pl,p,idx){
  if(p.stuck||p.launched)return;
  pl.killCount++;
  pl.eatGlow=60;// 1 second green glow
  const pts=Math.round(12*Math.pow(1.2,pl.killCount-1));
  if(pl.pid===1){G.score1+=pts;G.stats.spores1++;}else{G.score2+=pts;G.stats.spores2++;}
  pl.spores++;pl.health=Math.min(MANTE_MAX_HP,pl.health+G.diff.manteHealPerKill);
  spawnFloat(p.x*TILE,p.y*TILE,'+'+pts+' 🦗','#66dd66');
  sfxEat();
  G.parasites.splice(idx,1);
  // Respawn replacement parasite elsewhere
  spawnParasite();
  updateLeader();
}

function manteDeath(pl){
  // Case 1: both players alive (duo or solo-with-AI-mushroom)
  if(G.p1&&G.p2){
    if(G.p1.isMante&&G.p2.isMante){
      const other=pl===G.p1?G.p2:G.p1;
      if(other.health<=0)endMatch('Match nul — Les deux mantes ont péri !');
      else endMatch(`J${other.pid} gagne — L'autre mante s'est épuisée !`);
      return;
    }
    // One mante, one mushroom
    const mush=pl===G.p1?G.p2:G.p1;
    if(mush.isAI)endMatch('🎉 IA Champignon gagne — Mante épuisée !');
    else endMatch(`J${mush.pid} gagne — La mante s'est épuisée !`);
    return;
  }
  endMatch('Mante épuisée — Fin !');
}
function collectPellet(pl,px,py){const cell=G.grid[py][px];if(!cell.pellet)return;cell.pellet=false;G.remaining--;rebuildPelletLayer();
  if(pl.comboTimer>0)pl.combo++;else pl.combo=1;pl.comboTimer=35;
  if(pl.combo>=3)sfxCombo(pl.combo);else sfxEat();
  const comboMul=pl.combo>=10?2.5:pl.combo>=7?2:pl.combo>=4?1.5:1;
  const pts=Math.round(10*(G.goldenActive?5:1)*comboMul);
  if(pl.pid===1){G.score1+=pts;G.stats.spores1++;}else{G.score2+=pts;G.stats.spores2++;}pl.spores++;
  if(pl.pid===1&&pl.combo>G.stats.maxCombo1)G.stats.maxCombo1=pl.combo;
  if(pl.pid===2&&pl.combo>G.stats.maxCombo2)G.stats.maxCombo2=pl.combo;
  if(pl.spores>0&&pl.spores%SUPER_COST===0&&!pl.superReady){pl.superReady=true;showEvent(`★ SUPER CHARGÉ J${pl.pid} !`,'#ffd700',2500);}updateLeader();}
function collectBonus(pl,cell){const kind=cell.bonus;cell.bonus=null;rebuildPelletLayer();if(pl.pid===1)G.stats.bonuses1++;else G.stats.bonuses2++;
  switch(kind){case'life':if(pl.pid===1)G.lives1=Math.min(G.lives1+1,5);else G.lives2=Math.min(G.lives2+1,5);updateLives(pl.pid);sfxLife();spawnFloat(pl.x*TILE,pl.y*TILE,'+1 ❤','#ff5c6c');break;
    case'speed':pl.speedMul=Math.max(pl.speedMul,1.4);pl._speedBonus=5*60;spawnFloat(pl.x*TILE,pl.y*TILE,'SPEED!','#88ccff');break;
    case'freeze':G.parasites.forEach(p=>{p.frozen=Math.max(p.frozen,3*60);});sfxFreeze();spawnFloat(pl.x*TILE,pl.y*TILE,'FREEZE!','#88eeff');break;
    case'score':if(pl.pid===1)G.score1+=200;else G.score2+=200;sfxGolden();spawnFloat(pl.x*TILE,pl.y*TILE,'+200','#ffdd00');updateLeader();break;
    case'magnet':pl.magnet=6*60;spawnFloat(pl.x*TILE,pl.y*TILE,'AIMANT!','#ff88ff');break;}}
function playerHitByFire(pl){if(pl.invuln>0||pl.respawnFlash>0)return;
  if(pl.isMante){
    pl.health-=G.diff.manteFireDamage;sfxFire();spawnFloat(pl.x*TILE,pl.y*TILE,'-'+G.diff.manteFireDamage+'% 🔥','#ff5522');
    if(pl.health<=0){pl.health=0;manteDeath(pl);return;}
    respawnMante(pl);return;
  }
  // Strophaire totalement invulnérable dans sa propre cachette
  if(isSafeInHideout(pl))return;
  sfxFire();if(pl.pid===1){G.lives1--;updateLives(1);}else{G.lives2--;updateLives(2);}checkDeath(pl);}

// ══════ PARASITES ══════
function updateParasites(dt){G.parasites.forEach(p=>{
  // --- Stuck to a Cèpe: follow owner at offset ---
  if(p.stuck&&p.stuckTo){
    const o=p.stuckTo;if(!o||!o.shield||o.shieldType!=='sticky'){p.stuck=false;p.stuckTo=null;p.stuckOffset=null;}
    else{p.x=o.x+(p.stuckOffset?p.stuckOffset.x:0);p.y=o.y+(p.stuckOffset?p.stuckOffset.y:0);return;}
  }
  // --- Launched projectile — HOMING, never misses ---
  if(p.launched){const L=p.launched;L.life-=dt;
    // Homing: update direction toward target
    let tgt=null;
    if(L.targetPlayer){tgt={x:L.targetPlayer.x,y:L.targetPlayer.y};}
    else if(L.targetParasite){tgt={x:L.targetParasite.x,y:L.targetParasite.y};}
    if(tgt&&L.homing){const dx=tgt.x-p.x,dy=tgt.y-p.y,l=Math.hypot(dx,dy)||1;L.vx=L.vx*.85+(dx/l)*.5*.15;L.vy=L.vy*.85+(dy/l)*.5*.15;}
    const nx=p.x+L.vx*dt,ny=p.y+L.vy*dt;
    // Check collision with target parasite
    if(L.targetParasite){const d2=dist(nx,ny,L.targetParasite.x,L.targetParasite.y);
      if(d2<.9){p.launched=null;p.confused=5*60;p.frozen=5*60;L.targetParasite.confused=5*60;L.targetParasite.frozen=5*60;
        p.path=[];L.targetParasite.path=[];spawnFloat(nx*TILE,ny*TILE,'SONNÉS !','#ffdd44');sfxHit();return;}}
    // Check collision with target player
    if(L.targetPlayer){const d2=dist(nx,ny,L.targetPlayer.x,L.targetPlayer.y);
      if(d2<.7){// Hit player: bounce them, no immobilize
        const tpl=L.targetPlayer;p.launched=null;p.confused=3*60;p.path=[];
        const bx=tpl.x-p.x,by=tpl.y-p.y,bl=Math.hypot(bx,by)||1;
        tpl.x+=bx/bl*2;tpl.y+=by/bl*2;// push player away
        sfxBounce();spawnFloat(tpl.x*TILE,tpl.y*TILE,'PROJETÉ !','#ffdd44');return;}}
    // Check wall collision — pass through walls for homing
    const tx=Math.floor(nx),ty=Math.floor(ny);
    if(!inBounds(tx,ty)){p.launched=null;p.confused=2*60;p.path=[];return;}
    p.x=nx;p.y=ny;
    if(L.life<=0){p.launched=null;p.confused=2*60;p.path=[];return;}
    return;
  }
  // --- Bounced by a Cèpe bouncy shield ---
  if(p.bouncing){const B=p.bouncing;B.life-=dt;
    const nx=p.x+B.vx*dt,ny=p.y+B.vy*dt;
    const tx=Math.floor(nx),ty=Math.floor(ny);
    if(!inBounds(tx,ty)){p.bouncing=null;p.confused=2*60;p.path=[];return;}
    if(G.grid[ty][tx].wall&&!isEdge(tx,ty)){removeWall(tx,ty);sfxTreeCrash();spawnFloat(tx*TILE+TILE/2,ty*TILE+TILE/2,'ARBRE PULVÉRISÉ !','#d9a55a');
      p.x=tx+.5;p.y=ty+.5;p.bouncing=null;p.confused=3*60;p.frozen=60;p.path=[];return;}
    if(G.grid[ty][tx].wall){p.bouncing=null;p.confused=2*60;p.path=[];return;}
    p.x=nx;p.y=ny;if(B.life<=0){p.bouncing=null;p.confused=90;p.path=[];}return;
  }
  // --- Record pheromone trail if storm active (break trail on teleport) ---
  if(G.stormActive&&!p._teleported){
    if(!p.trail)p.trail=[];
    const last=p.trail[p.trail.length-1];
