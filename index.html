<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PACMUSH ODYSSEY</title>
<style>
  :root { --bg:#0b0a0e; --card:#16131b; --pill:#1b141e; --line:#ffffff22; --shadow:#00000055; --text:#fff7ea; }
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial}
  #wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:10px}
  #hud{display:flex;gap:12px;align-items:center;user-select:none;font-weight:700;letter-spacing:.3px;flex-wrap:wrap;justify-content:center}
  .pill{padding:6px 10px;border-radius:999px;background:var(--pill);border:1px solid var(--line);box-shadow:0 3px 10px var(--shadow)}
  #legend{opacity:.9;font-size:14px}
  #game{display:block;width:1100px;max-width:95vw;height:auto;background:#0f0c14;border-radius:18px;border:2px solid #00000055;box-shadow:0 22px 70px #000000aa}
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:9999}
  .card{max-width:1100px;width:92vw;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 80px #0009;padding:18px;max-height:88vh;overflow:auto}
  .title{font-weight:800;font-size:28px;color:#8fd0ff;}
  .sub{opacity:.9; margin-bottom: 15px;}
  .grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));margin-top:14px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .badge{background:#ffffff10;border:1px solid var(--line);border-radius:999px;padding:4px 10px;font-size:13px}
  .btn{background:#8fd0ff; color:#000; border:none; border-radius:10px; padding:12px 20px; font-weight:800; font-size:16px; cursor:pointer; transition:opacity 0.2s;}
  .btn:hover:not([disabled]){opacity:.8;}
  .btn[disabled]{opacity:.4;cursor:not-allowed;background:#555;color:#aaa;}
  .sectionTitle{margin-top:14px;font-weight:800; border-bottom: 1px solid var(--line); padding-bottom: 4px;}
  .choice{background:#0e0b13;border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;display:flex;gap:12px;align-items:center; transition: border-color 0.2s;}
  .choice:hover:not(.disabled){border-color:#8fd0ff;}
  .choice.disabled{opacity:.4;filter:grayscale(80%);pointer-events:none}
</style>
</head>
<body>
  <audio id="bgm" src="mushroom_hill_zone.mp3" loop></audio>
  <div id="wrap">
    <div id="hud">
      <div class="pill">🕹️ <span id="mode">Solo</span></div>
      <div class="pill" id="leaderPill" style="display:none">👑 <span id="leaderText" style="color:#ff4d4d;font-weight:800">—</span></div>
      <div class="pill">J1 — Score: <span id="score1">0</span> · Vies: <span id="lives1">3</span> · Jauge: <span id="power1">0/30</span></div>
      <div class="pill" id="p2hud" style="display:none">J2 — Score: <span id="score2">0</span> · Vies: <span id="lives2">3</span> · Jauge: <span id="power2">0/30</span></div>
      <div class="pill">Défis : <span id="diff">Guerre des Spores</span></div>
      <div id="legend" class="pill">J1: Flèches/Entrée/Maj D. | J2: ZQSD/F/Espace | P: Pause | O: Menu</div>
    </div>
    <canvas id="game" width="1100" height="880" aria-label="PACMUSH ODYSSEY"></canvas>
  </div>

<script>
/* =================== INITIALISATION AUDIO =================== */
let bgm;
function initMusic() { bgm = document.getElementById("bgm"); bgm.volume = 0.4; }
function startMusic() { if (bgm) bgm.play().catch(e => console.log("Lecture auto bloquée :", e)); }
function stopMusic() { if (bgm) bgm.pause(); }

initMusic();
document.addEventListener("keydown", startMusic, {once:true});
document.addEventListener("click", startMusic, {once:true});

/* =================== CONSTANTES & DOM =================== */
const CANVAS = document.getElementById('game');
const CTX = CANVAS.getContext('2d', { alpha: false });
const W = CANVAS.width, H = CANVAS.height;
const UI = {
  leaderPill: document.getElementById('leaderPill'), leaderText: document.getElementById('leaderText'),
  mode:document.getElementById('mode'), diff:document.getElementById('diff'),
  score1:document.getElementById('score1'), lives1:document.getElementById('lives1'), power1:document.getElementById('power1'),
  score2:document.getElementById('score2'), lives2:document.getElementById('lives2'), power2:document.getElementById('power2'),
  p2hud:document.getElementById('p2hud'), overlay:null, choices1:null, choices2:null, startBtn:null
};

const TILE=28;
const COLS=Math.max(5,(W/TILE)|0);
const ROWS=Math.max(5,(H/TILE)|0);

const DIFFICULTIES=[
  {id:'easy', name:'Cueillette du dimanche', label:'Cueillette du dimanche — facile', factor:0.5},
  {id:'medium', name:'Chiens Truffiers', label:'Chiens Truffiers — moyen', factor:0.75},
  {id:'hard', name:'Guerre des Spores', label:'Guerre des Spores — difficile', factor:1}
];
let SelectedDifficulty=DIFFICULTIES[2];

const MATCH_LEVELS_SOLO=1;
const MATCH_LEVELS_DUO=1;

let SESSION_SEEDS = [];
function reseedSession(levelCount){
  const n = Math.max(levelCount|0, 4);
  if (window.crypto && crypto.getRandomValues) {
    const arr = new Uint32Array(n); crypto.getRandomValues(arr);
    SESSION_SEEDS = Array.from(arr, v => (v>>>0) ^ (Date.now()>>>0) ^ ((Math.random()*1e9)|0));
  } else {
    SESSION_SEEDS = Array.from({length:n}, () => ((Date.now() + Math.random()*1e9)|0)>>>0);
  }
}

/* ============ ASSETS & SPRITES ============ */
const SPRITES_BY_SPECIES = {
  cornucopioides: { game: 'champignon_6_bordered.png', ui: 'champignon_6_bordered.png' },
  muscaria:       { game: 'champignon_3.png',          ui: 'champignon_3.png' },
  cibarius:       { game: 'champignon_1.png',          ui: 'champignon_1.png' },
  edulis:         { game: 'champignon_4.png',          ui: 'champignon_4.png' },
  morchella:      { game: 'champignon_5_bordered.png', ui: 'champignon_5_bordered.png' },
  phalloides:     { game: 'champignon_2.png',          ui: 'champignon_2.png' },
  stropharia:     { game: 'champignon_7.png',          ui: 'champignon_7.png' },
  anthurus:       { game: 'champignon_8.png',          ui: 'champignon_8.png' },
};

const PARASITE_SPRITES = [null,'Parasite_1.png','Parasite_2.png','Parasite_3.png','Parasite_4.png','Parasite_5.png','Parasite_6.png','Parasite_7.png'];

const _IMG_CACHE = new Map();
function loadImg(src){
  if(_IMG_CACHE.has(src)) return _IMG_CACHE.get(src);
  const i=new Image(); i.src=src; i.decoding='async'; i.loading='eager';
  _IMG_CACHE.set(src,i);
  return i;
}

function preloadCoreImages(){
  const list = ['sol_foret.png', TREE_PNG.chene, TREE_PNG.pin, ...Object.values(SPRITES_BY_SPECIES).flatMap(v => [v.game, v.ui]), ...PARASITE_SPRITES.slice(1)];
  list.forEach(src => loadImg(src));
}

const TREE_PNG = { chene: 'chene.png', pin: 'pin.png' };
function pickTreeSpriteAt(x, y){
  const h = (((x*73856093) ^ (y*19349663) ^ (LEVEL_INDEX*83492791)) >>> 0);
  return (h & 1) ? TREE_PNG.pin : TREE_PNG.chene;
}

function getSpritePath(speciesId, forUI=false){
  const rec = SPRITES_BY_SPECIES[speciesId];
  return rec ? (forUI ? rec.ui : rec.game) : null;
}

function drawImgCenteredPath(path, x, y, s, ghost=false){
  if(!path) return;
  const img = loadImg(path);
  if(!img.complete) return;
  CTX.save();
  if(ghost) CTX.globalAlpha = 0.8;
  CTX.drawImage(img, x - s/2, y - s/2, s, s);
  CTX.restore();
}

/* ============ ENTRÉES CLAVIER ============ */
const Keys=Object.create(null);

addEventListener('keydown', (e)=>{
  const k = e.key.toLowerCase();
  Keys[k] = true;

  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();

  if(e.key === 'Enter') triggerPower(1);
  if(k === 'f') triggerPower(2);
  if(e.code === 'ShiftRight') triggerSuperPower(1);
  if(e.code === 'Space') triggerSuperPower(2);

  if (k === 'p') {
    if (!Game.started) {
      if (UI.overlay) { readOptionsFromOverlay(); UI.overlay.remove(); UI.overlay = null; }
      startGame(); startCountdown(180);
      e.preventDefault(); e.stopPropagation(); return;
    }
    if (Game.countdown > 0) { e.preventDefault(); e.stopPropagation(); return; }
    if (Game.paused) startCountdown(180); else Game.paused = true;
    e.preventDefault(); e.stopPropagation(); return;
  }
  if(k === 'o'){ openOverlay(); }
});

addEventListener('keyup', (e)=>{ Keys[e.key.toLowerCase()] = false; });

/* ============ LOGIQUE DES POUVOIRS ============ */
function triggerPower(pid){
  if(!Game.started || Game.countdown>0) return;
  const pl = (pid===1 ? Game.p1 : Game.p2);
  if(!pl || pl.panelActive || pl.powerTimer > 0) return;

  if (pl.species.id === 'phalloides' && pl.phaseCooldown > 0) return;
  if (pl.species.id === 'cornucopioides' && pl.trumpetCd > 0) return;

  if (pl.species.id === 'stropharia' || pl.species.id === 'anthurus'){
    pl.panelActive = true;
    pl.panelMode = pl.species.id === 'stropharia' ? 'coop' : 'trap';
    pl.powerTimer = 600;
    pl.dir = [0,0]; pl.nextDir = [0,0];
    if (pl.species.id === 'stropharia') pl.invisible = true;
    openPowerPanel(pl);
    sfxPower();
    return;
  }

  const beforeTimer = pl.powerTimer|0;
  pl.species.use(pl);
  if (pl.nextPowerExtend > 0){ pl.powerTimer += pl.nextPowerExtend; pl.nextPowerExtend = 0; }
  if ((pl.powerTimer|0) > beforeTimer){ sfxPower(); }
}

function triggerSuperPower(pid){
  if(!Game.started || Game.countdown>0) return;
  const pl = (pid===1 ? Game.p1 : Game.p2);
  if(!pl || !pl.superPowerHeld) return;

  if (pl.species.id === 'stropharia' || pl.species.id === 'anthurus'){
    pl.panelActive = true;
    pl.panelMode = 'super';
    pl.powerTimer = 600;
    pl.dir = [0,0]; pl.nextDir = [0,0];
    openPowerPanel(pl);
    sfxPower();
    return;
  }

  pl.superPowerHeld = false;
  pl.sporeCharge = 0;
  applySuperPower(pl);
  refreshPowerHUD(pl);
  sfxPower();
}

function applySuperPower(pl){
  switch(pl.species.id){
    case 'cornucopioides':
      pl.powerTimer = Math.max(pl.powerTimer|0, 18*60);
      pl.invisible = true; pl.speedBoost = 1.2; pl.trumpetTrapImmune = true;
      Game.parasites.forEach(p => { p.scared = Math.max(p.scared||0, 8*60); p.path = []; p.lastSeen = null; });
      break;
    case 'muscaria':
      const tx = Math.floor(pl.x), ty = Math.floor(pl.y);
      for(let oy=-1; oy<=1; oy++) for(let ox=-1; ox<=1; ox++){
        const x = tx + ox, y = ty + oy;
        if (isWalkable(x,y)) Game.traps.push({x,y,t:0});
      }
      Game.parasites.forEach(p => {
        p.frozen = Math.max(p.frozen||0, 120);
        if (Math.hypot(p.x-pl.x, p.y-pl.y) <= 5) teleportParasiteFarFromPlayer(p, pl);
      });
      break;
    case 'cibarius':
      const free = Game.parasites.filter(p=>!p.servant).sort((a,b)=>distance(a.x,a.y,pl.x,pl.y)-distance(b.x,b.y,pl.x,pl.y));
      free.slice(0,3).forEach(p => convertToServant(p, pl.pid));
      pl.hunterWindow = 0; pl.powerTimer = Math.max(pl.powerTimer|0, 20*60);
      break;
    case 'edulis':
      pl.shield = true; pl.hitGrace = Math.max(pl.hitGrace||0, 10*60);
      pl.powerTimer = Math.max(pl.powerTimer|0, 10*60);
      repelEnemiesAround(pl, 8, 2.2);
      break;
    case 'morchella':
      Game.parasites.forEach(p => { p.morilleChaos = Math.max(p.morilleChaos||0, 12*60); p.morilleOwner = pl.pid; p.morilleNextSwitch = 0; });
      spawnSporeCloud(pl.x, pl.y, Math.max(COLS, ROWS));
      if (Game.mode==='duo'){
        const foe = (pl.pid===1)?Game.p2:Game.p1;
        if (foe) foe.madnessTimer = Math.max(foe.madnessTimer||0, 8*60);
      }
      break;
    case 'phalloides':
      pl.phase = true; pl.phaseInsideWall = false; pl.phaseCooldown = 0;
      pl.powerTimer = Math.max(pl.powerTimer|0, 14*60); pl.speedBoost = 1.35;
      break;
  }
}

/* ============ UTILITAIRES MATHEMATIQUES & AUDIO ============ */
const now=()=>performance.now();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const distance=(ax,ay,bx,by)=>Math.hypot(ax-bx,ay-by);
function normAngle(a){ while(a<=-Math.PI) a+=Math.PI*2; while(a>Math.PI) a-=Math.PI*2; return a; }
function lerp(a,b,t){ return a + (b-a)*t; }
function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }

let ACTX = null, MASTER = null, STARTED = false;
function ensureAudio(){
  if (STARTED) return; STARTED = true;
  ACTX = new (window.AudioContext || window.webkitAudioContext)();
  MASTER = ACTX.createGain(); MASTER.gain.value = 0.18; MASTER.connect(ACTX.destination);
}
function tone(time,freq,dur,type='sine',vol=0.2){
  if(!ACTX) return;
  const o=ACTX.createOscillator(), g=ACTX.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,time);
  g.gain.value=0; g.gain.linearRampToValueAtTime(vol,time+0.01); g.gain.exponentialRampToValueAtTime(0.0001,time+dur);
  o.connect(g); g.connect(MASTER); o.start(time); o.stop(time+dur);
}
function sfxEat(){ if(ACTX) tone(ACTX.currentTime,740,.05,'triangle',.2); }
function sfxPower(){ if(ACTX) { tone(ACTX.currentTime,520,.1,'sawtooth',.22); tone(ACTX.currentTime+.1,880,.1,'square',.18); } }
function sfxHit(){ if(ACTX) tone(ACTX.currentTime,160,.08,'sawtooth',.3); }
function sfxWin(){ if(ACTX) [660,880,990,1320].forEach((f,i)=>tone(ACTX.currentTime+i*.1,f,.1,'triangle',.2)); }
function sfxLife(){ if(ACTX) [660,990,1320].forEach((f,i)=>tone(ACTX.currentTime+i*.08,f,.08,'sine',.22)); }

CANVAS.addEventListener('click', ensureAudio);

/* ============ DESSIN ENTITES ============ */
function drawTrumpet(c, cx, cy, s, i, g) { drawImgCenteredPath(getSpritePath('cornucopioides', !!i), cx, cy, s*1.15, !!g); }
function drawAmanita(c, cx, cy, s, i)    { drawImgCenteredPath(getSpritePath('muscaria', !!i), cx, cy, s*1.15, false); }
function drawChanterelle(c, cx, cy, s, i){ drawImgCenteredPath(getSpritePath('cibarius', !!i), cx, cy, s*1.15, false); }
function drawCep(c, cx, cy, s, i)        { drawImgCenteredPath(getSpritePath('edulis', !!i), cx, cy, s*1.15, false); }
function drawMorel(c, cx, cy, s, i)      { drawImgCenteredPath(getSpritePath('morchella', !!i), cx, cy, s*1.15, false); }
function drawPhalloides(c, cx, cy, s, i) { drawImgCenteredPath(getSpritePath('phalloides', !!i), cx, cy, s*1.15, false); }
function drawStropharia(c, cx, cy, s, i) { drawImgCenteredPath(getSpritePath('stropharia', !!i), cx, cy, s*1.15, false); }
function drawAnthurus(c, cx, cy, s, i)   { drawImgCenteredPath(getSpritePath('anthurus', !!i), cx, cy, s*1.15, false); }

/* ============ ESPECES ============ */
const Species = [
{ id: 'cornucopioides', name: 'Trompette de la mort', color: '#3d3630', power: "Voile d'ombre", superPower: "Nuit totale", desc: "Devient invisible.", draw: drawTrumpet, use: (me) => { me.powerTimer = 240; me.invisible = true; me.speedBoost = 0.5; } },
{ id: 'muscaria', name: 'Amanite tue-mouches', color: '#c81d1d', power: "Piège mycotique", superPower: "Cercle de pièges", desc: "Pose des pièges.", draw: drawAmanita, use: (me) => { if (me.pid===1) Game.muscariaTrap1 = {x:Math.floor(me.x),y:Math.floor(me.y),active:true}; else Game.muscariaTrap2 = {x:Math.floor(me.x),y:Math.floor(me.y),active:true}; me.powerTimer = 120; } },
{ id: 'cibarius', name: 'Girolle', color: '#e6a100', power: "Serviteur", superPower: "Légion servante", desc: "Convertit un parasite.", draw: drawChanterelle, use: (me) => { me.powerTimer = 15*60; me.hunterWindow = 600; Game.girollePanic.active = true; Game.girollePanic.ownerPid = me.pid; Game.parasites.forEach(p => p.fleeGirolle = me.hunterWindow); } },
{ id: 'edulis', name: 'Cèpe', color: '#7a4f2a', power: "Robustesse", superPower: "Forteresse vivante", desc: "Encaisse un coup.", draw: drawCep, use: (me) => { me.powerTimer=360; me.shield=true; } },
{ id: 'morchella', name: 'Morille', color: '#6a4f2f', power: "Spores chaos", superPower: "Apocalypse spores", desc: "Désoriente les ennemis.", draw: drawMorel, use: (me) => { me.powerTimer = 600; const r = Math.max(1, Math.floor(0.20 * Math.max(COLS, ROWS))); Game.parasites.forEach(p => { if (Math.hypot(p.x-me.x, p.y-me.y) <= r) { p.morilleChaos = 600; p.morilleOwner = me.pid; } }); spawnSporeCloud(me.x, me.y, r); } },
{ id: 'phalloides', name: 'Amanite phalloïde', color: '#7a8b4b', power: "Phase mycélienne", superPower: "Transcendance", desc: "Traverse les murs.", draw: drawPhalloides, use: (me) => { if(me.phaseCooldown>0)return; me.phase=true; me.powerTimer=99999; } },
{ id: 'stropharia', name: 'Strophaire Vert-de-gris', color: '#6bb08f', power: "Symbiose", superPower: "Sanctuaire", desc: "Aide l'allié via panneau.", draw: drawStropharia, use: ()=>{} },
{ id: 'anthurus', name: 'Anthurus d\'archer', color: '#b04a6b', power: "Sabotage", superPower: "Domination", desc: "Piège via panneau.", draw: drawAnthurus, use: ()=>{} }
];
let Selected1=Species[0], Selected2=Species[1];

/* =================== OVERLAY / MENU =================== */
function buildChoiceCard(sp, forPid){
  const otherSel = (forPid===1)? Selected2 : Selected1;
  const isDuo = Game && Game.mode==='duo';
  const disabled = isDuo && otherSel && (otherSel.id===sp.id || (otherSel.id==='stropharia' && sp.id==='anthurus') || (otherSel.id==='anthurus' && sp.id==='stropharia'));

  const div=document.createElement('div');
  div.className='choice'+(disabled?' disabled':'');
  
  const icon = document.createElement('img');
  icon.src = getSpritePath(sp.id, true);
  icon.style.cssText = 'width:64px;height:64px;object-fit:contain;image-rendering:crisp-edges;flex:0 0 auto;';

  const right=document.createElement('div'); right.style.display='grid'; right.style.gap='4px';
  const name=document.createElement('div'); name.style.fontWeight='800'; name.textContent=sp.name;
  const desc=document.createElement('div');
  desc.style.opacity='.85'; desc.style.fontSize='12px';
  desc.innerHTML=`Pouvoir : ${sp.power}<br><span style="color:#ffe7a4">Superpouvoir : ${sp.superPower}</span>`;

  right.appendChild(name); right.appendChild(desc);
  div.appendChild(icon); div.appendChild(right);

  if(!disabled){
    div.onclick = ()=>{ if(forPid===1) Selected1=sp; else Selected2=sp; renderChoices(); updateStartButtonState(); };
  }
  const sel = forPid===1?Selected1:Selected2;
  if(sel && sel.id===sp.id){ div.style.borderColor=sp.color; div.style.boxShadow=`0 0 0 2px ${sp.color}55`; }
  return div;
}

function renderChoices(){
  const isDuo = (UI.overlay?.querySelector('input[name="modeSel"]:checked')?.value === 'duo');
  const list = isDuo ? Species : Species.filter(s => s.id!=='stropharia' && s.id!=='anthurus');
  if(UI.choices1){ UI.choices1.innerHTML=''; list.forEach(sp=>UI.choices1.appendChild(buildChoiceCard(sp,1))); }
  if(UI.choices2){ UI.choices2.innerHTML=''; if(isDuo) list.forEach(sp=>UI.choices2.appendChild(buildChoiceCard(sp,2))); }
}

function updateStartButtonState(){
  if(!UI.overlay) return false;
  const duo = (UI.overlay.querySelector('input[name="modeSel"]:checked')?.value==='duo');
  const pair7v8 = (duo && Selected1 && Selected2 && ((Selected1.id==='stropharia' && Selected2.id==='anthurus') || (Selected1.id==='anthurus' && Selected2.id==='stropharia')));
  const conflict = (duo && Selected1 && Selected2 && (Selected1.id===Selected2.id || pair7v8));
  if(UI.startBtn){ UI.startBtn.disabled = !!conflict; UI.startBtn.textContent = conflict ? "Choisissez des espèces compatibles" : "Lancer l'Expédition"; }
  return !conflict;
}

function readOptionsFromOverlay(){
  const root=UI.overlay||document;
  const sel=root.querySelector('#diffSel');
  if(sel) SelectedDifficulty=DIFFICULTIES.find(d=>d.id===sel.value) || SelectedDifficulty;
  const modeSel=root.querySelector('input[name="modeSel"]:checked');
  if(modeSel) Game.mode=modeSel.value;
}

function createOverlay(){
  if(UI.overlay) return;
  const ov=document.createElement('div'); ov.className='ov'; ov.id='overlay';
  const card=document.createElement('div'); card.className='card'; ov.appendChild(card);

  card.innerHTML = `
    <div class="title">🍄 PACMUSH ODYSSEY 🍄</div>
    <div class="sub">Protégez vos spores de l'invasion parasitaire.</div>
    <div class="sectionTitle">Configuration de la partie</div>
    <div class="row">
      <label class="badge"><input type="radio" name="modeSel" value="solo" checked> Solo</label>
      <label class="badge"><input type="radio" name="modeSel" value="duo"> 2 Joueurs (Co-op / Versus)</label>
      <select id="diffSel" class="badge" style="background:transparent; color:inherit;">
        ${DIFFICULTIES.map(d=>`<option value="${d.id}" ${d.id===SelectedDifficulty.id?'selected':''}>${d.label}</option>`).join('')}
      </select>
    </div>
    <div class="sectionTitle">Joueur 1 — Variété</div><div id="choices1" class="grid"></div>
    <div class="sectionTitle" id="secVar2">Joueur 2 — Variété</div><div id="choices2" class="grid"></div>
    <div class="row" style="justify-content:space-between; margin-top:20px;">

function refreshPowerHUD(pl){

/* ============ PANNEAUX POUVOIRS ============ */
function getPowerPanelEntries(pl){
  const tx = Math.floor(pl.x), ty = Math.floor(pl.y);
  const foe = (pl.pid===1 ? Game.p2 : Game.p1);
  const dm = gridDims(), C=dm.cols, R=dm.rows;
  const isInterior = (x,y)=> (x>0 && y>0 && x<C-1 && y<R-1);
  const entries = [];

  if (pl.species.id === 'stropharia'){
    entries.push({ label: 'Planter mur de ronces', action: ()=>{ if (Game.grid[ty][tx]!==1){ safeSetWallWithAntiSeal(tx, ty, foe); sfxPower(); } } });
    entries.push({ label: 'Bonus Vitesse (Allié)', action: ()=>{ const b=backTile(pl); if(isInterior(b.tx,b.ty)){ Game.grid[b.ty][b.tx]=3; Game.bonuses.push({x:b.tx,y:b.ty,kind:'speed'}); sfxPower(); } } });
    entries.push({ label: 'Désactiver pièges', action: ()=>{ disableNearbyTraps(tx,ty,3); sfxPower(); } });
    if (pl.superPowerHeld){
      entries.unshift({ label: '★ SUPRÊME : Sanctuaire', super: true, action: ()=>{ pl.superPowerHeld=false; pl.sporeCharge=0; pl.powerTimer=12*60; sfxPower(); refreshPowerHUD(pl); } });
    }
  }

  if (pl.species.id === 'anthurus'){
    entries.push({ label: 'Invoquer Parasite', action: ()=>{ spawnEnemy(); sfxPower(); } });
    entries.push({ label: 'Poser Piège Mortel', action: ()=>{ const b=backTile(pl); if(isInterior(b.tx,b.ty)){ Game.grid[b.ty][b.tx]=4; Game.traps.push({x:b.tx,y:b.ty,t:1}); sfxPower(); } } });
    entries.push({ label: 'Planter mur putride', action: ()=>{ placeWallWithSealTracking(tx, ty, pl, foe); sfxPower(); } });
    if (pl.superPowerHeld){
      entries.unshift({ label: '★ SUPRÊME : Domination', super: true, action: ()=>{ pl.superPowerHeld=false; pl.sporeCharge=0; for(let i=0;i<3;i++) spawnEnemy(); sfxPower(); refreshPowerHUD(pl); } });
    }
  }
  return entries;
}

function openPowerPanel(pl){
  pl.panelSel = 0; pl.hiddenFromParasites = true;
  const side = (pl.pid===1) ? 'right:20px;' : 'left:20px;';
  const panel = document.createElement('div'); panel.className='card';
  panel.style.cssText = `position:fixed; top:20px; ${side} z-index:9998; width:280px; padding:15px; border-color:#8fd0ff;`;
  
  const title = document.createElement('div'); title.className='title'; title.style.fontSize='18px';
  title.textContent = (pl.panelMode==='super') ? 'Superpouvoir' : 'Action Rapide';
  panel.appendChild(title);

  const list = document.createElement('div'); panel.appendChild(list);

  function render(){
    const entries = getPowerPanelEntries(pl);
    list.innerHTML='';
    entries.forEach((e,i)=>{
      const item = document.createElement('div'); item.className='choice';
      item.style.padding='10px'; item.style.marginTop='8px';
      if(e.super){ item.style.borderColor='#ffd76a'; item.style.color='#ffd76a'; item.style.fontWeight='bold'; }
      if(i===pl.panelSel){ item.style.borderColor='#8fd0ff'; item.style.background='#8fd0ff22'; }
      item.textContent = e.label;
      list.appendChild(item);
    });
  }
  render();

  panel._onKey = (e) => {
    const k = e.key.toLowerCase();
    const up = (pl.pid===1) ? 'arrowup' : 'z';
    const down = (pl.pid===1) ? 'arrowdown' : 's';
    const ok = (pl.pid===1) ? 'enter' : 'f';

    if (k===up){ pl.panelSel = (pl.panelSel-1+getPowerPanelEntries(pl).length)%getPowerPanelEntries(pl).length; render(); e.preventDefault(); e.stopPropagation(); }
    else if (k===down){ pl.panelSel = (pl.panelSel+1)%getPowerPanelEntries(pl).length; render(); e.preventDefault(); e.stopPropagation(); }
    else if (k===ok){ 
      e.preventDefault(); e.stopPropagation();
      const act = getPowerPanelEntries(pl)[pl.panelSel]?.action;
      if(act) act();
      closePowerPanel(pl);
    }
  };
  document.addEventListener('keydown', panel._onKey, true); // Interception en capture
  document.body.appendChild(panel); pl._panelEl = panel; refreshPowerHUD(pl);
}

function closePowerPanel(pl){
  if(!pl || !pl._panelEl) return;
  document.removeEventListener('keydown', pl._panelEl._onKey, true);
  pl.panelActive = false; pl.hiddenFromParasites = false; pl.powerTimer = 0;
  pl._panelEl.remove(); pl._panelEl = null; refreshPowerHUD(pl);
}

/* ============ ÉTAT DU JEU & GÉNÉRATION ============ */
const Game={
  started:false, mode:'solo', grid:null, remaining:0,
  score1:0, score2:0, lives1:3, lives2:3,
  paused:false, countdown:0,
  traps:[], bonuses:[], parasites:[], particles:[], vortexes:[], 
  p1:null, p2:null,
  girollePanic:{active:false, ownerPid:0},
  sealWallFor: { 1: null, 2: null }, vortexBlocks:[]
};

function gridDims(){ const r=Array.isArray(Game.grid)?Game.grid.length:0; return {cols:r>0?Game.grid[0].length:0, rows:r}; }

function startGame(){
  if(UI.overlay){ UI.overlay.remove(); UI.overlay=null; }
  ensureAudio(); Game.started=true; reseedSession(1);
  Game.score1=0; Game.score2=0; Game.lives1=3; Game.lives2=3;
  loadLevel(0);
  UI.mode.textContent=(Game.mode==='duo'?'2 Joueurs':'Solo');
  UI.p2hud.style.display=(Game.mode==='duo')?'':'none';
  UI.diff.textContent=SelectedDifficulty.name;
  updateLeaderHUD();
}

const BIOMES = [ {sky1:'#2c1f35', sky2:'#0d0a12', moss:'#3fbf7f', soil:'#3b2a21', fog:'#ffffff0f', wall:'#3a2e43', deco:'#95e8b6'} ];
let BIOME = BIOMES[0], LEVEL_INDEX = 0;
const VORTEX = 5;

function genLevel(seed){
  const w=COLS, h=ROWS, g=Array.from({length:h},()=>Array.from({length:w},()=>1));
  const stack=[[1,1]]; g[1][1]=0;
  while(stack.length){
    const [cx,cy] = stack[stack.length-1]; let carved=false;
    const dirs=[[2,0],[-2,0],[0,2],[0,-2]].sort(()=>Math.random()-0.5);
    for(const [dx,dy] of dirs){
      const nx=cx+dx, ny=cy+dy;
      if(nx>0&&ny>0&&nx<w-1&&ny<h-1&&g[ny][nx]===1){
        g[cy+dy/2][cx+dx/2]=0; g[ny][nx]=0; stack.push([nx,ny]); carved=true; break;
      }
    }
    if(!carved) stack.pop();
  }
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){ if(g[y][x]===0) g[y][x]=2; }
  
  // Placement des vortex aux 4 coins
  const vPos = [{x:1,y:1}, {x:w-2,y:1}, {x:1,y:h-2}, {x:w-2,y:h-2}];
  Game.vortexes = [];
  vPos.forEach(p => { if(g[p.y] && g[p.y][p.x]!==undefined) { g[p.y][p.x]=VORTEX; Game.vortexes.push(p); } });

  return g;
}

function enemyBaseSpeedAt(lvl) { return 0.09 + Math.min(0.1, lvl * 0.01); }

function loadLevel(i){
  Game.grid = genLevel((SESSION_SEEDS[i] || Date.now()) + i);
  Game.traps=[]; Game.bonuses=[]; Game.parasites=[]; Game.particles=[]; Game.remaining=0;
  const dm=gridDims();

  for(let y=0;y<dm.rows;y++){
    for(let x=0;x<dm.cols;x++){
      if(Game.grid[y][x]===2) Game.remaining++;
      // Ajout de bonus aléatoires (1% de chance par case vide)
      if(Game.grid[y][x]===2 && Math.random()<0.01) { Game.grid[y][x]=3; Game.bonuses.push({x,y,kind:'power'}); Game.remaining--; }
    }
  }

  const count = Math.max(4, Math.round((6+i*0.8) * (0.8 + SelectedDifficulty.factor*0.35)));
  for(let k=0;k<count;k++) spawnEnemy();

  Game.p1 = makePlayer(1.5, 1.5, 1, Selected1);
  if(Game.mode==='duo') Game.p2 = makePlayer(dm.cols-2.5, dm.rows-2.5, 2, Selected2);

  UI.score1.textContent=Game.score1; UI.lives1.textContent=Game.lives1; refreshPowerHUD(Game.p1);
  UI.score2.textContent=Game.score2; UI.lives2.textContent=Game.lives2; if(Game.p2) refreshPowerHUD(Game.p2);
  
  Game.paused = true; Game.countdown = 0; startCountdown(180);
}

function makePlayer(tx,ty,pid,species){
  return {
    pid, species, x:tx, y:ty, dir:[0,0], nextDir:[0,0], speed: 0.11, baseSpeed: 0.11,
    powerTimer:0, invisible:false, shield:false, phase:false, hitGrace:0,
    panelActive:false, superPowerHeld:false, sporeCharge:0, collectedSpores:0
  };
}

function spawnEnemy(){
  const pos = {x: 3 + Math.floor(Math.random()*(COLS-6)), y: 3 + Math.floor(Math.random()*(ROWS-6))};
  const speed = enemyBaseSpeedAt(LEVEL_INDEX) * SelectedDifficulty.factor;
  Game.parasites.push({ x:pos.x+0.5, y:pos.y+0.5, dir:[1,0], speed, baseSpeed:speed, kind: Math.floor(Math.random()*7)+1, path:[], state:'wander', frozen:0 });
}

/* ============ UTILITAIRES GAMEPLAY ============ */
function isWalkable(tx, ty){ const d=gridDims(); return tx>=0&&ty>=0&&tx<d.cols&&ty<d.rows && Game.grid[ty][tx]!==1; }
function neighborsForParasite(tx,ty){ return [[1,0],[-1,0],[0,1],[0,-1]].map(d=>[tx+d[0],ty+d[1]]).filter(p=>isWalkable(p[0],p[1])); }
function backTile(pl){ const d=pl.dir[0]||pl.dir[1]?pl.dir:(pl.nextDir[0]||pl.nextDir[1]?pl.nextDir:[0,-1]); return {tx:Math.floor(pl.x)-d[0], ty:Math.floor(pl.y)-d[1]}; }
function safeSetWallWithAntiSeal(x,y, opp){ Game.grid[y][x]=1; } // Simplifié pour correction
function disableNearbyTraps(cx,cy,rad){ Game.traps = Game.traps.filter(t => Math.hypot(t.x-cx, t.y-cy) > rad); }
function placeWallWithSealTracking(x,y, owner, opp){ Game.grid[y][x]=1; } // Simplifié
function repelEnemiesAround(pl, rad, force){ Game.parasites.forEach(p=>{ const d=Math.hypot(p.x-pl.x, p.y-pl.y); if(d<=rad){ p.x+=(p.x-pl.x)/d*force; p.y+=(p.y-pl.y)/d*force; p.path=[]; } }); }
function convertToServant(p, ownerPid){ p.servant=true; p.servantTime=600; p.servantOwner=ownerPid; p.path=[]; }
function teleportParasiteFarFromPlayer(p, pl){ p.x=1.5; p.y=1.5; p.path=[]; }
function spawnSporeCloud(x,y,rad){ Game.particles.push({x:x*TILE,y:y*TILE,r:0,life:240,type:'cloud'}); }

/* ============ BOUCLE PRINCIPALE ============ */
let LAST=now();
function loop(){
  const t=now(); 
  const dt=Math.min((t-LAST)/16.666, 2.5); // PLAFOND DU DELTA TIME (Anti Wall-phasing)
  LAST=t;

  if(Game.countdown>0){
    Game.countdown--;
    if(Game.countdown<=0) Game.paused = false;
  }
  
  if(!Game.paused && Game.countdown===0) update(dt);
  
  draw();
  requestAnimationFrame(loop);
}

function startCountdown(frames){ Game.countdown = Math.max(1, frames|0); Game.paused = false; }

function update(dt){
  updatePlayer(Game.p1, dt);
  if(Game.mode==='duo') updatePlayer(Game.p2, dt);

  Game.parasites.forEach(p => {
    if(p.frozen>0) { p.frozen -= dt; return; }

    if(p.path.length===0){
      const ns = neighborsForParasite(Math.floor(p.x), Math.floor(p.y));
      if(ns.length) p.path = [ns[Math.floor(Math.random()*ns.length)]];
    }
    
    if(p.path.length>0){
      const tx = p.path[0][0]+0.5, ty = p.path[0][1]+0.5;
      const dx = tx-p.x, dy = ty-p.y, len = Math.hypot(dx,dy)||1;
      const spd = p.speed * dt;
      p.x += (dx/len)*spd; p.y += (dy/len)*spd;
      p.dir = [Math.sign(dx), Math.sign(dy)];
      if(Math.abs(p.x-tx)<0.05 && Math.abs(p.y-ty)<0.05) p.path.shift();
    }

    // HITBOX AJUSTÉE (0.45 pour éviter les morts abusives)
    if(Game.p1 && distance(p.x,p.y, Game.p1.x,Game.p1.y) < 0.45) playerHit(Game.p1, p);
    if(Game.mode==='duo' && Game.p2 && distance(p.x,p.y, Game.p2.x,Game.p2.y) < 0.45) playerHit(Game.p2, p);
  });

  if (Game.remaining <= 0) {
    if (Game.mode === 'duo') endMatch('Fin — Partie terminée !');
    else endMatch('Victoire ! Niveaux suivants en développement...');
  }
}

function inputDirForPlayer(pl){
  if (pl && pl.panelActive) return [0,0]; // Le joueur est figé PENDANT que SON panneau est ouvert
  const inv = !!(pl && pl.madnessTimer > 0);
  if(pl.pid===1){
    if(Keys['arrowup'])    return inv ? [0, 1] : [0,-1];
    if(Keys['arrowdown'])  return inv ? [0,-1] : [0, 1];
    if(Keys['arrowleft'])  return inv ? [1, 0] : [-1,0];
    if(Keys['arrowright']) return inv ? [-1,0] : [1, 0];
  } else {
    if(Keys['z']) return inv ? [0, 1] : [0,-1];
    if(Keys['s']) return inv ? [0,-1] : [0, 1];
    if(Keys['q']) return inv ? [1, 0] : [-1,0];
    if(Keys['d']) return inv ? [-1,0] : [1, 0];
  }
  return [0,0];
}

function eatBonusFor(pl, b){
  if(b.kind==='power'){
    pl.superPowerHeld = true;
    sfxPower();
    refreshPowerHUD(pl);
    return true;
  }
  return false;
}

function updatePlayer(pl, dt){
  if(!pl) return;
  if(pl.hitGrace>0) pl.hitGrace -= dt;
  if(pl.powerTimer>0){
    pl.powerTimer -= dt;
    if(pl.powerTimer<=0){ pl.invisible=false; pl.shield=false; pl.phase=false; refreshPowerHUD(pl); }
  }

  const want = inputDirForPlayer(pl);
  if (want[0] || want[1]) pl.nextDir = want.slice(0);

  const cx = Math.floor(pl.x) + 0.5, cy = Math.floor(pl.y) + 0.5;
  const TURN_EPS = 0.45;

  if (!pl.panelActive && pl.frozenTimer <= 0) {
    if (pl.nextDir[0]!==0 || pl.nextDir[1]!==0){
      const nearAxis = (pl.nextDir[0]!==0) ? Math.abs(pl.y-cy)<TURN_EPS : Math.abs(pl.x-cx)<TURN_EPS;
      if (nearAxis && isWalkable(Math.floor(pl.x)+pl.nextDir[0], Math.floor(pl.y)+pl.nextDir[1])){
        if(pl.nextDir[0]!==0) pl.y=cy; else pl.x=cx;
        pl.dir = pl.nextDir.slice(0);
      }
    }

    const spd = pl.speed * dt;
    if(pl.dir[0]!==0){
      const toX = pl.x + pl.dir[0]*spd;
      if(isWalkable(Math.floor(toX + pl.dir[0]*0.4), Math.floor(pl.y))) pl.x = toX;
      pl.y += clamp(cy-pl.y, -0.3, 0.3) * 0.6;
    }
    if(pl.dir[1]!==0){
      const toY = pl.y + pl.dir[1]*spd;
      if(isWalkable(Math.floor(pl.x), Math.floor(toY + pl.dir[1]*0.4))) pl.y = toY;
      pl.x += clamp(cx-pl.x, -0.3, 0.3) * 0.6;
    }
  }

  const ntX = Math.floor(pl.x), ntY = Math.floor(pl.y);

  // Manger spores et charger la jauge de Super
  if (Game.grid[ntY] && Game.grid[ntY][ntX] === 2){
    Game.grid[ntY][ntX] = 0; Game.remaining--; sfxEat();
    
    pl.collectedSpores++;
    if(!pl.superPowerHeld){
      pl.sporeCharge = (pl.sporeCharge||0) + 1;
      if(pl.sporeCharge >= 30) {
        pl.superPowerHeld = true;
        pl.sporeCharge = 0;
        sfxPower();
      }
      refreshPowerHUD(pl);
    }

    if (pl.pid === 1) UI.score1.textContent = (Game.score1 += 10);
    else              UI.score2.textContent = (Game.score2 += 10);
    updateLeaderHUD();
  }

  // Manger bonus Etoile
  for(let i=Game.bonuses.length-1; i>=0; i--){
    const b = Game.bonuses[i];
    if(b.x===ntX && b.y===ntY){
      if(eatBonusFor(pl, b)) { Game.grid[ntY][ntX]=0; Game.bonuses.splice(i,1); }
    }
  }
}

function playerHit(pl, hitter){
  if(pl.invisible || pl.hitGrace>0 || pl.shield) {
      if(pl.shield) { pl.shield=false; pl.hitGrace=60; sfxPower(); }
      return;
  }
  sfxHit();
  
  pl.hitGrace = 180; // 3 secondes d'invulnérabilité
  pl.x = 1.5; pl.y = 1.5; pl.dir = [0,0]; // Respawn sécurisé
  
  if(pl.pid === 1) UI.lives1.textContent = --Game.lives1;
  else UI.lives2.textContent = --Game.lives2;

  if (Game.mode!=='duo' && Game.lives1 < 0) endMatch('Défaite !');
  if (Game.mode==='duo' && Game.lives1 < 0 && Game.lives2 < 0) endMatch('Défaite Totale !');
}

function endMatch(msg){
  Game.paused=true; Game.countdown=0;
  const ov=document.createElement('div'); ov.className='ov';
  ov.innerHTML=`<div class="card"><div class="title">${msg}</div>
    <div class="sub">Scores — J1: ${Game.score1} ${Game.mode==='duo'?' | J2: '+Game.score2:''}</div>
    <button class="btn" onclick="this.parentElement.parentElement.remove(); openOverlay();">Rejouer</button></div>`;
  document.body.appendChild(ov);
}

/* ============ MOTEUR DE RENDU ============ */
function draw(){
  CTX.fillStyle = '#16131b'; CTX.fillRect(0,0,W,H);
  if(!Game.grid) return;

  // Grille
  const d = gridDims();
  for(let y=0; y<d.rows; y++){
    for(let x=0; x<d.cols; x++){
      const val = Game.grid[y][x];
      if(val===1){ CTX.fillStyle='#3a2e43'; CTX.fillRect(x*TILE, y*TILE, TILE, TILE); }
      else if(val===2){ CTX.fillStyle='#fff'; CTX.beginPath(); CTX.arc(x*TILE+TILE/2, y*TILE+TILE/2, 3, 0, Math.PI*2); CTX.fill(); }
      else if(val===3){ CTX.fillStyle='#9ad6ff'; CTX.beginPath(); CTX.arc(x*TILE+TILE/2, y*TILE+TILE/2, 6, 0, Math.PI*2); CTX.fill(); }
      else if(val===VORTEX){ CTX.fillStyle='rgba(150,200,255,0.3)'; CTX.beginPath(); CTX.arc(x*TILE+TILE/2, y*TILE+TILE/2, 10, 0, Math.PI*2); CTX.fill(); }
    }
  }

  // Parasites
  Game.parasites.forEach(p => {
    const px = p.x*TILE, py = p.y*TILE;
    CTX.fillStyle = p.frozen>0 ? '#9ad6ff' : '#ff4d4d';
    CTX.beginPath(); CTX.arc(px, py, TILE*0.4, 0, Math.PI*2); CTX.fill();
  });

  // Joueurs
  if(Game.p1) drawPlayerEntity(Game.p1);
  if(Game.mode==='duo' && Game.p2) drawPlayerEntity(Game.p2);

  // Interface Overlay/Compte à rebours
  if (Game.paused && Game.countdown===0){
    CTX.fillStyle='rgba(0,0,0,0.5)'; CTX.fillRect(0,0,W,H);
    CTX.fillStyle='#fff'; CTX.font='bold 40px system-ui'; CTX.textAlign='center';
    CTX.fillText('PAUSE', W/2, H/2);
  }
  else if (Game.countdown>0){
    CTX.fillStyle='rgba(0,0,0,0.4)'; CTX.fillRect(0,0,W,H);
    CTX.fillStyle='#fff'; CTX.font='bold 100px system-ui'; CTX.textAlign='center';
    CTX.fillText(Math.ceil(Game.countdown/60), W/2, H/2);
  }
}

function drawPlayerEntity(pl){
  if(pl.invisible) { CTX.globalAlpha = 0.2; }
  else if(pl.hitGrace > 0 && Math.floor(now()/100)%2 === 0) { CTX.globalAlpha = 0.4; }
  else { CTX.globalAlpha = 1; }

  const px = pl.x*TILE, py = pl.y*TILE;
  drawImgCenteredPath(getSpritePath(pl.species.id), px, py, TILE*0.9);

  if(pl.shield){
      CTX.beginPath(); CTX.arc(px, py, TILE*0.6, 0, Math.PI*2);
      CTX.strokeStyle='#ffcc00'; CTX.lineWidth=2; CTX.stroke();
  }

  CTX.globalAlpha = 1;
}

/* ============ DÉMARRAGE ============ */
document.addEventListener('DOMContentLoaded', () => {
    ensureAudio(); createOverlay(); loop();
});

// Enregistrement correct du Service Worker inclus dans le script
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(r => console.log('SW Ok')).catch(e => console.log('SW Échec', e));
  });
}
</script>
