<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PACMUSH ODYSSEY</title>
<style>
  :root{--bg:#0b0a0e;--card:#16131b;--pill:#1b141e;--line:#ffffff22;--shadow:#00000055;--text:#fff7ea;--p1:#4a90d9;--p2:#d94a4a}
  html,body{height:100%;margin:0}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Arial}
  #wrap{display:flex;flex-direction:column;align-items:center;gap:6px;padding:8px}
  /* HUD en 3 colonnes : J1 | CENTRE | J2 */
  #hud{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;width:1100px;max-width:95vw;align-items:start;user-select:none}
  .pbox{background:var(--card);border-radius:12px;padding:10px 14px;display:flex;flex-direction:column;gap:6px}
  .pbox.p1{border:1.5px solid var(--p1)66}
  .pbox.p2{border:1.5px solid var(--p2)66}
  .ptop{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800}
  .score-big{font-size:18px;font-weight:800;margin-left:auto}
  .p1 .score-big{color:#88bbff}
  .p2 .score-big{color:#ff9999}
  .lives{display:flex;gap:3px}
  .lv{width:10px;height:10px;border-radius:50%;background:#ff5c6c;box-shadow:0 0 5px #ff5c6c88}
  .lv.dead{background:#ffffff18;box-shadow:none}
  /* Barres */
  .bar-row{display:flex;flex-direction:column;gap:2px}
  .bar-label{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .bar-bg{height:5px;background:#ffffff10;border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#4a90d9,#88ccff);transition:width .12s}
  .p2 .bar-fill{background:linear-gradient(90deg,#d94a4a,#ff9999)}
  .bar-fill.on{background:linear-gradient(90deg,#00cc44,#88ffaa);animation:glow .7s ease-in-out infinite alternate}
  .sbar-fill{height:4px;border-radius:2px;background:linear-gradient(90deg,#cc6600,#ffd700);transition:width .15s}
  .sbar-bg{height:4px;background:#ffffff0d;border-radius:2px;overflow:hidden}
  .super-label{font-size:11px;font-weight:700;color:#cc8800}
  .super-label.rdy{color:#ffd700;animation:pulse .8s ease-in-out infinite}
  /* Centre */
  #hud-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 12px;background:var(--card);border-radius:12px;border:1px solid var(--line);min-width:140px}
  #event-banner{min-height:18px;font-size:12px;font-weight:800;text-align:center;transition:opacity .3s}
  /* Combo HUD (hors canvas) */
  #combo-left,#combo-right{position:absolute;top:50%;transform:translateY(-50%);font-size:15px;font-weight:900;pointer-events:none;text-shadow:0 0 8px currentColor;transition:opacity .3s;opacity:0;white-space:nowrap;z-index:10}
  #combo-left{left:4px;color:#ffe066}
  #combo-right{right:4px;color:#ffe066}
  #game-wrap{position:relative;width:1100px;max-width:95vw}
  #game{display:block;width:100%;height:auto;background:#0f0c14;border-radius:14px;border:2px solid #00000055;box-shadow:0 18px 60px #000000aa}
  /* Barre de touches */
  #kb{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;font-size:11px;opacity:.65;width:1100px;max-width:95vw}
  .k{background:#ffffff0d;border:1px solid #ffffff18;border-radius:5px;padding:2px 7px}
  .k b{color:#88ccff}
  /* Modal */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:9999}
  .card{max-width:1100px;width:94vw;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 20px 80px #0009;padding:18px;max-height:90vh;overflow:auto}
  .title{font-weight:800;font-size:26px}
  .sub{opacity:.85;font-size:14px;margin-top:4px;line-height:1.5}
  .grid{display:grid;gap:10px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));margin-top:12px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .badge{background:#ffffff10;border:1px solid var(--line);border-radius:999px;padding:2px 8px;font-size:12px}
  .btn{background:#0e0b13;border:1px solid var(--line);border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer;color:var(--text);font-size:15px}
  .btn:hover:not([disabled]){background:#1a1628;border-color:#4a90d966}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .sectionTitle{margin-top:14px;font-weight:800;font-size:14px}
  .choice.disabled{opacity:.4;filter:grayscale(80%);pointer-events:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  @keyframes glow{from{box-shadow:0 0 3px currentColor}to{box-shadow:0 0 10px currentColor,0 0 18px currentColor}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
  .power-ready{animation:pulse 1s ease-in-out infinite;color:#ffd76a}
</style>
</head>
<body>
  <audio id="bgm" src="mushroom_hill_zone.mp3" loop></audio>
  <div id="wrap">
    <div id="hud">
      <!-- J1 -->
      <div class="pbox p1" id="pbox1">
        <div class="ptop">
          <img id="sp-icon1" style="width:26px;height:26px;object-fit:contain" src="" alt="">
          <span id="sp-name1" style="color:#88bbff">—</span>
          <div class="lives" id="lives1"></div>
          <span class="score-big" id="score1">0</span>
        </div>
        <div class="bar-row">
          <span class="bar-label" id="power1">⚡ Pouvoir (Entrée)</span>
          <div class="bar-bg"><div class="bar-fill" id="pbar1" style="width:0%"></div></div>
        </div>
        <div class="bar-row">
          <span class="super-label" id="super-lbl1">★ Super (Maj.Dr) — <span id="super-prog1">0/25 spores</span></span>
          <div class="sbar-bg"><div class="sbar-fill" id="sbar1" style="width:0%"></div></div>
        </div>
      </div>
      <!-- Centre -->
      <div id="hud-center">
        <span style="font-size:11px;opacity:.5" id="diff">Guerre des Spores</span>
        <span style="font-size:14px;font-weight:800" id="mode">Solo</span>
        <span style="font-size:11px;opacity:.6" id="leaderText">—</span>
        <span id="event-banner"></span>
      </div>
      <!-- J2 -->
      <div class="pbox p2" id="p2hud" style="display:none">
        <div class="ptop">
          <img id="sp-icon2" style="width:26px;height:26px;object-fit:contain" src="" alt="">
          <span id="sp-name2" style="color:#ff9999">—</span>
          <div class="lives" id="lives2"></div>
          <span class="score-big" id="score2">0</span>
        </div>
        <div class="bar-row">
          <span class="bar-label" id="power2">⚡ Pouvoir (F)</span>
          <div class="bar-bg"><div class="bar-fill p2" id="pbar2" style="width:0%;background:linear-gradient(90deg,#d94a4a,#ff9999)"></div></div>
        </div>
        <div class="bar-row">
          <span class="super-label" id="super-lbl2">★ Super (Espace) — <span id="super-prog2">0/25 spores</span></span>
          <div class="sbar-bg"><div class="sbar-fill" id="sbar2" style="width:0%"></div></div>
        </div>
      </div>
    </div>
    <!-- Barre de touches -->
    <div id="kb">
      <span class="k">J1: <b>Flèches</b> déplacer</span>
      <span class="k">J1: <b>Entrée</b> pouvoir</span>
      <span class="k">J1: <b>Maj.Dr</b> SUPER★</span>
      <span class="k">J2: <b>ZQSD</b> déplacer</span>
      <span class="k">J2: <b>F</b> pouvoir</span>
      <span class="k">J2: <b>Espace</b> SUPER★</span>
      <span class="k"><b>P</b> pause</span>
      <span class="k"><b>O</b> menu</span>
    </div>
    <!-- Canvas avec combos flottants hors canvas -->
    <div id="game-wrap">
      <div id="combo-left"></div>
      <canvas id="game" width="1100" height="880" aria-label="PACMUSH ODYSSEY"></canvas>
      <div id="combo-right"></div>
    </div>
  </div>

<script>
  // 🎵 Gestion musique
let bgm;

function initMusic() {
  bgm = document.getElementById("bgm");
  bgm.volume = 0.4;
}

function startMusic() {
  if (bgm) {
    bgm.play().catch(e => console.log("Lecture auto bloquée :", e));
  }
}

function stopMusic() {
  if (bgm) bgm.pause();
}

initMusic();
document.addEventListener("keydown", startMusic, {once:true});
document.addEventListener("click", startMusic, {once:true});

/* =================== CODE COMPLET CORRIGÉ =================== */
const CANVAS = document.getElementById('game');
const CTX = CANVAS.getContext('2d');
const W = CANVAS.width, H = CANVAS.height;
const UI = {
  leaderText: document.getElementById('leaderText'),
  mode: document.getElementById('mode'),
  diff: document.getElementById('diff'),
  score1: document.getElementById('score1'),
  score2: document.getElementById('score2'),
  power1: document.getElementById('power1'),
  power2: document.getElementById('power2'),
  lives1: null, // remplacé par updateLivesHUD
  lives2: null,
  leaderPill: null,
  p2hud: document.getElementById('p2hud'),
  overlay: null, choices1: null, choices2: null, startBtn: null, modeSel: null,
  // Nouveaux éléments HUD enrichi
  pbar1: document.getElementById('pbar1'),
  pbar2: document.getElementById('pbar2'),
  sbar1: document.getElementById('sbar1'),
  sbar2: document.getElementById('sbar2'),
  sprog1: document.getElementById('super-prog1'),
  sprog2: document.getElementById('super-prog2'),
  slbl1: document.getElementById('super-lbl1'),
  slbl2: document.getElementById('super-lbl2'),
  spIcon1: document.getElementById('sp-icon1'),
  spIcon2: document.getElementById('sp-icon2'),
  spName1: document.getElementById('sp-name1'),
  spName2: document.getElementById('sp-name2'),
  livesEl1: document.getElementById('lives1'),
  livesEl2: document.getElementById('lives2'),
  eventBanner: document.getElementById('event-banner'),
  comboLeft: document.getElementById('combo-left'),
  comboRight: document.getElementById('combo-right'),
};

/* ===== HUD helpers ===== */
function updateLivesHUD(pid, lives) {
  const el = pid===1 ? UI.livesEl1 : UI.livesEl2;
  if (!el) return;
  el.innerHTML = '';
  for(let i=0;i<3;i++){
    const d=document.createElement('div');
    d.className='lv'+(i<lives?'':' dead');
    el.appendChild(d);
  }
}
function updateSpeciesHUD(pid, sp) {
  if(!sp) return;
  const icon = pid===1?UI.spIcon1:UI.spIcon2;
  const name = pid===1?UI.spName1:UI.spName2;
  if(icon){icon.src=getSpritePath(sp.id,true);icon.alt=sp.name;}
  if(name) name.textContent=sp.name;
}
function setPowerBar(pid, pct, active, label) {
  const bar = pid===1?UI.pbar1:UI.pbar2;
  const lbl = pid===1?UI.power1:UI.power2;
  if(bar){ bar.style.width=Math.max(0,Math.min(100,pct))+'%'; bar.className='bar-fill'+(active?' on':''); }
  if(lbl && label!==undefined) lbl.textContent=label;
}
function setSuperBar(pid, pct, ready, progText) {
  const bar = pid===1?UI.sbar1:UI.sbar2;
  const lbl = pid===1?UI.slbl1:UI.slbl2;
  const prog = pid===1?UI.sprog1:UI.sprog2;
  if(bar) bar.style.width=Math.max(0,Math.min(100,pct))+'%';
  if(prog) prog.textContent = progText||'';
  if(lbl){ if(ready){ lbl.classList.add('rdy'); } else { lbl.classList.remove('rdy'); } }
}
let _eventTimer=null;
function showEvent(msg, color='#ff8844', ms=3000){
  if(!UI.eventBanner) return;
  UI.eventBanner.textContent=msg;
  UI.eventBanner.style.color=color;
  UI.eventBanner.style.opacity='1';
  clearTimeout(_eventTimer);
  if(ms>0) _eventTimer=setTimeout(()=>{if(UI.eventBanner){UI.eventBanner.style.opacity='0';setTimeout(()=>{if(UI.eventBanner)UI.eventBanner.textContent='';},300);}},ms);
}
let _comboTimer=null;
function showCombo(n, pid){
  const el = (pid===1?UI.comboLeft:UI.comboRight);
  if(!el) return;
  const color = n>=10?'#ff4400':n>=7?'#ff6600':n>=5?'#ff8800':n>=3?'#ffcc00':'#ffe066';
  el.style.color=color;
  el.style.fontSize=(13+Math.min(n,15))+'px';
  el.style.opacity='1';
  el.textContent='🔥 x'+n+' COMBO!';
  clearTimeout(el._ct);
  el._ct=setTimeout(()=>{el.style.opacity='0';setTimeout(()=>{el.textContent='';},300);},1600);
}
function refreshHUD(pl){
  const pid=pl.pid;
  // power bar
  if(pl.panelActive){
    const sec=Math.ceil((pl.powerTimer||0)/60);
    setPowerBar(pid, 100, true, '📋 Panel actif ('+sec+'s)');
  } else if(pl.powerTimer>0){
    const maxT=pl._pmx||600;
    setPowerBar(pid, (pl.powerTimer/maxT)*100, true, '⚡ '+(pl._plbl||pl.species.power)+' ('+Math.ceil(pl.powerTimer/60)+'s)');
  } else if(pl.species.id==='anthurus'){
    const c=pl.anthurusCharge|0;
    setPowerBar(pid, Math.min(100,(c/10)*100), false, c>=10?'⚡ Sabotage PRÊT (Entrée/F)':'🔋 Sabotage '+c+'/10 spores');
  } else if(pl.species.id==='cornucopioides' && pl.trumpetCd>0){
    setPowerBar(pid, ((600-pl.trumpetCd)/600)*100, false, '⏳ Recharge ('+Math.ceil(pl.trumpetCd/60)+'s)');
  } else if(pl.species.id==='phalloides' && pl.phaseCooldown>0){
    setPowerBar(pid, ((300-pl.phaseCooldown)/300)*100, false, '⏳ Recharge ('+Math.ceil(pl.phaseCooldown/60)+'s)');
  } else {
    setPowerBar(pid, 0, false, '⚡ '+pl.species.power);
  }
  // super bar
  if(pl.superReady){
    const key=pid===1?'Maj.Dr':'Espace';
    setSuperBar(pid,100,true,'✨ PRÊT ! Appuyez sur '+key);
  } else {
    const prog=(pl.collectedSpores||0)%SUPER_CHARGE_SPORES;
    setSuperBar(pid,(prog/SUPER_CHARGE_SPORES)*100,false,prog+'/'+SUPER_CHARGE_SPORES+' spores');
  }
}

/* ============ Constantes ============ */
const TILE=28;
const COLS=Math.max(5,(W/TILE)|0);
const ROWS=Math.max(5,(H/TILE)|0);

/* Difficultés */
const DIFFICULTIES=[
  {id:'easy', name:'Cueillette du dimanche', label:'Cueillette du dimanche — facile', factor:0.5},
  {id:'medium', name:'Chiens Truffiers', label:'Chiens Truffiers — moyen', factor:0.75},
  {id:'hard', name:'Guerre des Spores', label:'Guerre des Spores — difficile', factor:1}
];
let SelectedDifficulty=DIFFICULTIES[2];

const MATCH_LEVELS_SOLO=1;
const MATCH_LEVELS_DUO=1;

let SESSION_SEEDS = [];
function reseedSession(levelCount){
  const n = Math.max(levelCount|0, 4);
  if (window.crypto && crypto.getRandomValues) {
    const arr = new Uint32Array(n);
    crypto.getRandomValues(arr);
    SESSION_SEEDS = Array.from(arr, v => (v>>>0) ^ (Date.now()>>>0) ^ ((Math.random()*1e9)|0));
  } else {
    SESSION_SEEDS = Array.from({length:n}, () => ((Date.now() + Math.random()*1e9)|0)>>>0);
  }
}

/* ============ Assets ============ */
const SPRITES_BY_SPECIES = {
  cornucopioides: { game: 'champignon_6_bordered.png', ui: 'champignon_6_bordered.png' },
  muscaria:       { game: 'champignon_3.png',          ui: 'champignon_3.png' },
  cibarius:       { game: 'champignon_1.png',          ui: 'champignon_1.png' },
  edulis:         { game: 'champignon_4.png',          ui: 'champignon_4.png' },
  morchella:      { game: 'champignon_5_bordered.png', ui: 'champignon_5_bordered.png' },
  phalloides:     { game: 'champignon_2.png',          ui: 'champignon_2.png' },
  stropharia:     { game: 'champignon_7.png',          ui: 'champignon_7.png' },
  anthurus:       { game: 'champignon_8.png',          ui: 'champignon_8.png' },
};

const PARASITE_SPRITES = [
  null,
  'Parasite_1.png',
  'Parasite_2.png',
  'Parasite_3.png',
  'Parasite_4.png',
  'Parasite_5.png',
  'Parasite_6.png',
  'Parasite_7.png',
];

const _IMG_CACHE = new Map();
function loadImg(src){
  if(_IMG_CACHE.has(src)) return _IMG_CACHE.get(src);
  const i=new Image(); i.src=src; i.decoding='async'; i.loading='eager';
  _IMG_CACHE.set(src,i);
  return i;
}

function preloadCoreImages(){
  const list = [
    'sol_foret.png',
    TREE_PNG.chene, TREE_PNG.pin,
    ...Object.values(SPRITES_BY_SPECIES).flatMap(v => [v.game, v.ui]),
    ...PARASITE_SPRITES.slice(1)
  ];
  list.forEach(src => loadImg(src));
}

const TREE_PNG = {
  chene: 'chene.png',
  pin:   'pin.png'
};

function pickTreeSpriteAt(x, y){
  const h = (((x*73856093) ^ (y*19349663) ^ (LEVEL_INDEX*83492791)) >>> 0);
  return (h & 1) ? TREE_PNG.pin : TREE_PNG.chene;
}

function getSpritePath(speciesId, forUI=false){
  const rec = SPRITES_BY_SPECIES[speciesId];
  if(!rec) return null;
  return forUI ? rec.ui : rec.game;
}
function drawImgCenteredPath(path, x, y, s, ghost=false){
  if(!path) return;
  const img = loadImg(path);
  if(!img.complete) return;
  CTX.save();
  if(ghost) CTX.globalAlpha = 0.8;
  CTX.drawImage(img, x - s/2, y - s/2, s, s);
  CTX.restore();
}

/* ============ Entrées clavier ============ */
const Keys=Object.create(null);

// Nombre de spores à collecter pour charger le superpouvoir
const SUPER_CHARGE_SPORES = 25;

// Affichage flash dans le HUD pouvoir
function flashHUD(pl, msg, duration=90){
  const el = (pl.pid===1?UI.power1:UI.power2);
  if(!el) return;
  const prev = el.textContent;
  el.textContent = msg;
  el.style.color = '#ff8844';
  setTimeout(()=>{
    el.style.color = '';
    // Remettre la valeur correcte via refreshPowerHUD
    refreshHUD(pl);
  }, duration * 16.67);
}
function anyPanelOpen(){
  return (Game?.p1?.panelActive || Game?.p2?.panelActive) ? true : false;
}
// Sélecteur de touches par joueur — utilisé pour le blocage sélectif
function isKeyForPlayer1(k, code){
  return ['arrowup','arrowdown','arrowleft','arrowright'].includes(k) || k==='enter' || code==='ShiftRight';
}
function isKeyForPlayer2(k, code){
  return ['z','q','s','d'].includes(k) || k==='f' || code==='Space';
}

addEventListener('keydown', (e)=>{
  const k = e.key.toLowerCase();
  const code = e.code;

  // Blocage sélectif : si le panneau d'un joueur est actif, bloquer UNIQUEMENT ses touches
  if (Game?.p1?.panelActive && isKeyForPlayer1(k, code)) {
    e.preventDefault(); e.stopPropagation(); return;
  }
  if (Game?.p2?.panelActive && isKeyForPlayer2(k, code)) {
    e.preventDefault(); e.stopPropagation(); return;
  }

  Keys[k] = true;

  if(['arrowup','arrowdown','arrowleft','arrowright'].includes(k)) e.preventDefault();

  // Pouvoirs normaux — seulement si le panneau du joueur n'est pas actif
  if (!Game?.p1?.panelActive) {
    if(e.key === 'Enter') triggerPower(1);
    if (e.code === 'ShiftRight') { e.preventDefault(); triggerSuperPower(1); }
  }
  if (!Game?.p2?.panelActive) {
    if(k==='f') triggerPower(2);
    if (e.code === 'Space') { e.preventDefault(); triggerSuperPower(2); }
  }

  if (k === 'p') {
    if (!Game.started) {
      if (UI.overlay) {
        readOptionsFromOverlay();
        UI.overlay.remove();
        UI.overlay = null;
      }
      startGame();
      startCountdown(180);
      e.preventDefault(); e.stopPropagation();
      return;
    }

    if (Game.countdown > 0) {
      e.preventDefault(); e.stopPropagation();
      return;
    }

    if (Game.paused) startCountdown(180);
    else Game.paused = true;

    e.preventDefault(); e.stopPropagation();
    return;
  }

  if(k==='o'){ openOverlay(); }
});

addEventListener('keyup', (e)=>{
  const k = e.key.toLowerCase();
  const code = e.code;

  // Bloquer keyup aussi de manière sélective pour éviter des états bloqués
  if (Game?.p1?.panelActive && isKeyForPlayer1(k, code)) {
    e.preventDefault(); e.stopPropagation();
  }
  if (Game?.p2?.panelActive && isKeyForPlayer2(k, code)) {
    e.preventDefault(); e.stopPropagation();
  }
  Keys[k] = false;
});

function triggerPower(pid){
  if(!Game.started){ startGame(); return; }
  if(Game.countdown>0) return;

  const pl = (pid===1 ? Game.p1 : Game.p2);
  if(!pl) return;

  if (pl.panelActive) return;

  if (pl.powerTimer > 0) return;

  if (pl.species.id === 'phalloides' && pl.phaseCooldown > 0) return;
  if (pl.species.id === 'cornucopioides' && pl.trumpetCd > 0) return;

  if (pl.species.id === 'stropharia'){
    pl.panelActive = true;
    pl.panelMode   = 'coop';
    pl.powerTimer  = 600;
    pl.dir = [0,0]; pl.nextDir = [0,0];
    pl.inputLocked = true;
    pl.invisible   = true;

    const el = (pid===1?UI.power1:UI.power2);
    if (el) el.textContent = 'Panel (10s)';

    openPowerPanel(pl);
    sfxPower();
    return;
  }

  if (pl.species.id === 'anthurus'){
    pl.anthurusCharge = (pl.anthurusCharge|0);
    if (pl.anthurusCharge < 10) {
      refreshHUD(pl);
      return;
    }
    pl.anthurusCharge -= 10;

    pl.panelActive = true;
    pl.panelMode   = 'trap';
    pl.powerTimer  = 600;
    pl.dir = [0,0]; pl.nextDir = [0,0];
    pl.inputLocked = true;

    const el = (pid===1?UI.power1:UI.power2);
    if (el) el.textContent = 'Panel (10s)';

    openPowerPanel(pl);
    refreshHUD(pl);
    sfxPower();
    return;
  }

  const beforeTimer = pl.powerTimer|0;

  pl.species.use(pl);

  if (pl.nextPowerExtend && pl.nextPowerExtend > 0){
    pl.powerTimer += pl.nextPowerExtend;
    pl.nextPowerExtend = 0;
  }

  if ((pl.powerTimer|0) > beforeTimer){
    pl._pmx=pl.powerTimer; pl._plbl=pl.species.power||'Pouvoir';
    const el=(pid===1?UI.power1:UI.power2);
    if(el) el.textContent='⚡ '+pl._plbl;
    sfxPower();
    refreshHUD(pl);
  }
}

function triggerSuperPower(pid){
  if(!Game.started){ startGame(); return; }
  if(Game.countdown>0) return;

  const pl = (pid===1 ? Game.p1 : Game.p2);
  if(!pl) return;
  if(pl.panelActive) return;

  // Le superpouvoir se charge automatiquement (toutes les SUPER_CHARGE_SPORES spores)
  // et s'active directement ici
  if (!pl.superReady) {
    // Afficher un retour visuel que ce n'est pas encore chargé
    const needed = SUPER_CHARGE_SPORES - ((pl.collectedSpores||0) % SUPER_CHARGE_SPORES);
    flashHUD(pl, `Super: encore ${needed} spores`);

  }

  // Activer le superpouvoir
  pl.superReady = false;
  refreshHUD(pl);

  if (pl.species.id === 'stropharia' || pl.species.id === 'anthurus'){
    pl.panelActive = true;

/* ============ Utils ============ */
const now=()=>performance.now();
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

function angleFromDir4(d){
  if(!d) return null;
  const [dx,dy] = d;
  if (dy < 0 && dx === 0) return 0;
  if (dx > 0 && dy === 0) return Math.PI/2;
  if (dy > 0 && dx === 0) return Math.PI;
  if (dx < 0 && dy === 0) return -Math.PI/2;
  return null;
}
function normAngle(a){
  while(a <= -Math.PI) a += Math.PI*2;
  while(a >   Math.PI) a -= Math.PI*2;
  return a;
}
function lerp(a,b,t){ return a + (b-a)*t; }
function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }

function scheduleQuarterTurn(p, targetAngle){
  const cur = p.faceAngle || 0;
  const delta = normAngle(targetAngle - cur);
  const step = Math.sign(delta) * Math.min(Math.PI/2, Math.abs(delta));
  p.turnFromAngle = cur;
  p.turnToAngle   = cur + step;
  p.turnTimer     = p.turnDuration || 6;
  p.pendingAngle  = (Math.abs(delta) > Math.PI/2 + 0.001) ? targetAngle : null;
}

function updateParasiteOrientation(p, dt){
  if ((p.turnTimer||0) > 0){
    p.turnTimer -= dt;
    const t  = Math.max(0, Math.min(1, 1 - (p.turnTimer / (p.turnDuration||6))));
    const tt = easeOutCubic(t);
    p.faceAngle = lerp(p.turnFromAngle||0, p.turnToAngle||0, tt);
    if (p.turnTimer <= 0){
      p.faceAngle = p.turnToAngle||0;
      if (p.pendingAngle != null){
        const diff = normAngle(p.pendingAngle - p.faceAngle);
        if (Math.abs(diff) > 0.001) scheduleQuarterTurn(p, p.pendingAngle);
        else p.pendingAngle = null;
      }
    }
    return;
  }
  const target = angleFromDir4(p.dir);
  if (target == null) return;
  const diff = normAngle(target - (p.faceAngle||0));
  if (Math.abs(diff) > 0.01) scheduleQuarterTurn(p, target);
}

      el.textContent = (pl.anthurusCharge|0) + '/10 — Super: ' + progress + '/' + SUPER_CHARGE_SPORES;
    }

  if (pl.species.id === 'phalloides' && pl.phaseCooldown > 0){
    el.textContent = `Recharge (${Math.ceil(pl.phaseCooldown/60)}s)`;
    return;
  }

  if (pl.species.id === 'cornucopioides' && pl.trumpetCd > 0){
    el.textContent = `Recharge (${Math.ceil(pl.trumpetCd/60)}s)`;
    return;
  }

  // Afficher la progression du superpouvoir
  const progress = (pl.collectedSpores||0) % SUPER_CHARGE_SPORES;
  if (progress > 0) {
    el.textContent = `Super: ${progress}/${SUPER_CHARGE_SPORES} spores`;
    return;
  }

  el.textContent = '—';
}

/* ============ Audio ============ */
let ACTX = null, MASTER = null, STARTED = false;

function ensureAudio(){
  if (STARTED) return;
  STARTED = true;
  ACTX = new (window.AudioContext || window.webkitAudioContext)();
  MASTER = ACTX.createGain();
  MASTER.gain.value = 0.18;
  MASTER.connect(ACTX.destination);
}

function tone(time,freq,dur,type='sine',vol=0.2){
  if(!ACTX) return;
  const o=ACTX.createOscillator(), g=ACTX.createGain();
  o.type=type;
  o.frequency.setValueAtTime(freq,time);
  g.gain.value=0;
  g.gain.linearRampToValueAtTime(vol,time+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,time+dur);
  o.connect(g); g.connect(MASTER);
  o.start(time); o.stop(time+dur);
}

function sfxEat(){ if(!ACTX) return; const t=ACTX.currentTime; tone(t,740,.05,'triangle',.2); }
function sfxPower(){ if(!ACTX) return; const t=ACTX.currentTime; tone(t,520,.1,'sawtooth',.22); tone(t+.1,880,.1,'square',.18); }
function sfxHit(){ if(!ACTX) return; const t=ACTX.currentTime; tone(t,160,.08,'sawtooth',.3); }
function sfxWin(){ if(!ACTX) return; const t=ACTX.currentTime; [660,880,990,1320].forEach((f,i)=>tone(t+i*.1,f,.1,'triangle',.2)); }
function sfxLife(){ if(!ACTX) return; const t=ACTX.currentTime; [660,990,1320].forEach((f,i)=>tone(t+i*.08,f,.08,'sine',.22)); }

function buildChoiceCard(sp, forPid){
  const otherSel = (forPid===1)? Selected2 : Selected1;
  const disabled = (Game && Game.mode==='duo' && otherSel && (
  otherSel.id===sp.id ||
  ((otherSel.id==='stropharia' && sp.id==='anthurus') ||
   (otherSel.id==='anthurus'  && sp.id==='stropharia'))
));

  const div=document.createElement('div');
  div.className='choice'+(disabled?' disabled':'');
  div.style.cssText = 'background:#0e0b13;border:1px solid #ffffff1f;border-radius:12px;padding:14px;cursor:pointer;display:flex;gap:12px;align-items:center;';
  
  const icon = document.createElement('img');
  icon.src = getSpritePath(sp.id, true);
  icon.alt = sp.name;
  icon.style.cssText = 'width:84px;height:84px;object-fit:contain;image-rendering:crisp-edges;flex:0 0 auto;';

  const right=document.createElement('div'); right.style.display='grid'; right.style.gap='4px';
  const name=document.createElement('div'); name.style.fontWeight='800'; name.textContent=sp.name;
  const desc=document.createElement('div');
  desc.style.fontSize='12px';
  desc.style.lineHeight='1.55';
  desc.innerHTML=`
    <div style="opacity:.8;margin-bottom:4px">${sp.desc}</div>
    <div style="color:#88ccff;margin-bottom:2px"><b>⚡ POUVOIR :</b> ${sp.power}</div>
    <div style="color:#ffd700"><b>★ SUPER (25 spores) :</b> ${sp.superPower}</div>
  `;

  const row=document.createElement('div'); row.className='row';
  const badge=document.createElement('span'); badge.className='badge'; badge.textContent=sp.id;
  row.appendChild(badge);

  right.appendChild(name); right.appendChild(desc); right.appendChild(row);
  div.appendChild(icon); div.appendChild(right);

  if(!disabled){
    div.addEventListener('click', ()=>{
      if(forPid===1) Selected1=sp; else Selected2=sp;
      renderChoices(); updateStartButtonState();
    });
    div.addEventListener('dblclick', ()=>{
      if(updateStartButtonState()) { readOptionsFromOverlay(); startGame(); }
    });
  }
  const sel = forPid===1?Selected1:Selected2;
  if(sel && sel.id===sp.id){ div.style.outline='2px solid '+sp.color; div.style.boxShadow='0 0 0 4px '+sp.color+'33'; }

  return div;
}

  if(UI.choices1){

    UI.choices2.innerHTML='';
    if(isDuo){
      list.forEach(sp=>UI.choices2.appendChild(buildChoiceCard(sp,2)));

function updateStartButtonState(){
  if(!UI.overlay) return false;
const duo = (UI.overlay.querySelector('input[name="modeSel"]:checked')?.value==='duo');
const pair7v8 = (duo && Selected1 && Selected2 &&
                 ((Selected1.id==='stropharia' && Selected2.id==='anthurus') ||
                  (Selected1.id==='anthurus'  && Selected2.id==='stropharia')));
const conflict = (duo && Selected1 && Selected2 && (Selected1.id===Selected2.id || pair7v8));
  const btn = UI.startBtn;
  if(btn){
    btn.disabled = !!conflict;
    btn.textContent = conflict ? "Choisissez deux espèces différentes" : "Jouer";
  }
  return !conflict;
}

function readOptionsFromOverlay(){
  const root=UI.overlay||document;
  const sel=root.querySelector('#diffSel');
  if(sel){
    const found=DIFFICULTIES.find(d=>d.id===sel.value);
    if(found) SelectedDifficulty=found;

  const k = e.key.toLowerCase();

  {name:'Sous-bois bleuté', sky1:'#203248', sky2:'#0a0f16', moss:'#64d7ff', soil:'#2b303a', fog:'#64d7ff12', wall:'#314459', deco:'#9fe4ff'},
  {name:'Mousse émeraude', sky1:'#153022', sky2:'#08120c', moss:'#2fd07a', soil:'#1c2a21', fog:'#2fd07a12', wall:'#1e3a2f', deco:'#4ef1a8'}
];
let LEVEL_INDEX=0; let BIOME=BIOMES[0];

function mulberry32(seed){ let a=(seed>>>0)||0x9E3779B9; return function(){ let t=a+=0x6D2B79F5; t=Math.imul(t^(t>>>15),t|1); t^=t+Math.imul(t^(t>>>7),t|61); return ((t^(t>>>14))>>>0)/4294967296; }; }
function isGridShape(grid,c,r){ if(!Array.isArray(grid)||grid.length!==r) return false; for(let y=0;y<r;y++){ if(!Array.isArray(grid[y])||grid[y].length!==c) return false; } return true; }
function genLevel(seed){ const rng=mulberry32(seed==null? (Math.random()*1e9)|0:seed); let maze=createMaze(COLS,ROWS,rng); if(!isGridShape(maze,COLS,ROWS)) maze=createMaze(COLS,ROWS,mulberry32(0xDEADBEEF)); decorateMaze(maze,rng); return maze; }
function createMaze(w,h,rng){
  w=Math.max(5,w|0); h=Math.max(5,h|0);
  const g=Array.from({length:h},()=>Array.from({length:w},()=>1));
  const stack=[]; const start=[1,1]; g[1][1]=0; stack.push(start);
  const dirs=[[2,0],[-2,0],[0,2],[0,-2]];
  while(stack.length){
    const last=stack[stack.length-1]; const cx=last[0], cy=last[1];
    for(let i=dirs.length-1;i>0;i--){ const j=(rng()*(i+1))|0; const tmp=dirs[i]; dirs[i]=dirs[j]; dirs[j]=tmp; }
    let carved=false;
    for(let d=0;d<dirs.length;d++){
      const dx=dirs[d][0], dy=dirs[d][1]; const nx=cx+dx, ny=cy+dy;
      if(nx<=0||ny<=0||nx>=w-1||ny>=h-1) continue;
      if(g[ny][nx]===1){ g[cy+dy/2][cx+dx/2]=0; g[ny][nx]=0; stack.push([nx,ny]); carved=true; break; }
    }
    if(!carved) stack.pop();
  }
  for(let y=0;y<h;y++) for(let x=0;x<w;x++) if(g[y][x]===0) g[y][x]=2;
  for(let x=0;x<w;x++){ g[0][x]=1; g[h-1][x]=1;}
  for(let y=0;y<h;y++){ g[y][0]=1; g[y][w-1]=1;}
  return g;
}
function decorateMaze(g, rng){
  if(!Array.isArray(g)||!g.length||!Array.isArray(g[0])) return g;
  const h=g.length,w=g[0].length;

  const holes = ((w*h)/180)|0;
  for(let n=0;n<holes;n++){
    let tries=24;
    while(tries--){
      const x = 1 + ((rng()*(w-2))|0);
      const y = 1 + ((rng()*(h-2))|0);
      if (g[y][x]===1){
        if (g[y][x-1]===2 || g[y][x+1]===2 || g[y-1][x]===2 || g[y+1][x]===2){
          g[y][x]=2;
          break;
        }
      }
    }
  }

  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      if(g[y][x]===2){
        const r=rng();
        if(r<0.03) g[y][x]=4;
        else if(r<0.08) g[y][x]=3;
      }
    }
  }

  const area   = w * h;
  const minDim = Math.min(w, h);
  const halfMin = Math.max(1, Math.min(4, (minDim * 0.02) | 0));
  const halfMax = Math.max(halfMin + 1, Math.min(6, (minDim * 0.06) | 0));
  const countMin = Math.max(2, Math.min(8,  (area / 1500) | 0));
  const countMax = Math.max(countMin + 1, Math.min(12, (area /  900) | 0));

  carveRandomPlacettes(g, rng, countMin, countMax, halfMin, halfMax);

  return g;
}

function carveRandomPlacettes(g, rng, countMin=2, countMax=5, halfMin=1, halfMax=3) {
  const H = g.length|0; if (H<=0) return g;
  const W = (g[0]||[]).length|0; if (W<=0) return g;

  const inb = (x,y)=> (x>1 && y>1 && x<W-2 && y<H-2);
  const open = (x,y)=>{ if (inb(x,y) && g[y][x]===1) { g[y][x]=2; addPelletCell(x,y); } };

  const nPlac = Math.max(countMin, Math.min(countMax, (countMin + ((rng()*(countMax-countMin+1))|0)) ));

  function pickOpen() {
    for (let tries=0; tries<200; tries++){
      const x = 2 + ((rng()*(W-4))|0);
      const y = 2 + ((rng()*(H-4))|0);
      if (g[y][x] === 2) return {x,y};
    }
    return { x: (W/2)|0, y: (H/2)|0 };
  }

  for (let k=0; k<nPlac; k++){
    const seed = pickOpen();
    const hx = Math.max(halfMin, Math.min(halfMax, (halfMin + ((rng()*(halfMax-halfMin+1))|0)) ));
    const hy = Math.max(halfMin, Math.min(halfMax, (halfMin + ((rng()*(halfMax-halfMin+1))|0)) ));

    const cx = Math.max(2, Math.min(W-3, seed.x + (((rng()*3)|0)-1) ));
    const cy = Math.max(2, Math.min(H-3, seed.y + (((rng()*3)|0)-1) ));

    for (let y=cy-hy; y<=cy+hy; y++){
      for (let x=cx-hx; x<=cx+hx; x++){
        open(x,y);
      }
    }

    open(cx-hx-1, cy); open(cx+hx+1, cy);
    open(cx, cy-hy-1); open(cx, cy+hy+1);

    if (rng() < 0.5) open(cx-hx, cy-hy-1);
    if (rng() < 0.5) open(cx+hx, cy-hy-1);
    if (rng() < 0.5) open(cx-hx, cy+hy+1);
    if (rng() < 0.5) open(cx+hx, cy+hy+1);
  }

  return g;
}

const VORTEX = 5;

function carvePlus(x, y) {
  const dm = gridDims(); const C=dm.cols, R=dm.rows;
  const open = (tx,ty)=>{
    if (tx>0 && ty>0 && tx<C-1 && ty<R-1) {
      if (Game.grid[ty][tx] === 1) { Game.grid[ty][tx] = 2; addPelletCell(tx,ty); }
    }
  };

  for (let dy=-1; dy<=1; dy++){
    for (let dx=-1; dx<=1; dx++){
      if (dx===0 && dy===0) continue;
      open(x+dx, y+dy);
    }
  }

  open(x-2, y);
  open(x+2, y);
  open(x, y-2);
  open(x, y+2);
}

function pickNearCorner(corner) {
  const dm = gridDims(); const C=dm.cols, R=dm.rows;
  const pad = Math.max(3, Math.floor(Math.min(C,R)*0.12));
  let x0 = (corner==='tl'||corner==='bl') ? 1 : Math.max(1, C-pad-1);
  let y0 = (corner==='tl'||corner==='tr') ? 1 : Math.max(1, R-pad-1);
  const x1 = (corner==='tl'||corner==='bl') ? Math.min(C-2, 1+pad) : C-2;
  const y1 = (corner==='tl'||corner==='tr') ? Math.min(R-2, 1+pad) : R-2;

  for (let tries=0; tries<400; tries++){
    const x = x0 + ((Math.random()*(x1-x0+1))|0);
    const y = y0 + ((Math.random()*(y1-y0+1))|0);
    if (Game.grid[y] && Game.grid[y][x]===2) return {x,y};
  }
  for (let tries=0; tries<400; tries++){
    const x = x0 + ((Math.random()*(x1-x0+1))|0);
    const y = y0 + ((Math.random()*(y1-y0+1))|0);
    if (Game.grid[y] && Game.grid[y][x]===1) {
      if (Game.grid[y][x-1]===2 || Game.grid[y][x+1]===2 || Game.grid[y-1]?.[x]===2 || Game.grid[y+1]?.[x]===2) {
        Game.grid[y][x]=2;
        addPelletCell(x,y);
        return {x,y};
      }
    }
  }
  return findOpenTile();
}

function placeVortexes(){
  Game.vortexes = [];
  const corners = ['tl','tr','bl','br'];
  for (const c of corners){
    const pos = pickNearCorner(c);
    refreshPelletCell(pos.x, pos.y);
    redrawWallIfAny(pos.x, pos.y);
    Game.grid[pos.y][pos.x] = VORTEX;
    carvePlus(pos.x, pos.y);
    Game.vortexes.push({x:pos.x, y:pos.y});
  }
}

const BonusKinds=['life','speed','power','score','freeze'];
function pickBonusKind(seed, x=0, y=0, level=0){
  const roll = ((seed*1103515245 + x*12345 + y*2654435761 + level*7919) >>> 0) % 100;
  if (roll < 4) return 'power';
  if (roll < 19) return 'life';
  if (roll < 46) return 'speed';
  if (roll < 73) return 'freeze';
  return 'score';
}

function updateFloatingTexts(dt){
  if (!Array.isArray(Game.floatingTexts)) return;
  for(let i = Game.floatingTexts.length - 1; i >= 0; i--){
    const ft = Game.floatingTexts[i];
    ft.life -= dt;
    ft.y -= 0.4 * dt;
    if (ft.life <= 0) Game.floatingTexts.splice(i, 1);
  }
}

  Game.floatingTexts.forEach(ft => {

    CTX.save();
    CTX.globalAlpha = alpha;
    CTX.font = 'bold 14px system-ui';
    CTX.textAlign = 'center';
    CTX.textBaseline = 'middle';
    CTX.lineWidth = 3;
    CTX.strokeStyle = 'rgba(0,0,0,0.7)';
    CTX.strokeText(ft.text, ft.x, ft.y);
    CTX.fillStyle = ft.color;
    CTX.fillText(ft.text, ft.x, ft.y);
    CTX.restore();

function repelEnemiesAround(pl, radiusTiles, forceTiles){
  const radius = radiusTiles;
  const force  = forceTiles;
  const px = pl.x, py = pl.y;

  Game.parasites.forEach(p=>{
    const dx = p.x - px, dy = p.y - py;
    const dist = Math.hypot(dx,dy);
    if(dist > 0 && dist <= radius){
      const nx = dx / dist, ny = dy / dist;
      p.x += nx * force;
      p.y += ny * force;
      p.scared = Math.max(p.scared, 120);
      p.path = [];
      p.lastSeen = null;
    }
  });
}

function computeKnockbackTarget(p, pl){
  let dx = p.x - pl.x, dy = p.y - pl.y;
  const len = Math.hypot(dx, dy) || 1;
  dx /= len; dy /= len;
  return computeKnockbackTargetDir({x:p.x, y:p.y}, [dx,dy]);
}
function computeKnockbackTargetDir(origin, dir){
  const step = 0.2;
  const maxSteps = 220;
  let lastX = origin.x, lastY = origin.y;
  const dx = dir[0], dy = dir[1];
  for(let i=0;i<maxSteps;i++){
    const nx = lastX + dx * step;
    const ny = lastY + dy * step;
    const gx = Math.floor(nx), gy = Math.floor(ny);
    if(!isWalkable(gx, gy)){
      break;
    }
    lastX = nx; lastY = ny;
  }
  return { x:lastX, y:lastY };
}

function dims(){ const dm=gridDims(); return {C:dm.cols,R:dm.rows}; }
function openTile(tx,ty,pl){ const d=dims(); if(!Game.grid||ty<0||tx<0||ty>=d.R||tx>=d.C) return false; const v=Game.grid[ty][tx]; if(v===1){ if(pl&&pl.phase){ if(tx===0||ty===0||tx===d.C-1||ty===d.R-1) return false; return true; } return false; } if(v===VORTEX && isVortexBlocked(tx,ty)) return false; return true; }
function isWalkable(tx,ty){
  const d=dims();
  if(tx<0||ty<0||tx>=d.C||ty>=d.R) return false;
  const v = Game.grid[ty][tx];
  if(v===1) return false;
  if(v===VORTEX && isVortexBlocked(tx,ty)) return false;
  return true;
}
function neighbors(tx,ty){ return [[1,0],[-1,0],[0,1],[0,-1]].map(d=>[tx+d[0],ty+d[1]]).filter(p=>isWalkable(p[0],p[1])); }
function isVortex(tx, ty){
  return !!(Game.grid[ty] && Game.grid[ty][tx] === VORTEX);
}
function isVortexBlocked(tx, ty){
  return Game.vortexBlocks.some(b => b.x===tx && b.y===ty && b.timer>0);
}
function addVortexBlock(tx, ty, frames=300){
  const i = Game.vortexBlocks.findIndex(b=>b.x===tx && b.y===ty);
  if(i>=0) Game.vortexBlocks[i].timer = Math.max(Game.vortexBlocks[i].timer, frames);
  else Game.vortexBlocks.push({x:tx, y:ty, timer:frames});
}
function isWalkableForParasite(tx, ty){
  return isWalkable(tx,ty) && !isVortex(tx,ty);
}
function neighborsForParasite(tx,ty){
  return [[1,0],[-1,0],[0,1],[0,-1]]
    .map(d=>[tx+d[0],ty+d[1]])
    .filter(p=>isWalkableForParasite(p[0],p[1]));
}

function getFacingDir(pl){

  if (pl && (pl.nextDir[0] || pl.nextDir[1])) return pl.nextDir.slice(0);

}
function frontTile(pl){

function backTile(pl){

function countReachableSporesFrom(gx,gy){
  const dm=gridDims(); const seen=new Set(); const q=[[gx,gy]];
  const key=(x,y)=>x+','+y;
  let count=0;
  while(q.length){
    const [x,y]=q.shift();
    const k=key(x,y); if(seen.has(k)) continue; seen.add(k);
    if(!isWalkable(x,y)) continue;
    if(Game.grid[y][x]===2) count++;
    neighbors(x,y).forEach(n=>{ q.push(n); });
  }
  return count;
}

function safeSetWallWithAntiSeal(x,y, oppPlayer){
  const prev = Game.grid[y][x];
  let savedBonus = null, savedTrap = null;
  const bi = Game.bonuses.findIndex(b=>b.x===x && b.y===y);
  if (bi>=0) { savedBonus = Game.bonuses[bi]; Game.bonuses.splice(bi,1); }
  const ti = Game.traps.findIndex(t=>t.x===x && t.y===y);
  if (ti>=0) { savedTrap = Game.traps[ti]; Game.traps.splice(ti,1); }

  Game.grid[y][x] = 1;
  redrawWallIfAny(x,y);

  const oppGX = Math.floor(oppPlayer.x), oppGY = Math.floor(oppPlayer.y);
  const spores = countReachableSporesFrom(oppGX, oppGY);

  if (spores === 0){
    Game.grid[y][x] = prev;
    redrawWallIfAny(x,y);
    if (prev === 2) addPelletCell(x,y);
    if (savedBonus) Game.bonuses.push(savedBonus);
    if (savedTrap) Game.traps.push(savedTrap);
  }
}

function placeWallWithSealTracking(x, y, ownerPl, oppPl){
  if (!ownerPl || ownerPl.species.id !== 'anthurus') {
    safeSetWallWithAntiSeal(x, y, oppPl);

  }
  if (Game.grid[y][x] === 1) return;

  const before = countReachableSporesFrom(Math.floor(oppPl.x), Math.floor(oppPl.y));

  safeSetWallWithAntiSeal(x, y, oppPl);

  if (Game.grid[y][x] !== 1) return;

  const after = countReachableSporesFrom(Math.floor(oppPl.x), Math.floor(oppPl.y));

  if (after > 0 && after < before && after < Game.remaining) {
    Game.sealWallFor[oppPl.pid] = { x, y };
  }
}

function bfsParasite(start, goal){
  const key=(x,y)=>x+','+y;
  if(isVortex(goal[0],goal[1])){
    const ns = neighborsForParasite(goal[0],goal[1]);
    if(ns.length) goal = ns[0];
  }
  if(!isWalkableForParasite(goal[0],goal[1])) return [];
  const q=[start];
  const came=new Map(); came.set(key(start[0],start[1]), null);
  while(q.length){
    const node=q.shift(); const x=node[0], y=node[1];
    if(x===goal[0]&&y===goal[1]) break;
    const ns=neighborsForParasite(x,y);
    for(let i=0;i<ns.length;i++){
      const nx=ns[i][0], ny=ns[i][1]; const k=key(nx,ny);
      if(!came.has(k)){ came.set(k,[x,y]); q.push([nx,ny]); }
    }
  }
  const path=[]; let cur=goal; const sKey=key(start[0],start[1]);
  while(cur && key(cur[0],cur[1])!==sKey){
    const prev=came.get(key(cur[0],cur[1])); if(!prev) break;
    path.push(cur); cur=prev;
  }
  path.reverse(); return path;
}

function tileCenter(gx, gy){ return [gx + 0.5, gy + 0.5]; }

function stepTowardsPoint(p, tx, ty, spd){
  const dx = tx - p.x, dy = ty - p.y, len = Math.hypot(dx,dy) || 1;
  p.x += (dx/len) * spd;
  p.y += (dy/len) * spd;
  p.dir = [Math.sign(dx), Math.sign(dy)];
}

function chaseViaPath(p, targetGX, targetGY, speedMul, dt){
  const eTile = [Math.floor(p.x), Math.floor(p.y)];
  const path = bfsParasite(eTile, [targetGX, targetGY]);
  const base = p.speed * dt * (speedMul || 1);

  if (path && path.length){
    const nx = path[0][0], ny = path[0][1];
    const [tx, ty] = tileCenter(nx, ny);
    stepTowardsPoint(p, tx, ty, base);
    if (Math.abs(p.x - tx) < 0.05 && Math.abs(p.y - ty) < 0.05){
      p.x = tx; p.y = ty;
      path.shift();
    }
    p.path = path;
  } else {
    const opts = neighborsForParasite(eTile[0], eTile[1]);
    if (opts.length){
      const [gx, gy] = opts[(Math.random()*opts.length)|0];
      const [tx, ty] = tileCenter(gx, gy);
      stepTowardsPoint(p, tx, ty, base * 0.9);
    }
  }
}

function safeClampParasite(p){
  const gx = Math.floor(p.x), gy = Math.floor(p.y);
  if (!isWalkableForParasite(gx, gy)){
    const near = findOpenNear(gx, gy);
    p.x = near.x + 0.5;
    p.y = near.y + 0.5;
    p.dir = [0,0];
    p.path = [];
    p.lastSeen = null;
  }
}

function bfs(start,goal){ const key=(x,y)=>x+','+y; if(!isWalkable(goal[0],goal[1])) return []; const q=[start]; const came=new Map(); came.set(key(start[0],start[1]), null); while(q.length){ const node=q.shift(); const x=node[0], y=node[1]; if(x===goal[0]&&y===goal[1]) break; const ns=neighbors(x,y); for(let i=0;i<ns.length;i++){ const nx=ns[i][0], ny=ns[i][1]; const k=key(nx,ny); if(!came.has(k)){ came.set(k,[x,y]); q.push([nx,ny]); } } } const path=[]; let cur=goal; const sKey=key(start[0],start[1]); while(cur && key(cur[0],cur[1])!==sKey){ const prev=came.get(key(cur[0],cur[1])); if(!prev) break; path.push(cur); cur=prev; } path.reverse(); return path; }
function sameRowOrCol(a,b){ return a[0]===b[0] || a[1]===b[1]; }
function hasLineOfSight(a,b){ if(!sameRowOrCol(a,b)) return false; const ax=a[0], ay=a[1], bx=b[0], by=b[1]; if(ax===bx){ const min=Math.min(ay,by), max=Math.max(ay,by); for(let y=min+1;y<max;y++){ if(Game.grid[y][ax]===1) return false; } return true; } else { const min=Math.min(ax,bx), max=Math.max(ax,bx); for(let x=min+1;x<max;x++){ if(Game.grid[ay][x]===1) return false; } return true; } }
function randomOpenTile(){ const dm=gridDims(); const cols=dm.cols, rows=dm.rows; for(let t=0;t<2000;t++){ const x=(Math.random()*cols)|0, y=(Math.random()*rows)|0; if(isWalkable(x,y)) return [x,y]; } return [1,1]; }
function findNearestPellet(from){
  const dm=gridDims(); const cols=dm.cols, rows=dm.rows; let best=null, bestD=1e9;
  for(let y=0;y<rows;y++) for(let x=0;x<cols;x++){
    if(Game.grid[y][x]===2){ const d=Math.abs(x-from[0])+Math.abs(y-from[1]); if(d<bestD){ bestD=d; best=[x,y]; } }
  } return best;
}

function eatBonusFor(player,b){
  let consumed = false;
  const clearCell = () => { Game.grid[b.y][b.x] = 0; consumed = true; };

  switch(b.kind){
    case 'life':
      clearCell();
      if(player.pid===1){ Game.lives1++; updateLivesHUD(1,Game.lives1); }
      else { Game.lives2++; updateLivesHUD(2,Game.lives2); }
      sfxLife();
      break;

    case 'speed': {
      clearCell();
      const mult = 1.4, dur = 6000;
      if (player.baseSpeed == null) player.baseSpeed = player.speed || 0.11;
      if (player.speedBuffs == null) player.speedBuffs = 0;
      player.speedBuffs += 1;
      player.speed = player.baseSpeed * Math.pow(mult, player.speedBuffs);
      sfxPower();
      setTimeout(() => {
        player.speedBuffs = Math.max(0, (player.speedBuffs || 0) - 1);
        player.speed = player.baseSpeed * Math.pow(mult, player.speedBuffs);
      }, dur);
      break;
    }

    case 'power': {
      // Bonus power = points bonus + recharge immédiate du superpouvoir
      clearCell();
      if (!player.superReady) {
        player.superReady = true;
        const hudEl = (player.pid===1?UI.power1:UI.power2);
        if (hudEl) hudEl.classList.add('power-ready');
        showEvent('★ SUPER CHARGÉ J'+player.pid+' !', '#ffd700', 3000);
        sfxPower();
      } else {
        // Déjà prêt : bonus de score
        if(player.pid===1){ Game.score1+=300; UI.score1.textContent=Game.score1; }
        else { Game.score2+=300; UI.score2.textContent=Game.score2; }
        spawnFloatingText(player.x*TILE, player.y*TILE, '+300 ★', '#ffd76a');
        sfxPower();
      }
      break;
    }

    case 'score':
      clearCell();
      if(player.pid===1){ Game.score1+=500; UI.score1.textContent=Game.score1; }
      else { Game.score2+=500; UI.score2.textContent=Game.score2; }
      updateLeaderHUD(); sfxPower();
      break;

    case 'freeze':
      clearCell();
      Game.parasites.forEach(p => { p.frozen = Math.max(p.frozen||0, 180); });
      sfxPower();
      break;
  }
  return consumed;
}
